  <title>Wellness OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: #000; color: #fff; overscroll-behavior: none; }
    #app { height: 100dvh; display: flex; flex-direction: column; max-width: 640px; margin: 0 auto; position: relative; overflow: hidden; }
    #scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
    #scroll-area::-webkit-scrollbar { width: 3px; }
    #scroll-area::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }
    .topbar { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 14px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
    .content { padding: 18px 20px 100px; }
    .bottomnav { position: sticky; bottom: 0; border-top: 1px solid var(--border); display: flex; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; flex-shrink: 0; }
    .navbtn { flex: 1; padding: 11px 0 max(13px, env(safe-area-inset-bottom)); background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; transition: all 0.2s; font-family: inherit; }
    .navbtn .navicon { font-size: 20px; transition: transform 0.2s; }
    .navbtn.active .navicon { transform: scale(1.15); }
    .navbtn .navlabel { font-size: 10px; font-weight: 400; letter-spacing: 0.3px; transition: color 0.2s; }
    .navbtn.active .navlabel { font-weight: 700; }
    .navbtn .nav-pip { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 28px; height: 3px; border-radius: 0 0 6px 6px; display: none; }
    .navbtn.active .nav-pip { display: block; }
    .card { border-radius: 18px; border: 1px solid var(--border); background: var(--card); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px; }
    .card-body { padding: 18px; }
    .card-header { padding: 13px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .tab-content { animation: tabIn 0.25s ease; }
    @keyframes tabIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    .modal-bg { position: fixed; inset: 0; background: #000b; z-index: 999; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal-box { border-radius: 24px 24px 0 0; width: 100%; max-width: 640px; max-height: 85vh; overflow-y: auto; padding: 24px; animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); background: var(--card); }
    .pin-modal { align-items: center; }
    .pin-box { border-radius: 28px; width: calc(100% - 40px); max-width: 360px; padding: 36px 28px; animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1); background: var(--card); border: 1px solid var(--border); }
    .btn { border: none; cursor: pointer; font-family: inherit; font-weight: 600; border-radius: 12px; padding: 10px 16px; transition: all 0.2s; font-size: 13px; }
    .btn:active { transform: scale(0.96); }
    .btn-accent { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
    .btn-surface { background: var(--surface); color: var(--sub); border: 1px solid var(--border); }
    .btn-danger { background: #E11D4812; color: #E11D48; border: 1px solid #E11D4830; }
    .btn-full { display: block; width: 100%; padding: 13px; border-radius: 13px; font-size: 14px; font-weight: 700; text-align: center; }
    .check-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
    .check-row:last-child { border-bottom: none; }
    .check-row:active { background: var(--surface); }
    .check-box { width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.22s; font-size: 11px; font-weight: 700; color: #fff; }
    .check-box.checked { color: #fff; }
    .check-label { font-size: 13px; font-weight: 500; flex: 1; transition: all 0.2s; }
    .check-label.done { text-decoration: line-through; color: var(--muted); }
    .prog-bar-wrap { height: 5px; border-radius: 99px; overflow: hidden; margin: 8px 0 14px; }
    .prog-bar-track { height: 100%; background: color-mix(in srgb, #fff 12%, transparent); }
    .prog-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    input, textarea, select { font-family: inherit; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; color: var(--text); font-size: 14px; outline: none; width: 100%; }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; line-height: 1.6; }
    select option { background: var(--card); }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; box-shadow: var(--shadow); transition: transform 0.2s; }
    .stat-card:active { transform: scale(0.97); }
    .hero-card { border-radius: 22px; padding: 26px; margin-bottom: 18px; position: relative; overflow: hidden; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-day { border-radius: 11px; padding: 7px 2px 5px; cursor: pointer; text-align: center; border: 1px solid var(--border); background: var(--card); transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1); }
    .cal-day:active { transform: scale(0.95); }
    .cal-day.today { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .cal-day.selected { background: var(--accent); border-color: var(--accent); transform: scale(1.06); box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 40%, transparent); }
    .photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .photo-thumb { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-del { position: absolute; top: 5px; right: 5px; background: #000a; border: none; color: #fff; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .ring-svg text { font-family: 'DM Sans', sans-serif; }
    canvas { max-height: 180px; }
    .doom-bar { height: 6px; border-radius: 99px; overflow: hidden; margin-top: 12px; background: color-mix(in srgb, #fff 12%, transparent); }
    .theme-btn { padding: 13px 14px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 9px; transition: all 0.22s; font-family: inherit; }
    .accent-pill { padding: 9px 18px; border-radius: 99px; border: 2px solid transparent; cursor: pointer; transition: all 0.22s; font-weight: 700; font-size: 13px; font-family: inherit; }
    .flex-row { display: flex; align-items: center; gap: 10px; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .empty-state { text-align: center; padding: 16px 0; color: var(--muted); font-size: 13px; }
    h1.page-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 22px; }

    /* ── MOOD BUTTONS ── */
    .mood-grid { display: flex; gap: 8px; flex-wrap: nowrap; justify-content: space-between; }
    .mood-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 4px; border-radius: 14px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1); font-family: inherit; }
    .mood-btn:active { transform: scale(0.94); }
    .mood-btn.selected { transform: scale(1.07); box-shadow: 0 6px 20px color-mix(in srgb, var(--mood-color,var(--accent)) 40%, transparent); }
    .mood-emoji { font-size: 22px; line-height: 1; }
    .mood-label { font-size: 9px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase; }

    /* ── WATER TRACKER ── */
    .water-cups { display: grid; grid-template-columns: repeat(8,1fr); gap: 6px; }
    .water-cup { aspect-ratio: 1; border-radius: 10px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1); }
    .water-cup.filled { background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%); border-color: #0284c7; }
    .water-cup:active { transform: scale(0.9); }

    /* ── SLEEP TRACKER ── */
    .sleep-slider-wrap { padding: 8px 0; }
    .sleep-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 99px; outline: none; background: var(--border); cursor: pointer; }
    .sleep-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 50%, transparent); transition: transform 0.15s; }
    .sleep-slider::-webkit-slider-thumb:active { transform: scale(1.2); }
    .sleep-quality-grid { display: flex; gap: 6px; margin-top: 12px; }
    .sleep-q-btn { flex: 1; padding: 8px 4px; border-radius: 10px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 700; text-align: center; font-family: inherit; transition: all 0.2s; color: var(--sub); }
    .sleep-q-btn.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }

    /* ── HEATMAP ── */
    .heatmap-grid { display: grid; grid-template-columns: repeat(13,1fr); gap: 3px; }
    .hm-cell { aspect-ratio: 1; border-radius: 4px; cursor: pointer; transition: transform 0.15s; }
    .hm-cell:hover { transform: scale(1.3); z-index: 1; position: relative; }

    /* ── PIN LOCK ── */
    .pin-dots { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); background: transparent; transition: all 0.2s; }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.15); }
    .pin-dot.error { background: #E11D48; border-color: #E11D48; animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 8px; }
    .pin-key { padding: 18px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 20px; font-weight: 700; text-align: center; transition: all 0.15s; font-family: inherit; color: var(--text); }
    .pin-key:active { transform: scale(0.93); background: color-mix(in srgb, var(--accent) 15%, var(--surface)); }
    .pin-key.zero { grid-column: 2; }
    .pin-key.del { background: color-mix(in srgb, #E11D48 12%, transparent); color: #E11D48; border-color: #E11D4830; }

    /* ── MINI STAT CHIP ── */
    .mini-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 99px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--surface); }

    /* ── ACHIEVEMENT BADGE ── */
    .badge-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
    .badge-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 6px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); text-align: center; transition: all 0.2s; }
    .badge-item.unlocked { border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
    .badge-item.unlocked .badge-icon { filter: none; }
    .badge-icon { font-size: 26px; filter: grayscale(1) opacity(0.35); transition: filter 0.3s; }
    .badge-label { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 0.3px; text-transform: uppercase; line-height: 1.3; }
    .badge-item.unlocked .badge-label { color: var(--sub); }

    /* ── TODAY CHIP ROW ── */
    .today-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .today-chip { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.2s; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar" id="topbar">
    <div>
      <div id="logo" style="font-family:'Playfair Display',serif;font-size:20px;font-weight:900;letter-spacing:-0.3px;">Wellness OS</div>
      <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;font-weight:600;color:var(--muted)">Personal Growth Tracker</div>
    </div>
    <div class="flex-row">
      <div id="status-dot" style="width:8px;height:8px;border-radius:50%;"></div>
      <span id="status-pct" style="font-size:12px;font-weight:600;color:var(--sub);"></span>
    </div>
  </div>

  <div id="scroll-area">
    <div class="content" id="content"></div>
  </div>

// ── THEME APPLY ──────────────────────────────────────────────────────────────
function applyTheme(){
  const Th=THEMES[S.themeKey]||THEMES.amoled, Ac=ACCENTS[S.accentKey]||ACCENTS.indigo;
  const r=document.documentElement.style;
  r.setProperty("--bg",Th.bg);     r.setProperty("--surface",Th.surface);
  r.setProperty("--card",Th.card); r.setProperty("--border",Th.border);
  r.setProperty("--text",Th.text); r.setProperty("--sub",Th.sub);
  r.setProperty("--muted",Th.muted);r.setProperty("--shadow",Th.shadow);
  r.setProperty("--accent",Ac.p);  r.setProperty("--grad",Ac.g);
  document.body.style.background=Th.bg;
  document.body.style.color=Th.text;
  document.getElementById("topbar").style.background=Th.bg+"f0";
  document.getElementById("logo").style.background=Ac.g;
  document.getElementById("logo").style.webkitBackgroundClip="text";
  document.getElementById("logo").style.webkitTextFillColor="transparent";
  document.querySelectorAll(".nav-pip").forEach(p=>p.style.background=Ac.p);
  document.querySelectorAll(".navbtn.active .navlabel").forEach(l=>l.style.color=Ac.p);
  document.querySelector("#bottomnav").style.borderTopColor=Th.border;
  if(window.Chart){ Chart.defaults.color=Th.sub; Chart.defaults.borderColor=Th.border; }
}

// ── UTILS ────────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const dk=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const allTasks=()=>[...S.ptasks,...S.mtasks,...S.ftasks];
function getEff(date){
  const ch=S.checks[date]||{}, ex=S.extra[date]||[];
  const all=allTasks(), total=all.length+ex.length;
  if(!total)return 0;
  const done=all.filter(t=>ch[t.id]).length+ex.filter(t=>t.done).length;
  return Math.round(done/total*100);
}
function getEffFor(date,st){
  const ch=st.checks[date]||{}, ex=st.extra[date]||[];
  const all=[...st.ptasks,...st.mtasks,...st.ftasks], total=all.length+ex.length;
  if(!total)return 0;
  const done=all.filter(t=>ch[t.id]).length+ex.filter(t=>t.done).length;
  return Math.round(done/total*100);
}
function getStreak(){return getStreakFor(S);}
function getStreakFor(st){
  let s=0; const d=new Date();
  for(let i=0;i<365;i++){const k=d.toISOString().slice(0,10);if(getEffFor(k,st)>=50){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}
function last7(){return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().slice(0,10);});}
function last30(){return Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(29-i));return d.toISOString().slice(0,10);});}
function lastN(n){return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return d.toISOString().slice(0,10);});}
const A=()=>ACCENTS[S.accentKey]||ACCENTS.indigo;
const T=()=>THEMES[S.themeKey]||THEMES.amoled;

// Simple hash for PIN
function hashPin(pin){ let h=5381; for(let i=0;i<pin.length;i++){h=((h<<5)+h)+pin.charCodeAt(i);}return h.toString(36); }

// Achievements check
function getUnlockedAchievements(){return ACHIEVEMENTS.filter(a=>{try{return a.check(S);}catch{return false;}});}

// Heatmap color
function hmColor(pct){
  if(pct===0) return T().dark?"#1a1a1a":"#f0f0f0";
  if(pct<=25) return T().dark?"#1a2a1a":"#dcfce7";
  if(pct<=50) return T().dark?"#1a3a1a":"#86efac";
  if(pct<=75) return T().dark?"#155a1a":"#22c55e";
  if(pct<100) return T().dark?"#16652a":"#16a34a";
  return "#10b981";
}

// Mood color
function moodColor(moodId){
  const m=MOODS.find(x=>x.id===moodId); return m?m.color:"var(--muted)";
}

// ── SCROLL REVEAL ─────────────────────────────────────────────────────────────
function initReveal(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");io.unobserve(e.target);}});
  },{threshold:0.05});
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────────
let chartInstances={};
function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch{}});chartInstances={};}

function render(){
  // PIN lock check
  if(S.pinEnabled && !S.pinUnlocked){
    showPinLock(); return;
  }
  destroyCharts();
  applyTheme();
  updateNav();
  updateStatus();
  const content=document.getElementById("content");
  content.innerHTML=`<div class="tab-content">${buildContent()}</div>`;
  requestAnimationFrame(()=>{ initReveal(); initCharts(); });
}

function updateNav(){
  document.querySelectorAll(".navbtn").forEach(b=>{
    const active=b.dataset.tab===S.tab;
    b.classList.toggle("active",active);
    b.querySelector(".navlabel").style.color=active?A().p:T().muted;
    b.querySelector(".nav-pip").style.background=A().p;
  });
}

function updateStatus(){
  const eff=getEff(todayStr());
  const dot=document.getElementById("status-dot");
  const col=eff===100?"#10b981":eff>50?A().p:"#E11D48";
  dot.style.background=col; dot.style.boxShadow=`0 0 6px ${col}`;
  document.getElementById("status-pct").textContent=`${eff}% today`;
}

function buildContent(){
  if(S.tab==="calendar") return S.dayView?buildDayView():buildCalendar();
  if(S.tab==="analytics") return buildAnalytics();
  if(S.tab==="settings") return buildSettings();
  return buildHome();
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function buildCalendar(){
  const today=todayStr();
  const firstDay=new Date(S.calYear,S.calMonth,1).getDay();
  const dim=new Date(S.calYear,S.calMonth+1,0).getDate();
  const cells=[...Array(firstDay).fill(null),...Array.from({length:dim},(_,i)=>i+1)];

  return `
    <div class="reveal">
      <div class="flex-between" style="margin-bottom:20px">
        <button class="btn btn-surface" onclick="prevMonth()">‹</button>
        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text)">${MONTHS[S.calMonth]} ${S.calYear}</div>
        <button class="btn btn-surface" onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" style="gap:3px;margin-bottom:6px">
        ${DAYS.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;letter-spacing:1px">${d}</div>`).join("")}
      </div>
      <div class="cal-grid">
        ${cells.map((day,i)=>{
          if(!day) return `<div></div>`;
          const date=dk(S.calYear,S.calMonth,day);
          const eff=getEff(date);
          const isTod=date===today, isSel=date===S.selDate;
          const isRew=S.rewards[date], isExc=S.exceptions[date];
          const hasPhoto=(S.photos[date]||[]).length>0, hasNote=!!S.notes[date];
          const hasMood=!!S.mood[date];
          return `<div class="cal-day${isTod?" today":""}${isSel?" selected":""}" onclick="selectDate('${date}')">
            <div style="font-size:13px;font-weight:700;color:${isSel?"#fff":isTod?"var(--accent)":"var(--text)"}">${day}</div>
            ${eff>0?`<div style="margin:3px 4px 0;height:3px;border-radius:99px;background:${A().p}25;overflow:hidden"><div style="height:100%;width:${eff}%;background:${eff===100?"#10b981":"var(--accent)"}"></div></div>`:""}
            <div style="font-size:8px;margin-top:2px;color:${isSel?"#ffffffcc":"var(--muted)"};font-weight:600">${eff>0?`${eff}%`:""}</div>
            ${(isRew||isExc||hasPhoto||hasNote||hasMood)?`<div style="display:flex;justify-content:center;gap:1px;margin-top:1px">${isRew?"<span style='font-size:7px'>🌟</span>":""}${isExc?"<span style='font-size:7px'>⚡</span>":""}${hasPhoto?"<span style='font-size:7px'>📷</span>":""}${hasMood?`<span style='font-size:7px'>${MOODS.find(m=>m.id===S.mood[date])?.emoji||""}</span>`:""}${hasNote?"<span style='font-size:7px'>📝</span>":""}</div>`:""}
          </div>`;
        }).join("")}
      </div>
    </div>
  `;
}

// ── ANALYTICS ────────────────────────────────────────────────────────────────
function buildAnalytics(){
  const streak=getStreak();
  const l30=last30(), avgEff=Math.round(l30.reduce((a,d)=>a+getEff(d),0)/30);
  const perfect=l30.filter(d=>getEff(d)===100).length;
  const bestDay=l30.reduce((a,d)=>getEff(d)>getEff(a)?d:a,l30[0]);
  const today=todayStr(), checks=S.checks[today]||{};

  // Mood frequency last 30
  const moodCounts={}; l30.forEach(d=>{if(S.mood[d])moodCounts[S.mood[d]]=(moodCounts[S.mood[d]]||0)+1;});
  const topMood=Object.entries(moodCounts).sort((a,b)=>b[1]-a[1])[0];
  // Water avg
  const waterDays=l30.filter(d=>S.water[d]>0);
  const waterAvg=waterDays.length?Math.round(waterDays.reduce((a,d)=>a+(S.water[d]||0),0)/waterDays.length*10)/10:0;
  // Sleep avg
  const sleepDays=l30.filter(d=>S.sleep[d]&&S.sleep[d].hours);
  const sleepAvg=sleepDays.length?Math.round(sleepDays.reduce((a,d)=>a+(S.sleep[d].hours||0),0)/sleepDays.length*10)/10:0;

  // Achievements
  const unlocked=getUnlockedAchievements();

  // Heatmap — last 91 days (13 weeks)
  const hmDays=lastN(91);

  return `
    <h1 class="page-title reveal">Analytics</h1>
    <div class="reveal grid2" style="margin-bottom:18px">
      ${[["📈","30d Average",`${avgEff}%`,"#6C63FF"],["🌟","Perfect Days",`${perfect}d`,"#10b981"],["🔥","Streak",`${streak}d`,"#E11D48"],["🏆","Best Day",bestDay.slice(5),"#D97706"]].map(([ic,lb,vl,cl])=>`
        <div class="stat-card"><div style="font-size:24px">${ic}</div><div style="font-weight:800;font-size:22px;color:${cl};margin-top:6px">${vl}</div><div style="font-size:11px;color:var(--muted);margin-top:3px">${lb}</div></div>`).join("")}
    </div>

    <!-- Wellness summary chips -->

// ── EVENT HANDLERS ────────────────────────────────────────────────────────────
function switchTab(tab){
  if(tab===S.tab&&!S.dayView)return;
  S.tab=tab; S.dayView=false;
  render();
  document.getElementById("scroll-area").scrollTop=0;
}
function prevMonth(){if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;render();}
function nextMonth(){if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;render();}
function selectDate(date){S.selDate=date;S.dayView=true;render();document.getElementById("scroll-area").scrollTop=0;}
function backFromDay(){S.dayView=false;render();}
function toggleCheck(date,id){S.checks[date]=S.checks[date]||{};S.checks[date][id]=!S.checks[date][id];persist();render();}
function toggleWorkout(date,i){S.checks[date]=S.checks[date]||{};S.checks[date][`wx_${i}`]=!S.checks[date][`wx_${i}`];persist();render();}
function toggleReward(date){S.rewards[date]=!S.rewards[date];persist();render();}
function toggleException(date){S.exceptions[date]=!S.exceptions[date];persist();render();}
function addExtra(date){const lb=prompt("Task for this day:");if(lb?.trim()){S.extra[date]=S.extra[date]||[];S.extra[date].push({id:Date.now(),label:lb.trim(),done:false});persist();render();}}
function toggleExtra(date,i){S.extra[date][i].done=!S.extra[date][i].done;persist();render();}
function deleteExtra(date,i){S.extra[date].splice(i,1);persist();render();}
function saveNote(date,val){S.notes[date]=val;persist();}
function doomInc(date){S.doom[date]=(S.doom[date]||0)+5;persist();const v=document.getElementById("doom-val"),b=document.getElementById("doom-bar-fill");if(v){const m=S.doom[date];const col=m>60?"#E11D48":m>30?"#D97706":"var(--accent)";v.textContent=m;v.style.color=col;if(b){b.style.width=Math.min(m/120*100,100)+"%";b.style.background=col;}}}
function doomDec(date){S.doom[date]=Math.max(0,(S.doom[date]||0)-5);persist();const v=document.getElementById("doom-val"),b=document.getElementById("doom-bar-fill");if(v){const m=S.doom[date];const col=m>60?"#E11D48":m>30?"#D97706":"var(--accent)";v.textContent=m;v.style.color=col;if(b){b.style.width=Math.min(m/120*100,100)+"%";b.style.background=col;}}}
function addPhotos(event,date){
  const files=Array.from(event.target.files);
  let count=files.length;
  if(!count)return;
  files.forEach(f=>{const r=new FileReader();r.onload=e=>{S.photos[date]=S.photos[date]||[];S.photos[date].push(e.target.result);count--;persist();if(count===0)render();};r.readAsDataURL(f);});
}
function deletePhoto(date,i){S.photos[date].splice(i,1);persist();render();}
function setTheme(k){S.themeKey=k;persist();render();}
function setAccent(k){S.accentKey=k;persist();render();}
function toggleWoEditor(){S.showWoEd=!S.showWoEd;render();}
function addExercise(day){const ex=prompt(`Add exercise for ${DAYS[day]}:`);if(ex?.trim()){S.workout[day]=S.workout[day]||[];S.workout[day].push(ex.trim());persist();render();}}
function removeExercise(day,i){S.workout[day].splice(i,1);persist();render();}
function toggleEditSec(sec){S.editSec=S.editSec===sec?null:sec;render();}
function addTask(sec){
  const lb=prompt("Task label:"); if(!lb?.trim())return;
  const ic=prompt("Icon (emoji):")||"⚡";
  const task={id:"c"+Date.now(),label:lb.trim(),icon:ic,sub:"custom"};
  if(sec==="physical"){S.ptasks.push(task);}else if(sec==="mental"){S.mtasks.push(task);}else{S.ftasks.push(task);}
  persist();render();
}
function deleteTask(key,id){
  if(key==="ptasks")S.ptasks=S.ptasks.filter(t=>t.id!==id);
  else if(key==="mtasks")S.mtasks=S.mtasks.filter(t=>t.id!==id);
  else S.ftasks=S.ftasks.filter(t=>t.id!==id);
  persist();render();
}
function resetToday(){if(confirm("Reset today's data?")){delete S.checks[todayStr()];delete S.mood[todayStr()];delete S.water[todayStr()];delete S.sleep[todayStr()];persist();render();}}

// ── MOOD / WATER / SLEEP HANDLERS ────────────────────────────────────────────
function setMood(date, moodId){
  S.mood[date] = S.mood[date]===moodId ? null : moodId;
  persist(); render();
}
function setWater(date, cups){
  S.water[date] = cups === S.water[date] ? cups-1 : cups;
  if(S.water[date]<0)S.water[date]=0;
  persist(); render();
}
function setSleepHours(date, hours){
  S.sleep[date] = S.sleep[date]||{};
  S.sleep[date].hours = parseFloat(hours);
  persist();
  // Update slider gradient
  const sliderPct=(parseFloat(hours)-1)/11*100;
  document.querySelectorAll('.sleep-slider').forEach(sl=>{sl.style.background=`linear-gradient(to right,#818cf8 ${sliderPct}%,var(--border) ${sliderPct}%)`;});
}
function updateSleepSlider(val){
  const el=document.getElementById("sleep-val");
  if(el)el.textContent=val+'h';
  const sliderPct=(parseFloat(val)-1)/11*100;
  document.querySelectorAll('.sleep-slider').forEach(sl=>{sl.style.background=`linear-gradient(to right,#818cf8 ${sliderPct}%,var(--border) ${sliderPct}%)`;});
}
function setSleepQuality(date, quality){
  S.sleep[date] = S.sleep[date]||{hours:7};
  S.sleep[date].quality = S.sleep[date].quality===quality?null:quality;
  persist(); render();
}
function scrollToCard(id){
  const el=document.getElementById(id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

// ── PIN LOCK ──────────────────────────────────────────────────────────────────
let pinBuffer='', pinMode='unlock', pinTempHash='';

function showPinLock(){
  pinBuffer=''; pinMode='unlock';
  document.body.style.background=T().bg;
  document.getElementById("content").innerHTML='';
  // Show PIN modal
  const existing=document.getElementById("pin-overlay");
  if(existing)existing.remove();
  const overlay=document.createElement("div");
  overlay.id="pin-overlay";
  overlay.style.cssText=`position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:${T().bg};`;
  overlay.innerHTML=`
    <div class="pin-box" id="pin-box">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:40px;margin-bottom:8px">🔐</div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text)">Wellness OS</div>
        <div style="font-size:13px;color:var(--sub);margin-top:4px" id="pin-subtitle">Enter your PIN</div>
      </div>
      <div class="pin-dots" id="pin-dots">
        ${Array.from({length:4},(_,i)=>`<div class="pin-dot" id="pd-${i}"></div>`).join("")}
      </div>
      <div class="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinPress('${n}')">${n}</button>`).join("")}
        <button class="pin-key zero" onclick="pinPress('0')">0</button>
        <button class="pin-key del" onclick="pinDel()">⌫</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  applyTheme();
}

function showSetPin(){
  pinBuffer=''; pinMode='set1';
  const bg=document.createElement("div");
  bg.className="modal-bg pin-modal"; bg.id="set-pin-modal";
  bg.innerHTML=`
    <div class="pin-box" id="pin-box">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:32px;margin-bottom:8px">🔐</div>
        <div style="font-weight:700;font-size:18px;color:var(--text)">Set a PIN</div>
        <div style="font-size:13px;color:var(--sub);margin-top:4px" id="set-pin-subtitle">Enter a 4-digit PIN</div>
      </div>
      <div class="pin-dots" id="pin-dots">
        ${Array.from({length:4},(_,i)=>`<div class="pin-dot" id="pd-${i}"></div>`).join("")}
      </div>
      <div class="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinSetPress('${n}')">${n}</button>`).join("")}
        <button class="pin-key zero" onclick="pinSetDel()">0</button>
        <button class="pin-key del" onclick="pinSetDelBtn()">⌫</button>
      </div>
      <button class="btn btn-surface btn-full" style="margin-top:16px" onclick="document.getElementById('set-pin-modal').remove()">Cancel</button>
    </div>`;
  document.body.appendChild(bg);
}

function pinPress(n){
  if(pinBuffer.length>=4)return;
  pinBuffer+=n;
  updatePinDots('pin-dots',pinBuffer.length);
  if(pinBuffer.length===4){
    setTimeout(()=>{
      if(hashPin(pinBuffer)===S.pinHash){
        S.pinUnlocked=true;
        document.getElementById("pin-overlay")?.remove();
        render();
      } else {
        pinBuffer='';
        shakePin();
        document.getElementById("pin-subtitle").textContent='Incorrect PIN — try again';
      }
    },100);
  }
}
function pinDel(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots('pin-dots',pinBuffer.length);}

function pinSetPress(n){
  if(pinBuffer.length>=4)return;
  pinBuffer+=n;
  updatePinDots('pin-dots',pinBuffer.length);
  if(pinBuffer.length===4){
    setTimeout(()=>{
      if(pinMode==='set1'){
        pinTempHash=hashPin(pinBuffer);
        pinBuffer=''; pinMode='set2';
        updatePinDots('pin-dots',0);
        document.getElementById("set-pin-subtitle").textContent='Confirm your PIN';
      } else {
        if(hashPin(pinBuffer)===pinTempHash){
          S.pinHash=pinTempHash; S.pinEnabled=true; persist();
          document.getElementById("set-pin-modal")?.remove();
          render();
        } else {
          pinBuffer=''; pinMode='set1'; pinTempHash='';
          shakePin();
          document.getElementById("set-pin-subtitle").textContent="PINs didn't match — try again";
        }
      }
    },100);
  }
}
function pinSetDel(){
  // This is actually the 0 button in set pin mode
  if(pinBuffer.length>=4)return;
  pinBuffer+='0'; updatePinDots('pin-dots',pinBuffer.length);
  if(pinBuffer.length===4){
    setTimeout(()=>{
      if(pinMode==='set1'){
        pinTempHash=hashPin(pinBuffer); pinBuffer=''; pinMode='set2';
        updatePinDots('pin-dots',0);
        document.getElementById("set-pin-subtitle").textContent='Confirm your PIN';
      } else {
        if(hashPin(pinBuffer)===pinTempHash){
          S.pinHash=pinTempHash; S.pinEnabled=true; persist();
          document.getElementById("set-pin-modal")?.remove(); render();
        } else {
          pinBuffer=''; pinMode='set1'; pinTempHash=''; shakePin();
          document.getElementById("set-pin-subtitle").textContent="PINs didn't match — try again";
        }
      }
    },100);
  }
}
function pinSetDelBtn(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots('pin-dots',pinBuffer.length);}

function updatePinDots(containerId, count){
  document.querySelectorAll(`#${containerId} .pin-dot`).forEach((d,i)=>{
    d.classList.toggle('filled',i<count);
  });
}
function shakePin(){
  document.querySelectorAll('.pin-dot').forEach(d=>{d.classList.add('error');setTimeout(()=>d.classList.remove('error'),500);});
}
function disablePin(){
  if(confirm("Disable PIN lock? Your data will be unprotected.")){
    S.pinEnabled=false; S.pinHash=''; S.pinUnlocked=false;
    persist(); render();
  }
}

// ── DATA ─────────────────────────────────────────────────────────────────────
function exportData(){
  const data={ptasks:S.ptasks,mtasks:S.mtasks,ftasks:S.ftasks,checks:S.checks,notes:S.notes,workout:S.workout,rewards:S.rewards,exceptions:S.exceptions,extra:S.extra,doom:S.doom,mood:S.mood,water:S.water,sleep:S.sleep,themeKey:S.themeKey,accentKey:S.accentKey};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="wellness_os_backup.json";a.click();
}
function importData(event){
  const f=event.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(d.ptasks)S.ptasks=d.ptasks;if(d.mtasks)S.mtasks=d.mtasks;if(d.ftasks)S.ftasks=d.ftasks;
    if(d.checks)S.checks=d.checks;if(d.notes)S.notes=d.notes;if(d.workout)S.workout=d.workout;
    if(d.rewards)S.rewards=d.rewards;if(d.exceptions)S.exceptions=d.exceptions;
    if(d.extra)S.extra=d.extra;if(d.doom)S.doom=d.doom;
    if(d.mood)S.mood=d.mood;if(d.water)S.water=d.water;if(d.sleep)S.sleep=d.sleep;
    if(d.themeKey)S.themeKey=d.themeKey;if(d.accentKey)S.accentKey=d.accentKey;
    persist();render();alert("✅ Data imported!");
  }catch{alert("❌ Invalid file");}};r.readAsText(f);
}
function showReport(){
  const today=todayStr(),checks=S.checks[today]||{};
  const l7=last7(),avgEff=Math.round(l7.reduce((a,d)=>a+getEff(d),0)/7);
  const moodEmojis=l7.map(d=>S.mood[d]?MOODS.find(m=>m.id===S.mood[d])?.emoji:'—');
  const waterL7=l7.map(d=>S.water[d]||0);
  const sleepL7=l7.map(d=>S.sleep[d]?S.sleep[d].hours+'h':'—');
  const lines=[
    `# Weekly Wellness Report`,``,
    `**Date:** ${new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}`,
    `**7-Day Avg Efficiency:** ${avgEff}%   **Streak:** ${getStreak()} days`,``,
    `## Daily Breakdown`,
    ...l7.map((d,i)=>`- **${d}**: ${getEff(d)}% | Mood: ${moodEmojis[i]} | Water: ${waterL7[i]}/8 | Sleep: ${sleepL7[i]}${S.rewards[d]?" 🌟":""}${S.exceptions[d]?" ⚡":""}${S.notes[d]?` · ${S.notes[d].slice(0,60)}`:""}`),
    ``,`## Today's Tasks`,
    `### Physical`,...S.ptasks.map(t=>`- [${checks[t.id]?"x":" "}] ${t.icon} ${t.label}`),
    `### Mental`,  ...S.mtasks.map(t=>`- [${checks[t.id]?"x":" "}] ${t.icon} ${t.label}`),
    `### Family`,  ...S.ftasks.map(t=>`- [${checks[t.id]?"x":" "}] ${t.icon} ${t.label}`),
    ``,`## Doom Scroll (Last 7 Days)`,
    ...l7.map(d=>`- ${d}: ${S.doom[d]||0} min`),
  ].join("\n");

  const bg=document.createElement("div"); bg.className="modal-bg"; bg.id="report-modal";
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.innerHTML=`
    <div class="modal-box">
      <div class="flex-between" style="margin-bottom:16px">
        <div style="font-weight:700;font-size:16px;color:var(--text)">🤖 Claude Report</div>
        <button onclick="document.getElementById('report-modal').remove()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1">×</button>
      </div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:12px;line-height:1.5">Copy this and paste to Claude for analysis & personalized advice:</div>
      <div style="background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border);font-size:11px;color:var(--text);font-family:'Courier New',monospace;white-space:pre-wrap;max-height:280px;overflow:auto;margin-bottom:14px;line-height:1.6">${lines}</div>
      <button class="btn btn-accent btn-full" onclick="navigator.clipboard.writeText(\`${lines.replace(/`/g,"\\`")}\`).then(()=>alert('📋 Copied!')).catch(()=>alert('Select and copy manually'))">📋 Copy to Clipboard</button>
    </div>`;
  document.body.appendChild(bg);
}

// ── PWA ───────────────────────────────────────────────────────────────────────
// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
