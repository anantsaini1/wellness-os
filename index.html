  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: #000; color: #fff; overscroll-behavior: none; }
    #app { height: 100dvh; display: flex; flex-direction: column; max-width: 640px; margin: 0 auto; position: relative; overflow: hidden; }
    #scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
    #scroll-area::-webkit-scrollbar { width: 3px; }
    #scroll-area::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }
    .topbar { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 14px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
    .content { padding: 18px 20px 100px; }
    .bottomnav { position: sticky; bottom: 0; border-top: 1px solid var(--border); display: flex; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; flex-shrink: 0; }
    .navbtn { flex: 1; padding: 11px 0 max(13px, env(safe-area-inset-bottom)); background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; transition: all 0.2s; font-family: inherit; }
    .navbtn .navicon { font-size: 20px; transition: transform 0.2s; }
    .navbtn.active .navicon { transform: scale(1.15); }
    .navbtn .navlabel { font-size: 10px; font-weight: 400; letter-spacing: 0.3px; transition: color 0.2s; }
    .navbtn.active .navlabel { font-weight: 700; }
    .navbtn .nav-pip { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 28px; height: 3px; border-radius: 0 0 6px 6px; display: none; }
    .navbtn.active .nav-pip { display: block; }
    .card { border-radius: 18px; border: 1px solid var(--border); background: var(--card); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px; }
    .card-body { padding: 18px; }
    .card-header { padding: 13px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .tab-content { animation: tabIn 0.25s ease; }
    @keyframes tabIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-bg { position: fixed; inset: 0; background: #000b; z-index: 999; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal-box { border-radius: 24px 24px 0 0; width: 100%; max-width: 640px; max-height: 85vh; overflow-y: auto; padding: 24px; animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); background: var(--card); }
    .btn { border: none; cursor: pointer; font-family: inherit; font-weight: 600; border-radius: 12px; padding: 10px 16px; transition: all 0.2s; font-size: 13px; }
    .btn-accent { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
    .btn-surface { background: var(--surface); color: var(--sub); border: 1px solid var(--border); }
    .btn-danger { background: #E11D4812; color: #E11D48; border: 1px solid #E11D4830; }
    .btn-full { display: block; width: 100%; padding: 13px; border-radius: 13px; font-size: 14px; font-weight: 700; text-align: center; }
    .check-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
    .check-row:last-child { border-bottom: none; }
    .check-box { width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.22s; font-size: 11px; font-weight: 700; color: #fff; }
    .check-box.checked { color: #fff; }
    .check-label { font-size: 13px; font-weight: 500; flex: 1; transition: all 0.2s; }
    .check-label.done { text-decoration: line-through; color: var(--muted); }
    .prog-bar-wrap { height: 5px; border-radius: 99px; overflow: hidden; margin: 8px 0 14px; }
    .prog-bar-track { height: 100%; background: color-mix(in srgb, #fff 12%, transparent); }
    .prog-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    input, textarea, select { font-family: inherit; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; color: var(--text); font-size: 14px; outline: none; width: 100%; }
    textarea { resize: vertical; line-height: 1.6; }
    select option { background: var(--card); }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; box-shadow: var(--shadow); }
    .hero-card { border-radius: 22px; padding: 26px; margin-bottom: 18px; position: relative; overflow: hidden; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-day { border-radius: 11px; padding: 7px 2px 5px; cursor: pointer; text-align: center; border: 1px solid var(--border); background: var(--card); transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1); }
    .cal-day:active { transform: scale(0.95); }
    .cal-day.today { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .cal-day.selected { background: var(--accent); border-color: var(--accent); transform: scale(1.06); box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 40%, transparent); }
    .photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .photo-thumb { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-del { position: absolute; top: 5px; right: 5px; background: #000a; border: none; color: #fff; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .ring-svg text { font-family: 'DM Sans', sans-serif; }
    canvas { max-height: 180px; }
    .doom-bar { height: 6px; border-radius: 99px; overflow: hidden; margin-top: 12px; background: color-mix(in srgb, #fff 12%, transparent); }
    .theme-btn { padding: 13px 14px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 9px; transition: all 0.22s; font-family: inherit; }
    .accent-pill { padding: 9px 18px; border-radius: 99px; border: 2px solid transparent; cursor: pointer; transition: all 0.22s; font-weight: 700; font-size: 13px; font-family: inherit; }
    .flex-row { display: flex; align-items: center; gap: 10px; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .empty-state { text-align: center; padding: 16px 0; color: var(--muted); font-size: 13px; }
    h1.page-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 22px; }
  </style>
</head>

// ── THEME APPLY ──────────────────────────────────────────────────────────────
function applyTheme(){
  const T=THEMES[S.themeKey]||THEMES.amoled, A=ACCENTS[S.accentKey]||ACCENTS.indigo;
  const r=document.documentElement.style;
  r.setProperty("--bg",T.bg);     r.setProperty("--surface",T.surface);
  r.setProperty("--card",T.card); r.setProperty("--border",T.border);
  r.setProperty("--text",T.text); r.setProperty("--sub",T.sub);
  r.setProperty("--muted",T.muted);r.setProperty("--shadow",T.shadow);
  r.setProperty("--accent",A.p);  r.setProperty("--grad",A.g);
  document.body.style.background=T.bg;
  document.body.style.color=T.text;
  document.getElementById("topbar").style.background=T.bg+"f0";
  document.getElementById("logo").style.background=A.g;
  document.getElementById("logo").style.webkitBackgroundClip="text";
  document.getElementById("logo").style.webkitTextFillColor="transparent";
  document.querySelectorAll(".nav-pip").forEach(p=>p.style.background=A.p);
  document.querySelectorAll(".navbtn.active .navlabel").forEach(l=>l.style.color=A.p);
  document.querySelector("#bottomnav").style.borderTopColor=T.border;
  // Chart.js global defaults
  if(window.Chart){ Chart.defaults.color=T.sub; Chart.defaults.borderColor=T.border; }
}

// ── UTILS ────────────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const dk=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const allTasks=()=>[...S.ptasks,...S.mtasks,...S.ftasks];
function getEff(date){
  const ch=S.checks[date]||{}, ex=S.extra[date]||[];
  const all=allTasks(), total=all.length+ex.length;
  if(!total)return 0;
  const done=all.filter(t=>ch[t.id]).length+ex.filter(t=>t.done).length;
  return Math.round(done/total*100);
}
function getStreak(){
  let s=0; const d=new Date();
  for(let i=0;i<365;i++){const k=d.toISOString().slice(0,10);if(getEff(k)>=50){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}
function last7(){return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().slice(0,10);});}
function last30(){return Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(29-i));return d.toISOString().slice(0,10);});}
const A=()=>ACCENTS[S.accentKey]||ACCENTS.indigo;
const T=()=>THEMES[S.themeKey]||THEMES.amoled;

// ── SCROLL REVEAL ─────────────────────────────────────────────────────────────
function initReveal(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");io.unobserve(e.target);}});
  },{threshold:0.05});
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────────
let chartInstances={};
function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch{}});chartInstances={};}

function render(){
  destroyCharts();
  applyTheme();
  updateNav();
  updateStatus();
  const content=document.getElementById("content");
  content.innerHTML=`<div class="tab-content">${buildContent()}</div>`;
  requestAnimationFrame(()=>{ initReveal(); initCharts(); });
}

function updateNav(){
  document.querySelectorAll(".navbtn").forEach(b=>{
    const active=b.dataset.tab===S.tab;
    b.classList.toggle("active",active);
    b.querySelector(".navlabel").style.color=active?A().p:T().muted;
    b.querySelector(".nav-pip").style.background=A().p;
  });
}

function updateStatus(){
  const eff=getEff(todayStr());
  const dot=document.getElementById("status-dot");
  const col=eff===100?"#10b981":eff>50?A().p:"#E11D48";
  dot.style.background=col; dot.style.boxShadow=`0 0 6px ${col}`;
  document.getElementById("status-pct").textContent=`${eff}% today`;
}

function buildContent(){
  if(S.tab==="calendar") return S.dayView?buildDayView():buildCalendar();
  if(S.tab==="analytics") return buildAnalytics();
  if(S.tab==="settings") return buildSettings();
  return buildHome();
}

// ── EVENT HANDLERS ────────────────────────────────────────────────────────────
function switchTab(tab){
  if(tab===S.tab&&!S.dayView)return;
  S.tab=tab; S.dayView=false;
  render();
  document.getElementById("scroll-area").scrollTop=0;
}
function prevMonth(){if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;render();}
function nextMonth(){if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;render();}
function selectDate(date){S.selDate=date;S.dayView=true;render();document.getElementById("scroll-area").scrollTop=0;}
function backFromDay(){S.dayView=false;render();}
function toggleCheck(date,id){S.checks[date]=S.checks[date]||{};S.checks[date][id]=!S.checks[date][id];persist();render();}
function toggleWorkout(date,i){S.checks[date]=S.checks[date]||{};S.checks[date][`wx_${i}`]=!S.checks[date][`wx_${i}`];persist();render();}
function toggleReward(date){S.rewards[date]=!S.rewards[date];persist();render();}
function toggleException(date){S.exceptions[date]=!S.exceptions[date];persist();render();}
function counterInc(date,id){S.checks[date]=S.checks[date]||{};S.checks[date][id+"_c"]=(S.checks[date][id+"_c"]||0)+1;persist();render();}
function counterDec(date,id){S.checks[date]=S.checks[date]||{};S.checks[date][id+"_c"]=Math.max(0,(S.checks[date][id+"_c"]||0)-1);persist();render();}
function addExtra(date){const lb=prompt("Task for this day:");if(lb?.trim()){S.extra[date]=S.extra[date]||[];S.extra[date].push({id:Date.now(),label:lb.trim(),done:false});persist();render();}}
function toggleExtra(date,i){S.extra[date][i].done=!S.extra[date][i].done;persist();render();}
function deleteExtra(date,i){S.extra[date].splice(i,1);persist();render();}
function saveNote(date,val){S.notes[date]=val;persist();}
function doomInc(date){S.doom[date]=(S.doom[date]||0)+5;persist();const v=document.getElementById("doom-val"),b=document.getElementById("doom-bar-fill");if(v){const m=S.doom[date];const col=m>60?"#E11D48":m>30?"#D97706":"var(--accent)";v.textContent=m;v.style.color=col;if(b){b.style.width=Math.min(m/120*100,100)+"%";b.style.background=col;}}}
function doomDec(date){S.doom[date]=Math.max(0,(S.doom[date]||0)-5);persist();const v=document.getElementById("doom-val"),b=document.getElementById("doom-bar-fill");if(v){const m=S.doom[date];const col=m>60?"#E11D48":m>30?"#D97706":"var(--accent)";v.textContent=m;v.style.color=col;if(b){b.style.width=Math.min(m/120*100,100)+"%";b.style.background=col;}}}
function addPhotos(event,date){
  const files=Array.from(event.target.files);
  let count=files.length;
  if(!count)return;
  files.forEach(f=>{const r=new FileReader();r.onload=e=>{S.photos[date]=S.photos[date]||[];S.photos[date].push(e.target.result);count--;persist();if(count===0)render();};r.readAsDataURL(f);});
}
function deletePhoto(date,i){S.photos[date].splice(i,1);persist();render();}
function setTheme(k){S.themeKey=k;persist();render();}
function setAccent(k){S.accentKey=k;persist();render();}
function toggleWoEditor(){S.showWoEd=!S.showWoEd;render();}
function addExercise(day){const ex=prompt(`Add exercise for ${DAYS[day]}:`);if(ex?.trim()){S.workout[day]=S.workout[day]||[];S.workout[day].push(ex.trim());persist();render();}}
function removeExercise(day,i){S.workout[day].splice(i,1);persist();render();}
function toggleEditSec(sec){S.editSec=S.editSec===sec?null:sec;render();}
function addTask(sec){
  const lb=prompt("Task label:"); if(!lb?.trim())return;
  const ic=prompt("Icon (emoji):")||"⚡";
  const task={id:"c"+Date.now(),label:lb.trim(),icon:ic,sub:"custom"};
  if(sec==="physical"){S.ptasks.push(task);}else if(sec==="mental"){S.mtasks.push(task);}else{S.ftasks.push(task);}
  persist();render();
}
function deleteTask(key,id){
  if(key==="ptasks")S.ptasks=S.ptasks.filter(t=>t.id!==id);
  else if(key==="mtasks")S.mtasks=S.mtasks.filter(t=>t.id!==id);
  else S.ftasks=S.ftasks.filter(t=>t.id!==id);
  persist();render();
}
function resetToday(){if(confirm("Reset today's data?")){delete S.checks[todayStr()];persist();render();}}
function exportData(){
  const data={ptasks:S.ptasks,mtasks:S.mtasks,ftasks:S.ftasks,checks:S.checks,notes:S.notes,workout:S.workout,rewards:S.rewards,exceptions:S.exceptions,extra:S.extra,doom:S.doom,themeKey:S.themeKey,accentKey:S.accentKey};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="wellness_os_backup.json";a.click();
}
function importData(event){
  const f=event.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(d.ptasks)S.ptasks=d.ptasks;if(d.mtasks)S.mtasks=d.mtasks;if(d.ftasks)S.ftasks=d.ftasks;
    if(d.checks)S.checks=d.checks;if(d.notes)S.notes=d.notes;if(d.workout)S.workout=d.workout;
    if(d.rewards)S.rewards=d.rewards;if(d.exceptions)S.exceptions=d.exceptions;
    if(d.extra)S.extra=d.extra;if(d.doom)S.doom=d.doom;
    if(d.themeKey)S.themeKey=d.themeKey;if(d.accentKey)S.accentKey=d.accentKey;
    persist();render();alert("✅ Data imported!");
  }catch{alert("❌ Invalid file");}};r.readAsText(f);
}
function showReport(){
  const today=todayStr(),checks=S.checks[today]||{};
  const l7=last7(),avgEff=Math.round(l7.reduce((a,d)=>a+getEff(d),0)/7);
  const lines=[
    `# Weekly Wellness Report`,``,
    `**Date:** ${new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}`,
    `**7-Day Avg Efficiency:** ${avgEff}%   **Streak:** ${getStreak()} days`,``,
    `## Daily Breakdown`,
    ...l7.map(d=>`- **${d}**: ${getEff(d)}%${S.rewards[d]?" 🌟":""}${S.exceptions[d]?" ⚡":""}${S.notes[d]?` · ${S.notes[d].slice(0,60)}`:""}`),
    ``,`## Today's Tasks`,
    `### Physical`,...S.ptasks.map(t=>`- [${checks[t.id]?"x":" "}] ${t.icon} ${t.label}`),
    `### Mental`,  ...S.mtasks.map(t=>`- [${checks[t.id]?"x":" "}] ${t.icon} ${t.label}`),
    `### Family`,  ...S.ftasks.map(t=>`- [${checks[t.id]?"x":" "}] ${t.icon} ${t.label}`),
    ``,`## Doom Scroll (Last 7 Days)`,
    ...l7.map(d=>`- ${d}: ${S.doom[d]||0} min`),
  ].join("\n");

  const bg=document.createElement("div"); bg.className="modal-bg"; bg.id="report-modal";
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.innerHTML=`
    <div class="modal-box">
      <div class="flex-between" style="margin-bottom:16px">
        <div style="font-weight:700;font-size:16px;color:var(--text)">🤖 Claude Report</div>
        <button onclick="document.getElementById('report-modal').remove()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1">×</button>
      </div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:12px;line-height:1.5">Copy this and paste to Claude for analysis & personalized advice:</div>
      <div style="background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border);font-size:11px;color:var(--text);font-family:'Courier New',monospace;white-space:pre-wrap;max-height:280px;overflow:auto;margin-bottom:14px;line-height:1.6">${lines}</div>
      <button class="btn btn-accent btn-full" onclick="navigator.clipboard.writeText(\`${lines.replace(/`/g,"\\`")}\`).then(()=>alert('📋 Copied!')).catch(()=>alert('Select and copy manually'))">📋 Copy to Clipboard</button>
    </div>`;
  document.body.appendChild(bg);
}
