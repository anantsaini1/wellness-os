<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="W·OS"/>
<title>Wellness OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d0b09;--p2:#161310;--p3:#1e1a16;--p4:#252018;
  --ln:#ffffff0d;--l2:#ffffff18;--l3:#ffffff28;
  --t:#f2ede6;--t2:#c4b89a;--t3:#7a6e5a;
  --ac:#e8c87a;--ac2:#c4a050;
  --red:#e05a48;--green:#5db87a;--blue:#6aaad8;--purple:#a878e0;--orange:#e8904a;
  --r8:12px;--r12:16px;--r16:20px;--r20:26px;
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--bg);color:var(--t);overscroll-behavior:none}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden;position:relative}

/* TOP NAV — FitFuel horizontal tabs style */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--bg);flex-shrink:0;position:relative;z-index:10;border-bottom:1px solid var(--ln)}
.logo{display:flex;align-items:center;gap:8px}
.logo-w{font-family:'Fraunces',serif;font-size:30px;font-style:italic;font-weight:300;color:var(--ac);letter-spacing:-2px;line-height:1}
.logo-meta{display:flex;flex-direction:column;gap:1px}
.logo-title{font-size:8px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--t2);line-height:1}
.logo-by{font-size:6px;font-weight:700;color:var(--t3);line-height:1}
#topbar-right{display:flex;align-items:center;gap:8px}
#date-chip{font-size:10px;font-weight:700;color:var(--t3)}
.ring-sm{position:relative;width:32px;height:32px}
.ring-sm svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-sm span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:var(--ac)}

/* SUBTABS — premium FitFuel with icons */
#subtab-bar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--ln);flex-shrink:0;padding:0 8px;gap:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#subtab-bar::-webkit-scrollbar{display:none}
.stb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px 7px;border:none;background:transparent;cursor:pointer;white-space:nowrap;position:relative;transition:all .2s;font-family:'Cabinet Grotesk',sans-serif;flex-shrink:0}
.stb svg{width:16px;height:16px;color:var(--t3);transition:color .2s;stroke:currentColor}
.stb span{font-size:8px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--t3);transition:color .2s;line-height:1}
.stb.on svg{color:var(--ac)}
.stb.on span{color:var(--ac)}
.stb.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--ac);border-radius:2px}
.stb:active{opacity:.6}
.stb:active{opacity:.6}

/* SCROLL */
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#scroll::-webkit-scrollbar{display:none}
.pad{padding-bottom:env(safe-area-inset-bottom,16px)}



/* DARK CARDS */
.dc{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r20);overflow:hidden;position:relative}
.dc-sm{background:var(--p3);border:1px solid var(--ln);border-radius:var(--r16);overflow:hidden;position:relative}
/* glow variants */
.glow-gold::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 100%,#e8c87a18 0%,transparent 60%);pointer-events:none;z-index:0}
.glow-blue::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0% 50%,#6aaad820 0%,transparent 55%);pointer-events:none;z-index:0}
.glow-purple::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 0%,#a878e020 0%,transparent 55%);pointer-events:none;z-index:0}
.glow-green::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,#5db87a20 0%,transparent 55%);pointer-events:none;z-index:0}
.glow-red::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 100% 0%,#e05a4820 0%,transparent 55%);pointer-events:none;z-index:0}

/* SECTION LABEL */
.sec-lbl{font-size:7px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:var(--r12);border:1px solid var(--l2);background:transparent;font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:800;color:var(--t);cursor:pointer;transition:all .15s}
.btn-ac{background:var(--ac);border-color:var(--ac);color:#0c0a08}
.btn-ghost{background:#ffffff05;border-color:var(--ln)}
.btn-red{background:var(--red)12;border-color:var(--red)35;color:var(--red)}
.btn-full{width:100%}
.btn:active{transform:scale(.95)}
.btn-dark{background:var(--p3);border:1px solid var(--ln);color:var(--t2);font-family:'Cabinet Grotesk',sans-serif;font-size:12px;font-weight:700;padding:8px 14px;border-radius:var(--r8);cursor:pointer;transition:all .15s}
.btn-dark:active{background:var(--p4)}

/* TASK ROW */
.trow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--ln);cursor:pointer;transition:background .1s;-webkit-user-select:none;user-select:none}
.trow:active{background:#ffffff04}
.tcb{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--l2);display:flex;align-items:center;justify-content:center;transition:all .2s var(--spring);flex-shrink:0}
.tcb.on{transform:scale(1.08)}
.tico{font-size:16px;flex-shrink:0}
.tlbl{font-size:13px;font-weight:700;color:var(--t);flex:1}
.tlbl.done{color:var(--t3);text-decoration:line-through}

/* OLD COMPAT */
.card{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);margin:0 14px;overflow:hidden}
.card+.card{margin-top:8px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px}
.card-prog{height:1.5px;background:var(--ln)}
.card-prog-fill{height:100%;border-radius:2px;transition:width 1s var(--ease)}
.lbl{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.g8{height:8px}.g12{height:12px}.g16{height:16px}
.mrow{display:flex;gap:5px;padding:10px 12px 12px}
.mbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 3px;border-radius:var(--r12);border:1px solid var(--ln);background:transparent;cursor:pointer;transition:all .2s var(--spring)}
.mbtn.on{border-color:var(--ac)50;background:var(--ac)0c;transform:scale(1.04)}
.memi{font-size:22px}
.mlbl{font-size:8px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--t3)}
.mbtn.on .mlbl{color:var(--ac)}
.wdrops{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:6px 0 10px}
.wdrop{cursor:pointer;transition:transform .15s var(--spring);width:24px;height:32px}
.wdrop:active{transform:scale(.75)}
.sqrow{display:flex;gap:4px;padding:6px 12px 12px}
.sqbtn{flex:1;padding:7px 2px;border-radius:var(--r8);border:1px solid var(--ln);background:transparent;font-size:10px;font-weight:700;text-align:center;cursor:pointer;color:var(--t3);font-family:'Cabinet Grotesk',sans-serif;transition:all .15s}
.sqbtn.on{border-color:var(--purple)50;background:var(--purple)10;color:var(--purple)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:8px}
.chd{text-align:center;font-size:9px;font-weight:800;color:var(--t3);padding:3px 0}
.cday{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .12s var(--spring);flex-direction:column;gap:1px}
.cday:active{transform:scale(.84)}
.cdn{font-size:12px;font-weight:700;color:var(--t)}
.cday.today .cdn{color:var(--ac);font-weight:900}
.cday.sel{background:var(--ac)}
.cday.sel .cdn{color:#0c0a08;font-weight:900}
.cday.other .cdn{color:var(--t3)}
.cdot{width:4px;height:4px;border-radius:50%}
.fsearch{width:100%;padding:11px 12px 11px 38px;background:var(--p3);border:1px solid var(--ln);border-radius:var(--r12);color:var(--t);font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:700;outline:none;transition:border-color .2s}
.fsearch:focus{border-color:var(--ac)55}
.fsugg{background:var(--p3);border:1px solid var(--l2);border-radius:var(--r12);margin-top:6px;overflow:hidden;max-height:240px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.fsugg-item{padding:11px 14px;cursor:pointer;border-top:1px solid var(--ln);transition:background .1s;display:flex;justify-content:space-between;align-items:center;gap:8px}
.fsugg-item:first-child{border-top:none}
.fsugg-item:active{background:var(--p4)}
.flog-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--ln)}
.flog-item:first-child{border-top:none}
.scrim{position:fixed;inset:0;background:#00000094;z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.sheet{background:var(--p2);border-radius:26px 26px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px 16px 36px;border-top:1px solid var(--l2)}
.shandle{width:36px;height:4px;border-radius:2px;background:var(--l2);margin:0 auto 16px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px}
.stile{background:var(--p3);border:1px solid var(--ln);border-radius:var(--r12);padding:14px;overflow:hidden;position:relative}
.sval{font-family:'Fraunces',serif;font-size:36px;font-style:italic;font-weight:300;line-height:1;color:var(--ac)}
.slbl{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:4px}
.ss-lbl{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:12px 4px 6px;display:block}
.ss-card{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);overflow:hidden;margin:0 14px}
.ss-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:1px solid var(--ln)}
.ss-row:first-child{border-top:none}
.binp{width:100%;padding:9px 11px;background:var(--p3);border:1.5px solid var(--l2);border-radius:var(--r8);color:var(--t);font-family:'Cabinet Grotesk',sans-serif;font-size:14px;font-weight:700;outline:none;transition:border-color .2s}
.binp:focus{border-color:var(--ac)60}
.tsw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s var(--spring);position:relative;overflow:hidden;flex-shrink:0}
.tsw.on{border-color:var(--ac);transform:scale(1.18)}
.asw{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .15s;flex-shrink:0}
.asw.on{outline:2.5px solid var(--t);outline-offset:2px}
.bbbar{height:5px;border-radius:99px;background:var(--ln);overflow:hidden;margin:6px 0 10px}
.bbfill{height:100%;border-radius:99px;transition:width 1.2s var(--ease)}
.bbgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.bbtile{text-align:center;padding:9px 3px;background:var(--p3);border-radius:var(--r8);border:1px solid var(--ln)}
.bmbtn{flex:1;padding:8px 3px;border-radius:var(--r8);border:1px solid var(--ln);background:transparent;cursor:pointer;font-size:11px;font-weight:700;text-align:center;font-family:'Cabinet Grotesk',sans-serif;transition:all .15s;color:var(--t3)}
.bmbtn.on{border-color:var(--ac)50;background:var(--ac)10;color:var(--ac)}
.cmeter{height:4px;border-radius:99px;background:var(--ln);overflow:hidden;margin:8px 0}
.cmfill{height:100%;border-radius:99px;transition:width .8s var(--ease)}
.mrings{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:10px 12px}
.mring-tile{display:flex;flex-direction:column;align-items:center;gap:2px}
.wlrow{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid var(--ln)}
.wlrow:first-child{border-top:none}
.chartcard{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);margin:0 14px;overflow:hidden}
.chartcard-head{padding:11px 14px 8px;border-bottom:1px solid var(--ln)}
.chartcard-body{padding:10px 8px 8px}
.pin-scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:16px;background:var(--bg)}
.pin-logo{font-family:'Fraunces',serif;font-size:52px;font-weight:300;font-style:italic;color:var(--ac);letter-spacing:-2px}
.pin-sub{font-size:13px;font-weight:700;color:var(--t3)}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--l2);transition:all .15s var(--spring)}
.pin-dot.fill{background:var(--ac);border-color:var(--ac);transform:scale(1.15)}
.pin-dot.err{border-color:var(--red);background:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:12px}
.pin-key{width:68px;height:68px;border-radius:50%;border:1px solid var(--l2);background:var(--p3);font-size:22px;font-weight:700;color:var(--t);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:all .12s var(--spring)}
.pin-key:active{background:var(--ac);color:#0c0a08;transform:scale(.9)}
.pin-key.zero{grid-column:2}.pin-key.del{grid-column:3}
.fit-set{display:inline-flex;align-items:center;background:var(--p3);border:1px solid var(--ln);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--t2)}

@keyframes ripple{from{transform:scale(0);opacity:1}to{transform:scale(2.5);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
@keyframes slideL{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
@keyframes numPop{from{opacity:0;transform:translateY(20px) scale(.85)}to{opacity:1;transform:none}}
@keyframes aiDot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
@keyframes streakPop{0%{opacity:0;transform:scale(.4) translateY(30px)}60%{transform:scale(1.15) translateY(-4px)}100%{opacity:1;transform:none}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.tab-r{animation:slideR .22s var(--ease)}
.tab-l{animation:slideL .22s var(--ease)}
.rev{opacity:0}
.rev.shown{opacity:1;animation:fadeUp .3s var(--ease) forwards}
.npop{animation:numPop .48s var(--spring)}
/* themes */
.ember-bg{background:linear-gradient(160deg,#0e0805,#1a1008 50%,#0e0805)!important}
.abyss-bg{background:linear-gradient(160deg,#020510,#040a1c 50%,#020810)!important}
.aurora-bg{background:radial-gradient(ellipse at 30% 0%,#1a084080,#050210)!important}
.pearl-bg{background:#faf6f0!important}
.theme-pearl .dc,.theme-pearl .card,.theme-pearl .chartcard,.theme-pearl .ss-card,.theme-pearl .dc-sm,.theme-pearl .stile{background:#fff!important;border-color:rgba(0,0,0,.07)!important;box-shadow:0 2px 20px rgba(0,0,0,.06)!important}
.theme-pearl #topbar,.theme-pearl #nav,.theme-pearl #subtab-bar{background:#faf6f0!important;border-color:rgba(0,0,0,.08)!important}
.theme-pearl .trow:active{background:rgba(0,0,0,.03)!important}
.sakura-bg{background:#fff5f8!important}
.theme-sakura .dc,.theme-sakura .card,.theme-sakura .chartcard,.theme-sakura .ss-card{background:#fff!important;border-color:rgba(200,60,100,.1)!important;box-shadow:0 2px 20px rgba(200,60,100,.06)!important}
.glass-bg{background:linear-gradient(145deg,#dce8ff,#e8dcff 35%,#ffdcec 65%,#dcfff0)!important}
.theme-glass .dc,.theme-glass .card,.theme-glass .chartcard,.theme-glass .ss-card,.theme-glass #topbar,.theme-glass #nav,.theme-glass #subtab-bar,.theme-glass .sheet,.theme-glass .stile{background:rgba(255,255,255,.55)!important;backdrop-filter:blur(32px) saturate(2);-webkit-backdrop-filter:blur(32px) saturate(2);border-color:rgba(255,255,255,.88)!important;box-shadow:0 2px 24px rgba(0,0,0,.07),inset 0 1px 0 rgba(255,255,255,.95)!important}
.theme-glass #scroll{background:transparent!important}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-w">W·OS</div>
      <div class="logo-meta">
        <div class="logo-title" id="greeting-text">Wellness OS</div>
        <div class="logo-by">by Anant Raj Saini · Claude AI</div>
      </div>
    </div>
    <div id="topbar-right">
      <div id="date-chip">—</div>
      <div class="ring-sm" onclick="haptic();switchTab('analytics')" style="cursor:pointer">
        <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="var(--ln)" stroke-width="2.5"/><circle cx="16" cy="16" r="14" fill="none" stroke="var(--ac)" stroke-width="2.5" stroke-dasharray="0 87.9" stroke-linecap="round" id="tr-ring"/></svg>
        <span id="tr-pct">0%</span>
      </div>
    </div>
  </div>
  <!-- SUBTAB BAR — FitFuel premium -->
  <div id="subtab-bar">
    <button class="stb on" data-main="home" onclick="haptic();switchMain('home')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 10L10 3l7 7"/><path d="M5 8v8h4v-5h2v5h4V8"/></svg>
      <span>Dashboard</span>
    </button>
    <button class="stb" data-main="food" onclick="haptic();switchMain('food')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 2v6a3 3 0 006 0V2"/><path d="M9 8v10"/><path d="M16 2v18"/></svg>
      <span>Nutrition</span>
    </button>
    <button class="stb" data-main="fitness" onclick="haptic();switchMain('fitness')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 3v14M15 3v14M2 7h16M2 13h16"/></svg>
      <span>Fitness</span>
    </button>
    <button class="stb" data-main="calendar" onclick="haptic();switchMain('calendar')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="16" height="16" rx="2"/><path d="M14 1v4M6 1v4M2 8h16"/></svg>
      <span>Activity</span>
    </button>
    <button class="stb" data-main="analytics" onclick="haptic();switchMain('analytics')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="18 10 15 10 12 17 8 3 5 10 2 10"/></svg>
      <span>Stats</span>
    </button>
    <button class="stb" data-main="settings" onclick="haptic();switchMain('settings')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="10" cy="10" r="2.5"/><path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.22 3.22l1.42 1.42M15.36 15.36l1.42 1.42M3.22 16.78l1.42-1.42M15.36 4.64l1.42-1.42"/></svg>
      <span>Settings</span>
    </button>
  </div>
  <div id="scroll"><div id="content" class="pad"></div></div>
</div>
<script>
const THEMES={
  void:   {n:'Void',   bg:'#0c0a08',p2:'#141210',p3:'#1c1916',ln:'#ffffff0e',l2:'#ffffff1c',t:'#f2ede6',t2:'#c4b89a',t3:'#7a6e5a',d:true,  cls:''},

// FUZZY SEARCH ENGINE
// ═══════════════════════════════════════
function fuzzyScore(query,target){
  const q=query.toLowerCase().trim();
  const t=target.toLowerCase();
  if(t.includes(q))return 100;
  // Check word by word
  const words=q.split(' ');
  if(words.every(w=>t.includes(w)))return 90;
  // Levenshtein distance for typo tolerance
  function lev(a,b){
    const m=a.length,n=b.length;
    const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
  }
  // Check each word of query against each word of target
  const tWords=t.split(/[\s\/\(\)]+/);
  let best=999;
  for(const qw of words){
    if(qw.length<2)continue;
    for(const tw of tWords){
      if(tw.length<2)continue;
      const d=lev(qw,tw);
      const pct=d/Math.max(qw.length,tw.length);
      if(pct<best)best=pct;
    }
  }
  if(best<0.35)return Math.round((1-best)*70);
  // Starts with check
  if(t.startsWith(q.slice(0,3)))return 40;
  return 0;
}

const today=()=>new Date().toISOString().slice(0,10);
const dkey=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const allT=()=>[...S.pt,...S.mt,...S.ft];
function eff(date,st=S){
  const ch=st.c[date]||{},all=allT();
  if(!all.length)return 0;
  return Math.round(all.filter(t=>ch[t.id]).length/all.length*100);
}
function streak(st=S){
  let s=0;const d=new Date();
  for(let i=0;i<366;i++){
    const k=d.toISOString().slice(0,10);
    if(eff(k,st)>0)s++;else if(k!==today())break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
const last=n=>Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return d.toISOString().slice(0,10)});
const T=()=>THEMES[S.tk]||THEMES.void;
const A=()=>ACCENTS[S.ak]||ACCENTS.gold;
const MC=id=>MOODS.find(m=>m.id===id);
const hp=p=>{let h=5381;for(let i=0;i<p.length;i++)h=((h<<5)+h)+p.charCodeAt(i);return h.toString(36)};
const wGoalL=()=>S.wgoal||2.0;
const wDrops=()=>Math.round(wGoalL()*4);
const wLabel=v=>{const ml=v*250;return ml>=1000?(ml/1000).toFixed(1)+'L':ml+'ml'};
const wPct=v=>Math.min(100,Math.round(v/wDrops()*100));
function hmColor(p){
  const dk=T().d;
  if(!p)return dk?'#ffffff05':'#00000008';
  if(p<25)return dk?'#1a2a1a':'#c8f0d0';
  if(p<75)return dk?'#1a4a20':'#6dba8a55';
  return dk?'#1e5a22':'#6dba8a';
}
function unlocked(){return ACH.filter(a=>{try{return a.f(S)}catch{return false}})}

// ═══════════════════════════════════════
// BODY CALC
// ═══════════════════════════════════════
function calcBMR(b){
  const base=10*(b.cw||70)+6.25*(b.h||170)-5*22;
  return Math.round(b.sex==='female'?base-161:base+5);
}
function calcTDEE(b){return Math.round(calcBMR(b)*(ACT_MUL[b.act]||1.55))}
function calcBodyGoals(b){
  const tdee=calcTDEE(b),bmr=calcBMR(b);
  const diff=(b.cw||70)-(b.gw||65);
  const dailyDef=diff!==0?Math.round(diff*7700/((b.wks||12)*7)):0;
  const targetCal=Math.max(1200,tdee-dailyDef);
  const weeklyChange=Math.abs(dailyDef*7/7700).toFixed(2);
  const bmi=+((b.cw||70)/(((b.h||170)/100)**2)).toFixed(1);
  const bmiCat=bmi<18.5?'Underweight':bmi<25?'Normal':bmi<30?'Overweight':'Obese';
  return{tdee,bmr,targetCal,dailyDef,weeklyChange,bmi,bmiCat,diff};
}
function getGoals(){
  const cal=S.calgoal||(S.body?.cw&&S.body?.h?Math.max(1200,calcBodyGoals(S.body).targetCal):2000);
  const cw=S.body?.cw||70;
  const p=Math.round(cw*1.8);
  return{cal,p,c:Math.round(cal*0.45/4),f:Math.round(cal*0.25/9)};
}

function applyTheme(){
  const th=T(),ac=A(),r=document.documentElement.style;
  r.setProperty('--bg',th.bg);r.setProperty('--p2',th.p2);r.setProperty('--p3',th.p3);
  r.setProperty('--ln',th.ln);r.setProperty('--l2',th.l2);
  r.setProperty('--t',th.t);r.setProperty('--t2',th.t2);r.setProperty('--t3',th.t3);
  r.setProperty('--ac',ac.p);r.setProperty('--ac2',ac.g2);
  // Remove all theme classes
  const allCls=['ember-bg','abyss-bg','aurora-bg','pearl-bg','sakura-bg','glass-bg','theme-ember','theme-abyss','theme-aurora','theme-pearl','theme-sakura','theme-glass'];
  document.body.classList.remove(...allCls);
  document.documentElement.classList.remove(...allCls);
  // Apply new theme class
  if(th.cls){document.body.classList.add(th.cls)}
  if(th.glass){document.body.style.background=''}
  else{document.body.style.background=th.bg}
  // Light theme — fix nav/topbar bg
  const nav=document.getElementById('nav');
  const topbar=document.getElementById('topbar');
  if(!th.d){
    if(nav)nav.style.background=th.bg;
    if(topbar)topbar.style.background=th.bg;
  } else {
    if(nav)nav.style.background='';
    if(topbar)topbar.style.background='';
  }
  Chart.defaults.color=th.t2;Chart.defaults.borderColor=th.ln;
}

let charts={};

function render(){
  if(S.pe&&!S.pu){renderPin();return}
  killCharts();applyTheme();updateTopBar();

  requestAnimationFrame(()=>{initReveal();buildCharts();if(S.tab==='home'){doScoreAnim();animateSleepBars();}});
}
// SETTINGS-ONLY re-render that preserves scroll position
function reRenderSettings(){
  const sc=document.getElementById('scroll');
  const top=sc?sc.scrollTop:0;
  killCharts();applyTheme();updateTopBar();
  document.getElementById('content').innerHTML=`<div>${buildTab()}</div>`;
  requestAnimationFrame(()=>{initReveal();if(sc)sc.scrollTop=top});
}
function updateNav(){document.querySelectorAll('.stb').forEach(b=>b.classList.toggle('on',b.dataset.main===S.tab));}
function updateTopBar(){
  const e=eff(today()),ac=A();
  const hr=new Date().getHours();
  const greet=hr<12?'Good Morning':hr<17?'Good Afternoon':'Good Evening';
  const chip=document.getElementById('date-chip');
  if(chip)chip.textContent=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  const gt=document.getElementById('greeting-text');
  if(gt)gt.textContent=greet;
  const ring=document.getElementById('tr-ring');
  if(ring){ring.style.stroke=ac.p;ring.setAttribute('stroke-dasharray',`${e/100*87.9} 87.9`)}
  const pct=document.getElementById('tr-pct');if(pct)pct.textContent=e+'%';
}
function buildTab(){
  if(S.tab==='calendar')return S.dv?buildDay():buildCal();
  if(S.tab==='food')return buildFood();
  if(S.tab==='analytics')return buildAnalytics();
  if(S.tab==='settings')return buildSettings();
  if(S.tab==='fitness')return buildFitness();
  if(S.tab==='ai')return buildAI();
  return buildHome();
}
function doScoreAnim(){
  const el=document.getElementById('score-num');if(!el)return;
  const target=parseInt(el.dataset.t||0);let cur=0;
  el.classList.add('npop');
  const step=()=>{cur=Math.min(cur+Math.max(1,Math.ceil(target/24)),target);el.textContent=cur;if(cur<target)requestAnimationFrame(step)};
  requestAnimationFrame(step);
}
function initReveal(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('shown'),i*30);io.unobserve(e.target)}});
  },{threshold:.05});
  document.querySelectorAll('.rev').forEach(el=>io.observe(el));
}

function saveAllBodyGoals(){
  const h=parseFloat(document.getElementById('bh')?.value)||170;
  const cw=parseFloat(document.getElementById('bw')?.value)||70;
  const gw=parseFloat(document.getElementById('bg')?.value)||65;
  const wks=parseInt(document.getElementById('bwks')?.value)||12;
  const sex=tempSex||(S.body?.sex||'male');
  const act=tempAct||(S.body?.act||'moderate');
  S.body={h,cw,gw,wks,sex,act};
  const goals=calcBodyGoals(S.body);
  S.calgoal=Math.max(1200,goals.targetCal);
  save();
  haptic('success');
  // Show success flash
  const btn=document.querySelector('#body-card button[onclick*="saveAllBodyGoals"]');
  if(btn){const orig=btn.textContent;btn.textContent='✓ Saved!';btn.style.background='#5db87a';setTimeout(()=>{btn.textContent=orig;btn.style.background='var(--ac)';},1800);}
  const preview=document.getElementById('body-results-preview');
  if(preview)preview.innerHTML=buildBodyResultsInline(S.body);
}

function saveWellnessGoals(){
  const sl=parseFloat(document.getElementById('slg')?.value)||8;
  const wg=parseFloat(document.getElementById('wg')?.value)||2;
  if(sl>3&&sl<14)S.slgoal=sl;
  if(wg>=0.5&&wg<=6)S.wgoal=wg;
  save();
  haptic('success');
  const btn=document.querySelector('[onclick*="saveWellnessGoals"]');
  if(btn){const orig=btn.textContent;btn.textContent='✓ Saved!';btn.style.background='#5db87a';setTimeout(()=>{btn.textContent=orig;btn.style.background='var(--ac)';},1800);}
}

function buildBodyResultsInline(b){
  if(!b?.cw||!b?.h)return'';
  const g=calcBodyGoals(b);
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    ${[['BMR',g.bmr+' kcal'],['TDEE',g.tdee+' kcal'],['Target',g.targetCal+' kcal/day'],['BMI',g.bmi+' — '+g.bmiCat],['Change',g.weeklyChange+'kg/wk'],['Timeline',b.wks+'wks']].map(([l,v])=>`
    <div style="background:#1e1a16;border:1px solid #ffffff0d;border-radius:10px;padding:8px 10px">
      <div style="font-size:7px;font-weight:800;letter-spacing:1.5px;color:#7a6e5a;margin-bottom:2px">${l.toUpperCase()}</div>
      <div style="font-size:12px;font-weight:700;color:#e8c87a">${v}</div>
    </div>`).join('')}
  </div>`;
}


function buildBodyResults(b){
  if(!b.cw||!b.h||!b.gw||!b.wks)
    return `<div style="padding:10px;background:#ffffff05;border-radius:var(--r8);text-align:center;font-size:12px;color:var(--t3)">Fill fields above to see your plan ↑</div>`;
  const r=calcBodyGoals(b);
  const dir=r.diff>0?'Cut 🔻':r.diff<0?'Bulk 📈':'Maintain ⚖️';
  const dc=r.diff>0?'var(--red)':'var(--green)';
  return `<div style="background:#ffffff06;border:1px solid var(--l2);border-radius:var(--r12);padding:11px">
    <div style="font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:8px">Plan · ${dir}</div>
    ${[['BMR',r.bmr+' kcal','var(--t2)'],['TDEE',r.tdee+' kcal','var(--t2)'],['Target',r.targetCal+' kcal','var(--ac)'],['Daily Δ',(r.diff>0?'-':'+')+Math.abs(r.dailyDef)+' kcal',dc],['Weekly Δ',r.weeklyChange+' kg/wk',dc],['BMI',r.bmi+' · '+r.bmiCat,r.bmiCat==='Normal'?'var(--green)':'var(--ac)']].map(([k,v,c])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--ln)">
      <span style="font-size:11px;color:var(--t3)">${k}</span>
      <span style="font-family:'Fraunces',serif;font-size:16px;font-style:italic;color:${c}">${v}</span>
    </div>`).join('')}
  </div>`;
}

// KEY FIX: update body field WITHOUT full re-render — only update results panel
function updateBodyField(key,val){
  S.body=S.body||{};
  S.body[key]=parseFloat(val)||0;
  save();
  const panel=document.getElementById('body-results');
  if(panel)panel.innerHTML=buildBodyResults(S.body);
}
// Button selections (sex/act) — save scroll and re-render settings only
function updateBodySel(key,val){
  S.body=S.body||{};
  S.body[key]=val;
  save();
  reRenderSettings();
}

function buildCharts(){
  const th=T(),ac=A();
  const xOpts={ticks:{font:{size:8,family:'Cabinet Grotesk'},color:th.t3},grid:{color:th.ln}};
  const yOpts={ticks:{font:{size:8,family:'Cabinet Grotesk'},color:th.t3},grid:{color:th.ln}};
  if(S.tab==='analytics'){
    const l30=last(30);
    const sc=document.getElementById('scoreChart');
    if(sc){charts.score=new Chart(sc,{type:'line',data:{labels:l30.map(d=>d.slice(5)),datasets:[{data:l30.map(d=>eff(d)),borderColor:ac.p,backgroundColor:ac.p+'18',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},options:{plugins:{legend:{display:false}},scales:{x:xOpts,y:{...yOpts,min:0,max:100}}}})}
    const mc=document.getElementById('moodChart');
    const mv={awful:1,bad:2,meh:3,good:4,great:5};
    if(mc){charts.mood=new Chart(mc,{type:'line',data:{labels:l30.map(d=>d.slice(5)),datasets:[{data:l30.map(d=>mv[S.m[d]]||null),borderColor:'#b48ae8',backgroundColor:'#b48ae820',fill:true,tension:.4,pointRadius:0,borderWidth:2,spanGaps:true}]},options:{plugins:{legend:{display:false}},scales:{x:xOpts,y:{min:1,max:5,ticks:{font:{size:8},color:th.t3,callback:v=>['','😞','😕','😐','🙂','😄'][v]||''},grid:{color:th.ln}}}}})}
    if(S.wlog?.length>=2){
      const wc=document.getElementById('weightChart');
      const wl=S.wlog.slice(-20);
      if(wc){charts.weight=new Chart(wc,{type:'line',data:{labels:wl.map(e=>e.date.slice(5)),datasets:[{data:wl.map(e=>e.kg),borderColor:'#6dba8a',backgroundColor:'#6dba8a18',fill:true,tension:.4,pointRadius:3,borderWidth:2}]},options:{plugins:{legend:{display:false}},scales:{x:xOpts,y:yOpts}}})}
    }
  }
  if(S.tab==='calendar'){
    const tc=document.getElementById('trendChart');
    const l30=last(30);
    if(tc){charts.trend=new Chart(tc,{type:'bar',data:{labels:l30.map(d=>d.slice(8)),datasets:[{data:l30.map(d=>eff(d)),backgroundColor:l30.map(d=>eff(d)===100?ac.p:eff(d)>0?ac.p+'60':th.l2),borderRadius:3,borderSkipped:false}]},options:{plugins:{legend:{display:false}},scales:{x:{...xOpts,grid:{display:false}},y:{...yOpts,min:0,max:100}}}})}
  }
  if(S.tab==='food'){
    const fc=document.getElementById('foodChart');
    const l7=last(7),G=getGoals();
    if(fc){charts.food=new Chart(fc,{type:'bar',data:{labels:l7.map(d=>DAYS[new Date(d+'T12:00').getDay()]),datasets:[{data:l7.map(d=>(S.food[d]||[]).reduce((a,e)=>a+e.cal,0)),backgroundColor:ac.p+'80',borderRadius:4,borderSkipped:false},{data:l7.map(()=>G.cal),type:'line',borderColor:ac.p,borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false}]},options:{plugins:{legend:{display:false}},scales:{x:{...xOpts,grid:{display:false}},y:yOpts}}})}
  }
}

let pinBuf='',pinMode='unlock',pinTmp='';

  el.innerHTML=`
    <div class="pin-logo">W·OS</div>

    <div class="pin-pad">

      <button class="pin-key del" onclick="pinDel()">⌫</button>

function showSetPin(){
  pinBuf='';pinMode='set1';pinTmp='';
  const el=document.createElement('div');el.className='scrim';el.id='set-pin-scrim';
  el.innerHTML=`<div class="sheet" style="display:flex;flex-direction:column;align-items:center;padding:24px 20px">
    <div class="shandle"></div>
    <div style="font-size:38px;margin-bottom:4px">🔐</div>
    <div class="pin-sub" id="sps" style="margin-bottom:22px">Choose a 4-digit PIN</div>
    <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd${i}"></div>`).join('')}</div>
    <div class="pin-pad" style="margin-top:16px">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinSetPress('${n}')">${n}</button>`).join('')}
      <button class="pin-key zero" onclick="pinSetPress('0')">0</button>
      <button class="pin-key del" onclick="pinSetDel()">⌫</button>

  </div>`;

function updDots(n){document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('fill',i<n))}
function shakeDots(){document.querySelectorAll('.pin-dot').forEach(d=>{d.classList.add('err');setTimeout(()=>d.classList.remove('err'),500)})}
function pinPress(n){pinBuf+=n;updDots(pinBuf.length);if(pinBuf.length===4){if(hp(pinBuf)===S.ph_){S.pu=true;document.getElementById('pin-sc')?.remove();render()}else{shakeDots();setTimeout(()=>{pinBuf='';updDots(0)},600)}}}
function pinDel(){pinBuf=pinBuf.slice(0,-1);updDots(pinBuf.length)}
function pinSetPress(n){pinBuf+=n;updDots(pinBuf.length);if(pinBuf.length===4){if(pinMode==='set1'){pinTmp=hp(pinBuf);pinBuf='';updDots(0);document.getElementById('sps').textContent='Confirm your PIN';pinMode='set2'}else if(hp(pinBuf)===pinTmp){S.ph_=pinTmp;S.pe=true;save();document.getElementById('set-pin-scrim')?.remove();render()}else{shakeDots();setTimeout(()=>{pinBuf='';updDots(0);document.getElementById('sps').textContent='Mismatch – try again';pinMode='set1';pinTmp=''},700)}}}
function pinSetDel(){pinBuf=pinBuf.slice(0,-1);updDots(pinBuf.length)}
function disablePin(){if(confirm('Disable PIN lock?')){S.pe=false;S.ph_='';S.pu=false;save();reRenderSettings()}}

const TAB_ORDER=['home','calendar','food','analytics','settings'];
function switchMain(t){ haptic('light'); switchTab(t); }
function switchTab(t){
  const prev=S.tab;
  S.tab=t;S.dv=false;
  document.querySelectorAll('.stb').forEach(b=>b.classList.toggle('on',b.dataset.main===t));
  const dir=(['home','food','fitness','calendar','analytics','settings'].indexOf(t)>['home','food','fitness','calendar','analytics','settings'].indexOf(prev))?'tab-r':'tab-l';
  killCharts();applyTheme();updateTopBar();
  document.getElementById('content').innerHTML=`<div class="${dir}">${buildTab()}</div>`;
  document.getElementById('scroll').scrollTop=0;
  requestAnimationFrame(()=>{initReveal();buildCharts();if(S.tab==='home')doScoreAnim();});
}

function toggleCheck(date,id){
  S.c[date]=S.c[date]||{};
  const wasOff=!S.c[date][id];
  S.c[date][id]=!S.c[date][id];
  save();
  if(wasOff){
    haptic('medium');
    const all=allT(),ch=S.c[date]||{};
    const done=all.filter(t=>ch[t.id]).length;
    if(done===all.length&&all.length>0){
      haptic('success');
      showStreakCelebration(streak());
      showConfetti();
    }
  } else { haptic('light'); }
  render();
}
function toggleRew(date){S.rw[date]=!S.rw[date];save();render()}
function toggleEx(date){S.ex[date]=!S.ex[date];save();render()}
function addXtra(date){const l=prompt('Task name:');if(l?.trim()){S.xt[date]=S.xt[date]||[];S.xt[date].push({id:Date.now(),l:l.trim(),done:false});save();render()}}
function toggleXtra(date,i){S.xt[date][i].done=!S.xt[date][i].done;save();render()}
function delXtra(date,i){S.xt[date].splice(i,1);save();render()}
function saveNote(date,v){S.n[date]=v;save()}
function setMood(date,id){haptic("medium");S.m[date]=S.m[date]===id?null:id;save();render()}
function setWater(date,v){const prev=S.w[date]||0;S.w[date]=Math.max(0,Math.min(wDrops(),v));if(S.w[date]!==prev)haptic(S.w[date]>=wDrops()?"success":"light");save();render()}
function onSleepSlide(el,date,numId){const v=parseFloat(el.value);S.sl[date]=S.sl[date]||{};S.sl[date].h=v;save();const n=document.getElementById(numId);if(n)n.textContent=v+'h'}
function setSleepQ(date,q){S.sl[date]=S.sl[date]||{h:7};S.sl[date].q=S.sl[date].q===q?null:q;save();render()}
function setTheme(k){S.tk=k;save();reRenderSettings()}
function setAccent(k){S.ak=k;save();reRenderSettings()}
function toggleWoEd(){S.woed=!S.woed;reRenderSettings()}
function addExercise(day){const ex=prompt(`Exercise for ${DAYS[day]}:`);if(ex?.trim()){S.wo[day]=S.wo[day]||[];S.wo[day].push(ex.trim());save();reRenderSettings()}}
function rmExercise(day,i){S.wo[day].splice(i,1);save();reRenderSettings()}
function toggleESec(sec){S.esec=S.esec===sec?null:sec;reRenderSettings()}
function addTask(sec){const l=prompt('Task name:');if(!l?.trim())return;const ic=prompt('Icon (emoji):')||'⚡';const t={id:'c'+Date.now(),l:l.trim(),i:ic};if(sec==='ph')S.pt.push(t);else if(sec==='me')S.mt.push(t);else S.ft.push(t);save();reRenderSettings()}
function delTask(key,id){S[key]=S[key].filter(t=>t.id!==id);save();reRenderSettings()}
function resetToday(){if(confirm('Reset today?')){const td=today();['c','m','w','sl'].forEach(k=>{delete S[k][td]});save();render()}}

    </div>
  </div>`;
  document.body.appendChild(scrim);

}
function saveWeight(){
  const kg=parseFloat(document.getElementById('wl-kg')?.value);
  const date=document.getElementById('wl-date')?.value||today();
  if(!kg||isNaN(kg))return;
  S.wlog=S.wlog||[];
  S.wlog=S.wlog.filter(e=>e.date!==date);
  S.wlog.push({date,kg});
  S.wlog.sort((a,b)=>a.date.localeCompare(b.date));
  if(date===today()&&S.body)S.body.cw=kg;
  save();document.getElementById('wl-scrim')?.remove();render();
}
function delWeight(i){S.wlog.splice(i,1);save();render()}

      <div style="font-size:13px;font-weight:700">${hl}</div>
      <div style="font-size:10px;color:var(--t3)">${f.cat} · ${f.std}${f.unit}</div>
    </div>
    <div style="text-align:right">
      <div style="font-family:'Fraunces',serif;font-size:15px;font-style:italic;color:var(--ac)">${f.cal}</div>
      <div style="font-size:9px;color:var(--t3)">kcal</div>

function sendAI(){
  const inp=document.getElementById('ai-inp');
  const msg=inp?.value?.trim();
  if(!msg||aiLoading)return;
  inp.value='';askAI(msg);
}

async function askAI(msg){
  if(aiLoading)return;
  aiLoading=true;
  const td=today(),mood=S.m[td],sl=S.sl[td],water=S.w[td]||0;
  const all=allT(),ch=S.c[td]||{},done=all.filter(t=>ch[t.id]).length;
  const taskSc=all.length?Math.round(done/all.length*100):0;
  const moodMap={awful:0,bad:25,meh:50,good:75,great:100};
  const moodSc=mood?(moodMap[mood]||50):50;
  const sleepSc=sl?.h?Math.min(100,Math.round(sl.h/(S.slgoal||8)*100)):50;
  const bb=Math.round(taskSc*.3+wPct(water)*.25+moodSc*.25+sleepSc*.2);
  const todayFood=S.food[td]||[];
  const todayCal=todayFood.reduce((a,f)=>a+(f.cal||0),0);
  const todayFit=(S.fitLog||{})[td]||[];
  const l7=last(7).map(d=>d.slice(5)+':'+eff(d)+'%').join(', ');
  const sys=`You are a personal wellness coach inside W·OS — built by Anant Raj Saini, a medical student at Perm State Medical University, Russia.
Today: battery ${bb}/100, tasks ${taskSc}%, mood ${mood||'—'} (${moodSc}/100), sleep ${sl?.h||'—'}h of ${S.slgoal}h (${sl?.q||'—'}), water ${wLabel(water)} of ${wGoalL()}L, calories ${todayCal} of ${getGoals().cal} kcal, food: ${todayFood.map(f=>f.name).join(', ')||'nothing'}, workouts: ${todayFit.map(e=>e.name).join(', ')||'none'}, streak ${streak()} days, weight ${S.body?.cw||'?'}kg → goal ${S.body?.gw||'?'}kg, 7-day: ${l7}.
Be warm, specific, use their actual numbers. Max 3-4 sentences.`;
  aiMessages.push({role:'user',content:msg});
  render();
  setTimeout(()=>{const c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight},50);
  try{
    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:aiMessages.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('')||'Could not get response, try again!';
    aiMessages.push({role:'assistant',content:reply});
  }catch(e){
    aiMessages.push({role:'assistant',content:'Connection issue — check internet and try again! 🌐'});
  }
  aiLoading=false;render();
  setTimeout(()=>{const c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight},100);
}

const TABS_ORDER=['home','food','fitness','calendar','analytics','settings'];
let swipeStartX=0,swipeStartY=0;
document.addEventListener('touchstart',e=>{
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!e.changedTouches.length)return;
  const dx=e.changedTouches[0].clientX-swipeStartX;
  const dy=e.changedTouches[0].clientY-swipeStartY;
  // Only horizontal swipes, not vertical scroll
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*2){
    const cur=TABS_ORDER.indexOf(S.tab);
    if(dx<0&&cur<TABS_ORDER.length-1)switchTab(TABS_ORDER[cur+1]);
    if(dx>0&&cur>0)switchTab(TABS_ORDER[cur-1]);
  }
},{passive:true});

function haptic(type='light'){
  if(navigator.vibrate){
    const patterns={light:10,medium:20,heavy:[20,10,20],success:[10,5,10,5,30],error:[30,10,30]};
    navigator.vibrate(patterns[type]||10);
  }
}

// Ripple effect on tap
function addRipple(el,e){
  const r=document.createElement('span');
  const rect=el.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  const x=(e.clientX||e.touches?.[0]?.clientX||rect.left+rect.width/2)-rect.left-size/2;
  const y=(e.clientY||e.touches?.[0]?.clientY||rect.top+rect.height/2)-rect.top-size/2;
  r.style.cssText=`position:absolute;width:${size}px;height:${size}px;left:${x}px;top:${y}px;border-radius:50%;background:rgba(255,255,255,.08);transform:scale(0);animation:ripple .5s ease forwards;pointer-events:none`;
  el.style.position='relative';el.style.overflow='hidden';
  el.appendChild(r);
  setTimeout(()=>r.remove(),500);
}
document.addEventListener('touchstart',e=>{
  const t=e.target.closest('.dc,.dc-sm,.stb,.btn-dark,.tcb');
  if(t)addRipple(t,e);
},{passive:true});

// BREATHING
// ═══════════════════════════════════════
const BMODES={
  '478':{phases:[{n:'Inhale',d:4},{n:'Hold',d:7},{n:'Exhale',d:8}],label:'4-7-8 Relaxation'},
  'box':{phases:[{n:'Inhale',d:4},{n:'Hold',d:4},{n:'Exhale',d:4},{n:'Hold',d:4}],label:'Box Breathing'},
  '24': {phases:[{n:'Inhale',d:2},{n:'Exhale',d:4}],label:'2-4 Quick Calm'},
};
let bMode='478',breathRunning=false,bTimer=null,bPhase=0,bSec=0,bCycles=0;
function setBreathMode(id){
  if(breathRunning)stopBreath();bMode=id;
  const t=document.getElementById('bm-title');if(t)t.textContent=BMODES[id].label;
  Object.keys(BMODES).forEach(k=>{const b=document.getElementById('bm-'+k);if(b)b.className='bmbtn'+(k===id?' on':'')});
  resetBreathUI();
}
function resetBreathUI(){
  const p=document.getElementById('br-phase'),c=document.getElementById('br-count'),a=document.getElementById('br-arc'),i=document.getElementById('br-info');
  if(p)p.textContent='Ready';if(c)c.textContent='—';if(a)a.setAttribute('stroke-dasharray','0 276');if(i)i.textContent='Tap Start to begin';
}
function toggleBreath(){breathRunning?stopBreath():startBreath()}
function startBreath(){
  breathRunning=true;bPhase=0;bSec=0;bCycles=0;
  const btn=document.getElementById('br-btn');if(btn){btn.textContent='Stop';btn.className='btn btn-red';btn.style.cssText='font-size:11px;padding:6px 14px'}
  runBreathTick();
}
function stopBreath(){
  breathRunning=false;clearTimeout(bTimer);
  const btn=document.getElementById('br-btn');if(btn){btn.textContent='Start';btn.className='btn btn-ac';btn.style.cssText='font-size:11px;padding:6px 14px'}
  const i=document.getElementById('br-info');if(i)i.textContent=bCycles>0?`${bCycles} cycle${bCycles>1?'s':''} completed 🌿`:'Tap Start to begin';
  resetBreathUI();
}
function runBreathTick(){
  if(!breathRunning)return;
  const phases=BMODES[bMode].phases,phase=phases[bPhase];
  const rem=phase.d-bSec;
  const p=document.getElementById('br-phase'),c=document.getElementById('br-count'),a=document.getElementById('br-arc');
  if(p)p.textContent=phase.n.toUpperCase();if(c)c.textContent=rem;
  if(a)a.setAttribute('stroke-dasharray',`${(bSec/phase.d)*276} 276`);
  bSec++;
  if(bSec>=phase.d){bSec=0;bPhase++;if(bPhase>=phases.length){bPhase=0;bCycles++}}
  bTimer=setTimeout(runBreathTick,1000);
}
