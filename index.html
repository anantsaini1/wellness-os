<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="W·OS"/>
<title>Wellness OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ─────────────────────────────────────────
   DESIGN SYSTEM
───────────────────────────────────────── */
:root{
  --ink:#f0ede8; --ink2:#a09a90; --ink3:#4a4540;
  --paper:#0c0b09; --paper2:#141210; --paper3:#1c1a17;
  --line:#ffffff0d; --line2:#ffffff18;
  --accent:#e8d5a3; --accent2:#c4a96d; --accent3:#8a7040;
  --red:#e85c4a; --green:#6dba8a; --blue:#7ab3e8; --purple:#b48ae8;
  --r4:4px; --r8:8px; --r12:12px; --r16:16px; --r20:20px; --r24:24px;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);
  --shadow:0 1px 3px #00000080, 0 8px 24px #00000040;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--paper);color:var(--ink);overscroll-behavior:none}

/* ─── GRAIN OVERLAY ─── */
body::before{
  content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.35;mix-blend-mode:overlay;
}

/* ─── LAYOUT ─── */
#app{height:100dvh;display:flex;flex-direction:column;max-width:640px;margin:0 auto;position:relative;overflow:hidden}
#scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#scroll-area::-webkit-scrollbar{display:none}
.content{padding:0 0 100px}

/* ─── TOPBAR ─── */
#topbar{
  position:sticky;top:0;z-index:100;padding:0 20px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--paper);border-bottom:1px solid var(--line);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.logo{display:flex;align-items:baseline;gap:4px}
.logo-w{font-family:'Fraunces',serif;font-size:22px;font-style:italic;font-weight:300;color:var(--accent);letter-spacing:-1px}
.logo-os{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--ink3);margin-top:1px}
#topbar-right{display:flex;align-items:center;gap:10px}
.score-ring-sm{position:relative;width:32px;height:32px}
.score-ring-sm svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring-sm span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;color:var(--ink)}
#date-chip{font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:0.3px}

/* ─── BOTTOM NAV ─── */
#bottomnav{
  position:sticky;bottom:0;display:flex;z-index:100;flex-shrink:0;
  background:var(--paper2);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.navbtn{
  flex:1;padding:12px 0 10px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-family:'Cabinet Grotesk',sans-serif;position:relative;transition:opacity 0.2s;
}
.navbtn .ni{font-size:18px;transition:transform 0.3s var(--spring)}
.navbtn.active .ni{transform:scale(1.15)}
.navbtn .nl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);transition:color 0.2s}
.navbtn.active .nl{color:var(--accent)}
.nav-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--accent);border-radius:0 0 3px 3px;display:none}
.navbtn.active .nav-bar{display:block}

/* ─── TYPOGRAPHY ─── */
.display{font-family:'Fraunces',serif;font-weight:300;font-style:italic;line-height:1;letter-spacing:-1px}
.label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3)}
.sub{font-size:12px;color:var(--ink2);font-weight:500}

/* ─── SURFACES ─── */
.surface{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16)}
.surface2{background:var(--paper3);border:1px solid var(--line2);border-radius:var(--r12)}
.inset{background:#ffffff05;border:1px solid var(--line);border-radius:var(--r12)}

/* ─── SECTION DIVIDER ─── */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:24px 20px 12px}
.sec-head-left{display:flex;flex-direction:column;gap:3px}

/* ─── HERO BLOCK ─── */
#hero{
  position:relative;overflow:hidden;
  padding:28px 20px 24px;margin:0;
  background:linear-gradient(180deg,#0c0b09 0%,#100e0a 100%);
  border-bottom:1px solid var(--line);
}
#hero-canvas{position:absolute;inset:0;z-index:0;opacity:0.6}
#hero-content{position:relative;z-index:1}
#score-display{display:flex;align-items:flex-end;gap:0;margin:4px 0 2px;line-height:1}
#score-num{font-family:'Fraunces',serif;font-size:88px;font-weight:300;font-style:italic;letter-spacing:-5px;line-height:0.9;color:var(--accent)}
#score-pct{font-size:20px;font-weight:700;color:var(--accent2);margin-bottom:14px;margin-left:2px}
#hero-meta{display:flex;align-items:center;gap:12px;margin-top:14px}
#streak-badge{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#ffffff0a;border:1px solid var(--line2);border-radius:var(--r8)}
#streak-badge .snum{font-family:'Fraunces',serif;font-style:italic;font-size:17px;color:var(--accent)}
#streak-badge .slbl{font-size:9.5px;font-weight:700;color:var(--ink3);letter-spacing:0.5px}
#hero-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--line)}
#hero-bar-fill{height:100%;background:var(--accent);transition:width 1.2s var(--ease)}

/* ─── TODAY BAR ─── */
#today-strip{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;border-bottom:1px solid var(--line)}
#today-strip::-webkit-scrollbar{display:none}
.today-pill{
  display:flex;align-items:center;gap:6px;padding:7px 12px;
  background:#ffffff06;border:1px solid var(--line2);border-radius:var(--r8);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.2s;
  font-size:11.5px;font-weight:700;color:var(--ink2);
}
.today-pill:active{transform:scale(0.94)}
.today-pill.lit{background:var(--accent)0f;border-color:var(--accent)44;color:var(--accent)}

/* ─── SECTION RINGS ─── */
#rings-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 20px 0}
.ring-tile{
  background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16);
  padding:14px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;
}
.ring-pct{font-family:'Fraunces',serif;font-size:13px;font-style:italic;font-weight:300}
.ring-name{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3)}

/* ─── STAT ROW ─── */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px}
.stat-tile{
  background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16);
  padding:16px 14px;position:relative;overflow:hidden;
}
.stat-tile-accent{position:absolute;top:0;left:0;right:0;height:2px}
.stat-tile-num{font-family:'Fraunces',serif;font-size:34px;font-weight:300;font-style:italic;letter-spacing:-1px;line-height:1;margin:4px 0 3px}
.stat-tile-lbl{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--ink3)}

/* ─── CHECK LIST ─── */
.section-card{margin:0 20px;background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16);overflow:hidden}
.section-card+.section-card{margin-top:8px}
.section-card-head{
  padding:14px 16px 12px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.section-card-title{font-size:12px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase}
.section-prog{height:2px;margin:0 16px;border-radius:99px;background:#ffffff08;overflow:hidden}
.section-prog-fill{height:100%;border-radius:99px;transition:width 0.7s var(--ease)}
.task-row{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--line);cursor:pointer;
  transition:background 0.15s;-webkit-user-select:none;
}
.task-row:last-child{border-bottom:none}
.task-row:active{background:#ffffff05}
.task-cb{
  width:20px;height:20px;border-radius:6px;flex-shrink:0;
  border:1.5px solid var(--line2);background:transparent;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.22s var(--spring);font-size:9px;font-weight:900;color:#000;
}
.task-cb.on{background:var(--accent);border-color:var(--accent);transform:scale(1.1)}
.task-ico{font-size:14px;flex-shrink:0}
.task-lbl{font-size:13px;font-weight:600;flex:1;transition:all 0.2s;line-height:1.3}
.task-lbl.done{text-decoration:line-through;color:var(--ink3)}

/* ─── MOOD ─── */
.mood-row{display:flex;gap:6px}
.mood-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 3px;border-radius:var(--r12);
  border:1px solid var(--line2);background:transparent;cursor:pointer;
  transition:all 0.22s var(--spring);font-family:'Cabinet Grotesk',sans-serif;
}
.mood-btn:active{transform:scale(0.92)}
.mood-btn.sel{transform:scale(1.06)}
.mood-em{font-size:22px;transition:transform 0.3s var(--spring)}
.mood-btn.sel .mood-em{transform:scale(1.2)}
.mood-nm{font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--ink3)}

/* ─── WATER ─── */
.water-drops{display:flex;gap:4px;justify-content:center;margin:10px 0}
.wdrop{width:32px;height:40px;cursor:pointer;transition:all 0.25s var(--spring)}
.wdrop:active{transform:scale(0.85)}
.wunit-row{display:flex;gap:6px;margin-bottom:10px}
.wunit-btn{flex:1;padding:8px;border-radius:var(--r8);border:1px solid var(--line2);background:transparent;font-family:'Cabinet Grotesk',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;transition:all 0.18s;color:var(--ink3)}
.wunit-btn.on{background:var(--blue)15;border-color:var(--blue)55;color:var(--blue)}

/* ─── SLEEP ─── */
.sleep-num{font-family:'Fraunces',serif;font-size:48px;font-weight:300;font-style:italic;color:var(--purple);line-height:1}
.track{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:99px;outline:none;cursor:pointer}
.track::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer;transition:transform 0.15s;box-shadow:0 2px 12px #0008}
.sleep-track::-webkit-slider-thumb{background:var(--purple)}
.doom-track::-webkit-slider-thumb{background:var(--red)}
.sleep-qlty{display:flex;gap:5px;margin-top:10px}
.sleep-q-btn{flex:1;padding:7px 3px;border-radius:var(--r8);border:1px solid var(--line2);background:transparent;cursor:pointer;font-size:10.5px;font-weight:700;text-align:center;font-family:'Cabinet Grotesk',sans-serif;transition:all 0.18s;color:var(--ink3)}
.sleep-q-btn.on{background:var(--purple)15;border-color:var(--purple)55;color:var(--purple)}

/* ─── DOOM ─── */
.doom-num{font-family:'Fraunces',serif;font-size:42px;font-weight:300;font-style:italic;line-height:1;transition:color 0.3s}

/* ─── CALENDAR ─── */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 14px}
.cal-month{font-family:'Fraunces',serif;font-size:26px;font-weight:300;font-style:italic;letter-spacing:-0.5px}
.cal-nav{display:flex;gap:6px}
.cal-nav-btn{width:32px;height:32px;border-radius:var(--r8);border:1px solid var(--line2);background:#ffffff06;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:all 0.15s}
.cal-nav-btn:active{transform:scale(0.9)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 20px;margin-bottom:6px}
.cal-dow div{text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 20px}
.cal-cell{
  border-radius:var(--r8);padding:7px 3px 5px;cursor:pointer;
  text-align:center;border:1px solid transparent;
  transition:all 0.22s var(--spring);position:relative;
}
.cal-cell:active{transform:scale(0.9)}
.cal-cell.today{border-color:var(--accent)55;background:var(--accent)0a}
.cal-cell.sel{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 20px var(--accent)40}
.cal-cell-num{font-size:12px;font-weight:700;color:var(--ink2)}
.cal-cell.today .cal-cell-num{color:var(--accent)}
.cal-cell.sel .cal-cell-num{color:#1a1510}
.cal-cell-bar{height:2px;border-radius:99px;margin:3px 4px 0;background:#ffffff08;overflow:hidden}
.cal-cell-bar-fill{height:100%;border-radius:99px}
.cal-cell-dots{display:flex;justify-content:center;gap:1.5px;margin-top:2px;min-height:4px}
.cal-dot{width:3.5px;height:3.5px;border-radius:50%}
.mood-strip-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:8px 20px 0}
.mood-strip-cell{height:4px;border-radius:99px;background:#ffffff06}

/* ─── ANALYTICS ─── */
.analytics-hero{padding:24px 20px 16px;border-bottom:1px solid var(--line)}
.analytics-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px}
.kpi-tile{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16);padding:16px;position:relative;overflow:hidden}
.kpi-val{font-family:'Fraunces',serif;font-size:32px;font-weight:300;font-style:italic;letter-spacing:-1px;line-height:1;margin:2px 0}
.kpi-lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3)}

/* ─── HEATMAP ─── */
.hm-wrap{padding:0 20px}
.hm-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:3px;transition:transform 0.15s,opacity 0.15s}
.hm-cell:hover{transform:scale(1.4);z-index:1;position:relative;opacity:0.9}

/* ─── BADGES ─── */
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.badge-tile{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:var(--r12);border:1px solid var(--line);background:#ffffff03;text-align:center;transition:all 0.2s}
.badge-tile.on{border-color:var(--accent)35;background:var(--accent)07}
.badge-ico{font-size:22px;filter:grayscale(1)opacity(0.2);transition:filter 0.3s}
.badge-tile.on .badge-ico{filter:none}
.badge-lbl{font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--ink3);line-height:1.3}
.badge-tile.on .badge-lbl{color:var(--ink2)}

/* ─── CHART CARD ─── */
.chart-card{margin:0 20px;background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16);overflow:hidden}
.chart-card-head{padding:14px 16px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.chart-card-title{font-size:11px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;color:var(--ink2)}
.chart-card-body{padding:14px 14px 10px}
canvas{max-height:160px}

/* ─── SETTINGS ─── */
.settings-section{padding:20px 20px 0}
.settings-section-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:block}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.theme-tile{display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:var(--r12);cursor:pointer;border:1.5px solid transparent;transition:all 0.18s;font-family:'Cabinet Grotesk',sans-serif}
.theme-tile.sel{border-color:var(--accent)!important}
.theme-name{font-size:12px;font-weight:700}
.accent-row{display:flex;gap:7px;flex-wrap:wrap}
.accent-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform 0.2s var(--spring);border:2.5px solid transparent}
.accent-swatch.sel{transform:scale(1.25);border-color:#fff5}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
.settings-row:last-child{border-bottom:none}
.settings-row-card{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16);overflow:hidden;margin:0 20px}
.settings-row-card+.settings-row-card{margin-top:8px}

/* ─── TOGGLE SWITCH ─── */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;cursor:pointer;inset:0;background:var(--paper3);border:1px solid var(--line2);border-radius:99px;transition:0.3s}
.toggle input:checked~.toggle-track{background:var(--accent);border-color:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:0.3s var(--spring)}
.toggle input:checked~.toggle-track .toggle-thumb{transform:translateX(20px);background:#1a1510}

/* ─── BUTTONS ─── */
.btn{border:none;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;font-weight:700;border-radius:var(--r8);padding:9px 15px;transition:all 0.15s;font-size:12px}
.btn:active{transform:scale(0.94)}
.btn-ghost{background:#ffffff08;color:var(--ink2);border:1px solid var(--line2)}
.btn-accent{background:var(--accent)18;color:var(--accent);border:1px solid var(--accent)35}
.btn-solid{background:var(--accent);color:#1a1510;border:none;box-shadow:0 4px 20px var(--accent)30}
.btn-danger{background:var(--red)10;color:var(--red);border:1px solid var(--red)28}
.btn-full{display:block;width:100%;padding:14px;border-radius:var(--r12);font-size:13.5px;text-align:center}

/* ─── PIN ─── */
.pin-screen{position:fixed;inset:0;z-index:9999;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.pin-logo{font-family:'Fraunces',serif;font-size:48px;font-weight:300;font-style:italic;color:var(--accent);margin-bottom:6px;letter-spacing:-2px}
.pin-sub{font-size:12px;color:var(--ink3);font-weight:600;letter-spacing:0.5px;margin-bottom:32px}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--ink3);background:transparent;transition:all 0.2s var(--spring)}
.pin-dot.fill{background:var(--accent);border-color:var(--accent);transform:scale(1.2)}
.pin-dot.err{background:var(--red);border-color:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px}
.pin-key{padding:18px 10px;border-radius:var(--r16);border:1px solid var(--line2);background:var(--paper2);cursor:pointer;font-family:'Fraunces',serif;font-size:22px;font-weight:300;font-style:italic;text-align:center;color:var(--ink);transition:all 0.15s var(--spring)}
.pin-key:active{transform:scale(0.9);background:var(--paper3)}
.pin-key.del{font-family:'Cabinet Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--red);background:var(--red)0a;border-color:var(--red)20;font-style:normal}
.pin-key.zero{grid-column:2}

/* ─── MODALS ─── */
.modal-scrim{position:fixed;inset:0;background:#000000cc;z-index:998;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.18s}
.modal-sheet{
  background:var(--paper2);border:1px solid var(--line2);
  border-radius:var(--r24) var(--r24) 0 0;
  width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
  padding:20px;animation:sheetUp 0.3s var(--spring);
}
.modal-handle{width:32px;height:3px;border-radius:99px;background:var(--line2);margin:0 auto 18px}

/* ─── INPUTS ─── */
input[type=text],input[type=number],textarea,select{
  font-family:'Cabinet Grotesk',sans-serif;background:#ffffff06;
  border:1px solid var(--line2);border-radius:var(--r8);
  padding:10px 12px;color:var(--ink);font-size:13px;outline:none;width:100%;
  transition:border-color 0.15s;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)66;box-shadow:0 0 0 3px var(--accent)10}
textarea{resize:vertical;line-height:1.6}
select option{background:var(--paper2)}

/* ─── PHOTO GRID ─── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.photo-tile{position:relative;border-radius:var(--r8);overflow:hidden;aspect-ratio:1}
.photo-tile img{width:100%;height:100%;object-fit:cover;display:block}
.photo-del{position:absolute;top:4px;right:4px;background:#0009;border:none;color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}

/* ─── ANIMATIONS ─── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes flicker{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.12) rotate(2deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes tabFade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tab-enter{animation:tabFade 0.28s var(--ease)}
.reveal{opacity:0;transform:translateY(18px);transition:opacity 0.5s var(--ease),transform 0.5s var(--ease)}
.reveal.vis{opacity:1;transform:translateY(0)}
.num-anim{animation:countUp 0.6s var(--spring)}

/* ─── SPACER ─── */
.gap8{height:8px} .gap12{height:12px} .gap16{height:16px} .gap20{height:20px}
.px20{padding:0 20px}
.flex-row{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.empty{text-align:center;padding:20px;color:var(--ink3);font-size:12px;font-weight:600}

/* ─── THEME CROSSFADE ─── */
body,#topbar,#bottomnav,.section-card,.chart-card,.settings-row-card,.kpi-tile,.stat-tile,.ring-tile{
  transition:background 0.4s var(--ease),border-color 0.4s var(--ease),color 0.3s;
}

/* ─── TAB SLIDE TRANSITIONS ─── */
.tab-slide-left{animation:slideFromRight 0.3s var(--ease)}
.tab-slide-right{animation:slideFromLeft 0.3s var(--ease)}
@keyframes slideFromRight{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideFromLeft{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}

/* ─── CHECK POP ─── */
@keyframes checkPop{0%{transform:scale(1)}40%{transform:scale(1.45)}70%{transform:scale(0.9)}100%{transform:scale(1.1)}}
@keyframes checkUnpop{0%{transform:scale(1.1)}100%{transform:scale(1)}}
.task-cb.pop{animation:checkPop 0.35s var(--spring) forwards}
.task-cb.unpop{animation:checkUnpop 0.2s var(--ease) forwards}
@keyframes checkRipple{to{transform:scale(3.5);opacity:0}}
.task-ripple{position:absolute;border-radius:50%;pointer-events:none;animation:checkRipple 0.4s ease forwards}

/* ─── NUMBER ROLLUP ─── */
@keyframes numRoll{from{opacity:0;transform:translateY(30px) scale(0.85)}to{opacity:1;transform:translateY(0) scale(1)}}
.num-roll{animation:numRoll 0.7s var(--spring)}

/* ─── WATER WAVE ─── */
.wdrop-filled path{animation:wFill 0.3s var(--spring)}
@keyframes wFill{0%{transform:scaleY(0.6) translateY(8px);transform-origin:bottom}100%{transform:scaleY(1) translateY(0)}}
.wdrop:active{transform:scale(0.82)!important}

/* ─── FOOD TAB ─── */
.food-search-wrap{position:relative;padding:0 20px;margin-bottom:4px}
.food-search{
  width:100%;padding:13px 16px 13px 42px;
  background:#ffffff07;border:1px solid var(--line2);border-radius:var(--r12);
  color:var(--ink);font-family:'Cabinet Grotesk',sans-serif;font-size:14px;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.food-search:focus{border-color:var(--accent)66;box-shadow:0 0 0 3px var(--accent)10}
.food-search-icon{position:absolute;left:32px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;opacity:0.4}
.food-suggestions{
  position:absolute;top:100%;left:20px;right:20px;z-index:200;
  background:var(--paper2);border:1px solid var(--line2);border-radius:var(--r12);
  box-shadow:0 16px 48px #000000aa;max-height:260px;overflow-y:auto;
  animation:sheetUp 0.2s var(--spring);
}
.food-suggestions::-webkit-scrollbar{display:none}
.food-sugg-item{
  padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  transition:background 0.12s;
}
.food-sugg-item:last-child{border-bottom:none}
.food-sugg-item:active{background:#ffffff08}
.food-sugg-name{font-size:13px;font-weight:700;color:var(--ink)}
.food-sugg-meta{font-size:11px;color:var(--ink3);margin-top:1px}
.food-sugg-kcal{font-family:'Fraunces',serif;font-size:15px;font-style:italic;color:var(--accent)}

.food-macro-rings{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 20px}
.macro-ring-tile{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16);padding:14px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:5px}
.macro-ring-val{font-family:'Fraunces',serif;font-size:12px;font-style:italic;font-weight:300}
.macro-ring-lbl{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3)}

.food-log-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--line);
}
.food-log-item:last-child{border-bottom:none}
.food-log-name{font-size:13px;font-weight:700;color:var(--ink);flex:1}
.food-log-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.food-log-kcal{font-family:'Fraunces',serif;font-size:16px;font-style:italic;color:var(--accent);white-space:nowrap}
.food-log-del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:18px;padding:2px 4px}

.qty-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.qty-preset{padding:11px;border-radius:var(--r8);border:1px solid var(--line2);background:#ffffff05;cursor:pointer;font-size:12px;font-weight:700;text-align:center;color:var(--ink2);transition:all 0.15s;font-family:'Cabinet Grotesk',sans-serif}
.qty-preset:active{transform:scale(0.94)}
.qty-preset.sel{border-color:var(--accent)55;background:var(--accent)12;color:var(--accent)}

/* ─── FOOD CALORIE METER ─── */
.cal-meter{position:relative;height:8px;border-radius:99px;background:var(--line);overflow:hidden;margin:8px 0}
.cal-meter-fill{height:100%;border-radius:99px;transition:width 0.7s var(--ease)}

/* ─── FOOD EMPTY ─── */
.food-empty-art{font-size:40px;display:block;text-align:center;margin:8px 0;opacity:0.25}

/* ─── SCORE ROLLUP ─── */
@keyframes numUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.score-pop{animation:numUp .6s cubic-bezier(.34,1.56,.64,1)}

/* ─── BODY BATTERY ─── */
.bb-bar{height:8px;border-radius:99px;background:var(--line);overflow:hidden;margin:10px 0 8px}
.bb-bar-fill{height:100%;border-radius:99px;transition:width 1s var(--ease)}
.bb-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.bb-mini-tile{text-align:center;padding:7px 3px;background:#ffffff04;border-radius:var(--r8);border:1px solid var(--line)}

/* ─── BREATHING ─── */
.breath-phase-row{display:flex;gap:5px;margin-bottom:12px}
.breath-mode-btn{flex:1;padding:8px 3px;border-radius:var(--r8);border:1.5px solid var(--line2);background:transparent;cursor:pointer;font-size:11px;font-weight:700;text-align:center;font-family:'Cabinet Grotesk',sans-serif;transition:all .18s;color:var(--sub)}
.breath-mode-btn.on{border-color:var(--accent)55;background:var(--accent)12;color:var(--accent)}
#breath-circle-wrap{display:flex;justify-content:center;margin-bottom:10px}

/* ─── BODY GOALS ─── */
.body-inp{width:100%;padding:9px 11px;background:#ffffff06;border:1.5px solid var(--line2);border-radius:var(--r8);color:var(--ink);font-family:'Cabinet Grotesk',sans-serif;font-size:14px;font-weight:700;outline:none;transition:border-color .2s}
.body-inp:focus{border-color:var(--accent)66}
.body-result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
.body-result-row:last-child{border-bottom:none}
.act-btn{width:100%;padding:9px 8px;border-radius:var(--r8);border:1px solid var(--line2);background:transparent;cursor:pointer;text-align:left;font-family:'Cabinet Grotesk',sans-serif;transition:all .18s}
.act-btn.on{background:var(--accent)15;border-color:var(--accent)50}

/* ─── CUSTOM FOOD ─── */
.custom-food-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.custom-food-row:last-child{border-bottom:none}
.custom-food-row:active{background:#ffffff04}
</style>
</head>

</div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const THEMES={
  void:   {n:"Void",     bg:"#080706",p2:"#0e0d0b",p3:"#151310",l:"#ffffff0d",l2:"#ffffff15",t:"#f0ede8",t2:"#a09a90",t3:"#4a4540",d:true},
  coal:   {n:"Coal",     bg:"#0a0a0a",p2:"#111111",p3:"#181818",l:"#ffffff0d",l2:"#ffffff15",t:"#f5f5f5",t2:"#888",t3:"#333",d:true},
  abyss:  {n:"Abyss",    bg:"#03060f",p2:"#060c1a",p3:"#0a1228",l:"#1a2540",l2:"#2a3555",t:"#dde8ff",t2:"#6080b0",t3:"#1e2e50",d:true},
  forest: {n:"Forest",   bg:"#040a05",p2:"#080f08",p3:"#0d160d",l:"#102010",l2:"#183018",t:"#dff0e0",t2:"#5a8060",t3:"#1a3020",d:true},
  ember:  {n:"Ember",    bg:"#0a0503",p2:"#120806",p3:"#1c0e08",l:"#2a1008",l2:"#401808",t:"#faeae0",t2:"#a05030",t3:"#401808",d:true},
  ash:    {n:"Ash",      bg:"#f2f0ec",p2:"#ffffff",p3:"#f8f6f2",l:"#e8e4dc",l2:"#d8d2c8",t:"#1a1714",t2:"#706860",t3:"#b8b0a4",d:false},
  paper:  {n:"Paper",    bg:"#fdf8f0",p2:"#ffffff",p3:"#f8f2e8",l:"#ecdfc8",l2:"#d8c8a8",t:"#2a1e0a",t2:"#7a6040",t3:"#c8a870",d:false},
};
const ACCENTS={
  gold:   {p:"#e8d5a3",g2:"#c4a96d",n:"Gold"},
  ember:  {p:"#e85c4a",g2:"#c04030",n:"Ember"},
  sage:   {p:"#6dba8a",g2:"#4a9060",n:"Sage"},
  sky:    {p:"#7ab3e8",g2:"#5080c0",n:"Sky"},
  iris:   {p:"#b48ae8",g2:"#8060c0",n:"Iris"},
  blush:  {p:"#e88ab0",g2:"#c06080",n:"Blush"},
  sand:   {p:"#d4b896",g2:"#a88060",n:"Sand"},
};
const DEF_PHYS=[
  {id:"p1",l:"Morning Routine",i:"🌅"},{id:"p2",l:"Night Routine",i:"🌙"},
  {id:"p3",l:"Daily Stretching",i:"🤸"},{id:"p4",l:"Water Intake (2L+)",i:"💧"},
  {id:"p5",l:"Healthy Food",i:"🥗"},{id:"p6",l:"No Cheat Meal",i:"🚫"},
  {id:"p7",l:"Daily Hygiene",i:"🧼"},{id:"p8",l:"Workout",i:"💪"},
  {id:"p9",l:"No Fapping",i:"🔒"},
];
const DEF_MENT=[
  {id:"m1",l:"Daily Lecture (1+)",i:"🎓"},{id:"m2",l:"Self-Study Session",i:"📖"},
  {id:"m3",l:"Book Reading",i:"📚"},{id:"m4",l:"No Doom Scrolling",i:"📵"},
  {id:"m5",l:"Mindfulness",i:"🧘"},
];
const DEF_FAM=[
  {id:"f1",l:"Called Family",i:"📞"},{id:"f2",l:"Quality Time",i:"❤️"},{id:"f3",l:"Helped Someone",i:"🤝"},
];
const DEF_WO={0:[],1:["Push Ups","Bench Press","Shoulder Press"],2:["Running","Cycling"],3:["Pull Ups","Rows","Bicep Curls"],4:["Rest"],5:["Squats","Lunges","Leg Press"],6:["HIIT","Core","Plank"]};
const MOODS=[
  {id:"awful",e:"😩",l:"Awful",c:"#e85c4a"},
  {id:"bad",  e:"😔",l:"Bad",  c:"#e89050"},
  {id:"meh",  e:"😐",l:"Meh",  c:"#e8c850"},
  {id:"good", e:"🙂",l:"Good", c:"#6dba8a"},
  {id:"great",e:"😄",l:"Great",c:"#7ab3e8"},
];
const SLEEP_Q=["Poor","Okay","Good","Great"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const ACH=[
  {id:"first",i:"🌱",l:"First Step",  f:s=>Object.keys(s.c).length>=1},
  {id:"s3",   i:"🔥",l:"3-Day Fire",  f:s=>streak(s)>=3},
  {id:"s7",   i:"⚡",l:"Week Warrior",f:s=>streak(s)>=7},
  {id:"s30",  i:"👑",l:"Month King",  f:s=>streak(s)>=30},
  {id:"perf", i:"💎",l:"Perfect Day", f:s=>Object.keys(s.c).some(d=>eff(d,s)===100)},
  {id:"hydra",i:"💧",l:"Hydrated",    f:s=>Object.values(s.w||{}).some(v=>v>=8)},
  {id:"mood5",i:"🌅",l:"Mood Logger", f:s=>Object.keys(s.m||{}).length>=5},
  {id:"sleep",i:"😴",l:"Sleep King",  f:s=>Object.values(s.sl||{}).filter(v=>v&&v.h>=8).length>=3},
  {id:"photo",i:"📷",l:"Shooter",     f:s=>Object.values(s.ph||{}).flat().length>=5},
  {id:"t7",   i:"📅",l:"Week Logger", f:s=>Object.keys(s.c).length>=7},
  {id:"focus",i:"📵",l:"Focus",       f:s=>Object.values(s.d||{}).filter(v=>v<=30&&v>=0).length>=7},
  {id:"all3", i:"🏆",l:"All-Round",   f:s=>Object.keys(s.c).some(d=>{const ch=s.c[d]||{};return s.pt.every(t=>ch[t.id])&&s.mt.every(t=>ch[t.id])&&s.ft.every(t=>ch[t.id]);})},
];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const LS={
  g:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d}catch{return d}},
  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
let S={
  tk:LS.g("wos_tk","void"), ak:LS.g("wos_ak","gold"),
  tab:"home", dv:false, sel:null,
  cy:new Date().getFullYear(), cm:new Date().getMonth(),
  esec:null, woed:false, wu:LS.g("wos_wu","cups"),
  pe:LS.g("wos_pe",false), ph_:LS.g("wos_ph_",""), pu:false,
  pt:LS.g("wos_pt",DEF_PHYS), mt:LS.g("wos_mt",DEF_MENT), ft:LS.g("wos_ft",DEF_FAM),
  c:LS.g("wos_c",{}), n:LS.g("wos_n",{}), ph:LS.g("wos_ph",{}),
  wo:LS.g("wos_wo",DEF_WO), rw:LS.g("wos_rw",{}), ex:LS.g("wos_ex",{}),
  xt:LS.g("wos_xt",{}), d:LS.g("wos_d",{}),
  m:LS.g("wos_m",{}), w:LS.g("wos_w",{}), sl:LS.g("wos_sl",{}),
  food:LS.g("wos_food",{}),
  body:LS.g("wos_body",{h:170,cw:70,gw:65,wks:12,sex:"male",act:"moderate"}),
  cfoods:LS.g("wos_cfoods",[]),
};
function save(){
  LS.s("wos_tk",S.tk);LS.s("wos_ak",S.ak);LS.s("wos_wu",S.wu);
  LS.s("wos_pe",S.pe);LS.s("wos_ph_",S.ph_);
  LS.s("wos_pt",S.pt);LS.s("wos_mt",S.mt);LS.s("wos_ft",S.ft);
  LS.s("wos_c",S.c);LS.s("wos_n",S.n);LS.s("wos_ph",S.ph);
  LS.s("wos_wo",S.wo);LS.s("wos_rw",S.rw);LS.s("wos_ex",S.ex);
  LS.s("wos_xt",S.xt);LS.s("wos_d",S.d);
  LS.s("wos_m",S.m);LS.s("wos_w",S.w);LS.s("wos_sl",S.sl);
  LS.s("wos_food",S.food);
  LS.s("wos_body",S.body);
  LS.s("wos_cfoods",S.cfoods);
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
const today=()=>new Date().toISOString().slice(0,10);
const dkey=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const allT=()=>[...S.pt,...S.mt,...S.ft];
function eff(date,st=S){
  const ch=st.c[date]||{},xt=st.xt[date]||[];
  const all=allT().length+xt.length;if(!all)return 0;
  return Math.round(([...S.pt,...S.mt,...S.ft].filter(t=>ch[t.id]).length+xt.filter(t=>t.done).length)/all*100);
}
function streak(st=S){
  let s=0;const d=new Date();
  for(let i=0;i<365;i++){if(eff(d.toISOString().slice(0,10),st)>=50){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}
const last=(n)=>Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return d.toISOString().slice(0,10)});
const T=()=>THEMES[S.tk]||THEMES.void;
const A=()=>ACCENTS[S.ak]||ACCENTS.gold;
const MC=id=>MOODS.find(m=>m.id===id);
const hp=p=>{let h=5381;for(let i=0;i<p.length;i++)h=((h<<5)+h)+p.charCodeAt(i);return h.toString(36)};
const wLabel=v=>S.wu==='litres'?(v*0.25).toFixed(1)+'L':v+' cups';
function hmColor(p){
  const dk=T().d;
  if(!p)return dk?"#ffffff05":"#00000008";
  if(p<25)return dk?"#1a2a1a":"#c8f0d0";
  if(p<50)return dk?"#1a3a1a":"#6dba8a55";
  if(p<75)return dk?"#1a4a1a":"#6dba8a";
  if(p<100)return dk?"#1e5a2a":"#3a9a58";
  return"#6dba8a";
}
function unlocked(){return ACH.filter(a=>{try{return a.f(S)}catch{return false}})}

// ══════════════════════════════════════
// THEME ENGINE
// ══════════════════════════════════════
function applyTheme(){
  const th=T(),ac=A(),r=document.documentElement.style;
  r.setProperty('--paper',th.bg);r.setProperty('--paper2',th.p2);r.setProperty('--paper3',th.p3);
  r.setProperty('--line',th.l);r.setProperty('--line2',th.l2);
  r.setProperty('--ink',th.t);r.setProperty('--ink2',th.t2);r.setProperty('--ink3',th.t3);
  r.setProperty('--accent',ac.p);r.setProperty('--accent2',ac.g2);
  document.body.style.background=th.bg;
  Chart.defaults.color=th.t2;Chart.defaults.borderColor=th.l;
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
let charts={};
function killCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch{}});charts={}}
function render(){
  if(S.pe&&!S.pu){renderPin();return}
  killCharts();applyTheme();updateNav();updateTopBar();
  document.getElementById("content").innerHTML=`<div class="tab-enter">${buildTab()}</div>`;
  requestAnimationFrame(()=>{
    initReveal();buildCharts();
    if(S.tab==='home')scoreRollup();
  });
}
function updateNav(){
  document.querySelectorAll(".navbtn").forEach(b=>{
    const on=b.dataset.tab===S.tab;
    b.classList.toggle("active",on);
  });
}
function updateTopBar(){
  const td=today(),e=eff(td),ac=A();
  // date
  document.getElementById("date-chip").textContent=new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short"});
  // ring
  const circ=81.7,dash=e/100*circ;
  const ring=document.getElementById("tr-ring");
  if(ring){ring.style.stroke=ac.p;ring.setAttribute("stroke-dasharray",`${dash} ${circ}`)}
  const pct=document.getElementById("tr-pct");
  if(pct)pct.textContent=e+'%';
}
function buildTab(){
  if(S.tab==="calendar")return S.dv?buildDay():buildCal();
  if(S.tab==="food")return buildFood();
  if(S.tab==="analytics")return buildAnalytics();
  if(S.tab==="settings")return buildSettings();
  return buildHome();
}
function scoreRollup(){
  const el=document.getElementById('score-num');
  if(!el)return;
  const target=parseInt(el.textContent)||0;
  let cur=0;
  const step=()=>{cur=Math.min(cur+Math.ceil(target/25),target);el.textContent=cur;if(cur<target)requestAnimationFrame(step);};
  el.textContent='0';
  el.classList.add('score-pop');
  requestAnimationFrame(step);
}
function initReveal(){
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("vis");io.unobserve(e.target)}}),{threshold:0.05});
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}

function buildCal(){
  const td=today();
  const firstDay=new Date(S.cy,S.cm,1).getDay();
  const dim=new Date(S.cy,S.cm+1,0).getDate();
  const cells=[...Array(firstDay).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const avgEff=Math.round(Array.from({length:dim},(_,i)=>eff(dkey(S.cy,S.cm,i+1))).reduce((a,b)=>a+b,0)/dim);

  return `
  <div class="cal-header">
    <div>
      <div class="label">Calendar</div>
      <div class="cal-month">${MONTHS[S.cm]} ${S.cy}</div>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
      <button class="cal-nav-btn" onclick="nextMonth()">›</button>
    </div>
  </div>

  <div class="cal-dow">
    ${DAYS.map(d=>`<div>${d[0]}</div>`).join("")}
  </div>
  <div class="cal-grid">
    ${cells.map(day=>{
      if(!day)return`<div></div>`;
      const date=dkey(S.cy,S.cm,day);
      const e=eff(date);
      const isToday=date===td,isSel=date===S.sel;
      const mood=S.m[date];
      return `<div class="cal-cell${isToday?' today':''}${isSel?' sel':''}" onclick="selDate('${date}')">
        <div class="cal-cell-num">${day}</div>
        <div class="cal-cell-bar"><div class="cal-cell-bar-fill" style="width:${e}%;background:${e===100?'#6dba8a':'var(--accent)'}"></div></div>
        <div class="cal-cell-dots">
          ${S.rw[date]?`<div class="cal-dot" style="background:var(--accent)"></div>`:''}
          ${mood?`<div class="cal-dot" style="background:${MC(mood).c}"></div>`:''}
          ${(S.ph[date]||[]).length?`<div class="cal-dot" style="background:#7ab3e8"></div>`:''}
        </div>
      </div>`;
    }).join("")}
  </div>

  <!-- MOOD STRIP -->
  <div class="mood-strip-row" style="margin-bottom:4px">
    ${cells.map(day=>{
      if(!day)return`<div></div>`;
      const mood=S.m[dkey(S.cy,S.cm,day)];
      return `<div class="mood-strip-cell" style="background:${mood?MC(mood).c+'55':'var(--line)'}"></div>`;
    }).join("")}
  </div>
  <div class="label" style="padding:4px 20px 16px;color:var(--ink3)">Mood this month</div>

  <!-- MONTH STATS -->
  <div class="reveal" style="padding:0 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
    ${(()=>{
      const days=Array.from({length:dim},(_,i)=>dkey(S.cy,S.cm,i+1));
      const perfect=days.filter(d=>eff(d)===100).length;
      const moodDays=days.filter(d=>S.m[d]).length;
      return [
        ['Avg',avgEff+'%','var(--accent)'],
        ['Perfect',perfect,'#6dba8a'],
        ['Moods',moodDays,'var(--purple)'],
      ].map(([lb,vl,cl])=>`<div style="background:var(--paper2);border:1px solid var(--line);border-radius:var(--r12);padding:12px 10px;text-align:center">
        <div style="font-family:'Fraunces',serif;font-size:24px;font-style:italic;color:${cl};font-weight:300">${vl}</div>
        <div class="label" style="margin-top:2px">${lb}</div>
      </div>`).join("");
    })()}
  </div>

  <!-- MONTH HEATMAP in calendar -->
  <div class="reveal" style="padding:0 20px;margin-bottom:0">
    <div class="label" style="margin-bottom:8px">Activity This Month</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
      ${cells.map(day=>{
        if(!day)return`<div style="aspect-ratio:1;border-radius:5px;background:transparent"></div>`;
        const date=dkey(S.cy,S.cm,day);
        return `<div onclick="selDate('${date}')" style="aspect-ratio:1;border-radius:5px;background:${hmColor(eff(date))};cursor:pointer;transition:transform 0.15s" title="${date}"></div>`;
      }).join("")}
    </div>
  </div>
  `;
}

  const dk=S.sel,ch=S.c[dk]||{},xt=S.xt[dk]||[];
  const note=S.n[dk]||"",photos=S.ph[dk]||[];
  const e=eff(dk);
  const dow=new Date(dk+"T00:00:00").getDay(),wo=S.wo[dow]||[];
  const dateObj=new Date(dk+"T00:00:00");
  const mood=S.m[dk],water=S.w[dk]||0,sl=S.sl[dk];
  const all=allT(),totalDone=all.filter(t=>ch[t.id]).length+xt.filter(t=>t.done).length;
  const dash=(e/100*150.8);
  const isRew=S.rw[dk],isEx=S.ex[dk];
  const secs=[
    {l:"Physical",c:"var(--red)",   tasks:S.pt},
    {l:"Mental",  c:"var(--purple)",tasks:S.mt},

  return `
  <div style="padding:16px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px">

    <div>
      <div class="label">${dateObj.toLocaleDateString("en-IN",{weekday:"long"})}</div>
      <div style="font-family:'Fraunces',serif;font-size:20px;font-style:italic;font-weight:300;color:var(--ink);letter-spacing:-0.5px">${dateObj.toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"})}</div>
    </div>
  </div>

  <!-- DAY HERO -->
  <div style="padding:20px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:center">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="32" fill="none" stroke="var(--line2)" stroke-width="4"/>
      <circle cx="36" cy="36" r="32" fill="none" stroke="${e===100?'#6dba8a':'var(--accent)'}" stroke-width="4"
        stroke-dasharray="${e/100*201.1} 201.1" stroke-linecap="round" transform="rotate(-90 36 36)"
        style="transition:stroke-dasharray 0.8s var(--ease)"/>
      <text x="36" y="34" text-anchor="middle" font-family="Fraunces,serif" font-size="14" font-style="italic" fill="var(--ink)" font-weight="300">${e}%</text>
      <text x="36" y="46" text-anchor="middle" font-family="Cabinet Grotesk,sans-serif" font-size="8" fill="var(--ink3)" font-weight="700" letter-spacing="1">${e===100?'PERFECT':'EFF.'}</text>
    </svg>
    <div style="flex:1">
      <div class="label">Tasks Done</div>
      <div style="font-family:'Fraunces',serif;font-size:32px;font-style:italic;font-weight:300;color:var(--ink)">${totalDone}<span style="font-size:16px;color:var(--ink3)">/${all.length+xt.length}</span></div>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        ${mood?`<div style="font-size:10px;padding:3px 8px;border-radius:6px;background:${MC(mood).c}18;color:${MC(mood).c};font-weight:700;border:1px solid ${MC(mood).c}30">${MC(mood).e} ${MC(mood).l}</div>`:''}
        ${sl?`<div style="font-size:10px;padding:3px 8px;border-radius:6px;background:#b48ae815;color:#b48ae8;font-weight:700;border:1px solid #b48ae830">😴 ${sl.h}h</div>`:''}
        ${water>0?`<div style="font-size:10px;padding:3px 8px;border-radius:6px;background:#7ab3e815;color:#7ab3e8;font-weight:700;border:1px solid #7ab3e830">💧 ${water}/8</div>`:''}
      </div>
    </div>
  </div>

  <!-- REWARD / EXCEPTION -->
  <div style="padding:12px 20px;border-bottom:1px solid var(--line);display:flex;gap:8px">
    <button onclick="toggleRew('${dk}')" class="btn" style="flex:1;background:${isRew?'var(--accent)18':'#ffffff05'};color:${isRew?'var(--accent)':'var(--ink3)'};border:1px solid ${isRew?'var(--accent)35':'var(--line2)'}">
      ✦ ${isRew?'Rewarded':'Mark Reward'}
    </button>
    <button onclick="toggleEx('${dk}')" class="btn" style="flex:1;background:${isEx?'#e8c85015':'#ffffff05'};color:${isEx?'#e8c850':'var(--ink3)'};border:1px solid ${isEx?'#e8c85035':'var(--line2)'}">
      ⚡ ${isEx?'Exception':'Mark Exception'}
    </button>
  </div>

  <!-- MOOD (DAY) -->
  <div class="gap8"></div>
  <div class="section-card">
    <div class="section-card-head"><div class="label">Mood</div></div>
    <div style="padding:12px 14px">
      <div class="mood-row">

  <div class="gap8"></div>

  <!-- WATER (DAY) -->

      <div class="section-card-head">

      <div style="display:flex;justify-content:space-between;font-size:9.5px;color:var(--ink3);font-weight:700;margin-top:4px">

      </div>
      <div style="font-size:10.5px;color:var(--ink3);margin-top:8px;text-align:center">Target: under 30 min / day</div>
    </div>
  </div>

  <div class="gap8"></div>

  <!-- NOTES -->
  <div class="section-card" style="margin-bottom:0">
    <div class="section-card-head"><div class="label">Notes</div></div>
    <div style="padding:12px 14px">
      <textarea rows="3" placeholder="Thoughts for this day..." oninput="saveNote('${dk}',this.value)">${note}</textarea>
    </div>
  </div>
  `;
}

// ── TDEE & Body Calculations (Mifflin-St Jeor) ──
const ACT_MUL={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,athlete:1.9};
function calcBMR(b){
  const base=10*(b.cw||70)+6.25*(b.h||170)-5*(b.age||22);
  return Math.round(b.sex==='female'?base-161:base+5);
}
function calcTDEE(b){return Math.round(calcBMR(b)*(ACT_MUL[b.act]||1.55))}
function calcBodyGoals(b){
  const tdee=calcTDEE(b);
  const bmr=calcBMR(b);
  const diff=(b.cw||70)-(b.gw||65);
  const totalCals=diff*7700;
  const dailyDef=Math.round(totalCals/((b.wks||12)*7));
  const targetCal=Math.max(1200,tdee-dailyDef);
  const weeklyChange=Math.abs(dailyDef*7/7700).toFixed(2);
  const bmi=+((b.cw||70)/(((b.h||170)/100)**2)).toFixed(1);
  const bmiCat=bmi<18.5?'Underweight':bmi<25?'Normal':bmi<30?'Overweight':'Obese';
  return{tdee,bmr,targetCal,dailyDef,weeklyChange,bmi,bmiCat,diff};
}
function getDynGoals(){
  const b=S.body||{};
  if(!b.cw||!b.h||!b.gw)return{cal:2000,p:150,c:250,f:65};
  const cal=calcBodyGoals(b).targetCal;
  const p=Math.round((b.cw||70)*1.8);
  return{cal,p,c:Math.round(cal*0.45/4),f:Math.round(cal*0.25/9)};
}

// ── Food search + parse ──
let foodSearch='',foodSuggs=[],pendingFood=null;

function searchFood(q){
  if(!q||q.length<2)return[];
  const ql=q.toLowerCase();
  const all=[...FOOD_DB,...(S.cfoods||[]).map(f=>({...f,cat:'Custom'}))];
  return all.filter(f=>f.n.toLowerCase().includes(ql)||f.cat.toLowerCase().includes(ql)).slice(0,14);
}

function parseFoodInput(raw){
  // "100g rice", "2 chapati", "200ml milk", "1 scoop whey"
  const txt=raw.trim().toLowerCase();
  const numMatch=txt.match(/^([\d.]+)\s*(g|ml|kg|mg|pc|piece|cup|glass|scoop|srv|serving|tbsp|tsp)?/i);
  let qty=null,unit=null;
  if(numMatch){qty=parseFloat(numMatch[1]);unit=(numMatch[2]||'').toLowerCase();}
  // find best food match from rest of string
  const rest=txt.replace(/^[\d.]+\s*(g|ml|kg|mg|pc|piece|cup|glass|scoop|srv|serving|tbsp|tsp)?\s*/i,'').trim();
  const matches=rest?searchFood(rest):[];
  return{qty,unit,matches,rest};
}

function calcEntry(food,qty,unit){
  // Always calculate per actual qty
  let multiplier=1;
  const u=(unit||food.unit||'g').toLowerCase();
  // if food is per 100g/ml
  if(food.unit==='g'||food.unit==='ml'){
    multiplier=(qty||100)/100;
  } else {
    // per piece/cup/scoop etc — qty is count
    multiplier=(qty||food.std||1);
  }
  return{
    cal:Math.round(food.cal*multiplier),
    p:Math.round(food.p*multiplier*10)/10,
    c:Math.round(food.c*multiplier*10)/10,
    f:Math.round(food.f*multiplier*10)/10,
  };
}

function getTodayFood(){return S.food[today()]||[]}
function getFoodTotals(entries){
  return entries.reduce((a,e)=>({cal:a.cal+e.cal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{cal:0,p:0,c:0,f:0});
}

  <div class="gap8"></div>

    <span class="settings-section-label">Appearance</span>
    <div style="background:var(--paper2);border:1px solid var(--line);border-radius:var(--r16);padding:14px">
      <div class="label" style="margin-bottom:10px">Dark</div>
      <div class="theme-grid" style="margin-bottom:12px">
        ${Object.entries(THEMES).filter(([,t])=>t.d).map(([k,t])=>`

        <div style="font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:7px">Sex</div>
        <div style="display:flex;gap:6px;margin-bottom:12px">
          ${[['male','♂ Male'],['female','♀ Female']].map(([v,l])=>`
            <button onclick="updateBody('sex','${v}')"
              class="btn ${S.body.sex===v?'btn-accent':'btn-ghost'}" style="flex:1;font-size:12px">${l}</button>
          `).join("")}

        <div style="font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:7px">Activity Level</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px">

  <div class="gap8"></div>

  <!-- DATA -->
  <div class="settings-section">
    <span class="settings-section-label">Data</span>
    <div class="settings-row-card">
      <div style="padding:14px;display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-accent btn-full" onclick="exportData()">⬇ Export Backup (JSON)</button>

  <!-- DANGER -->

      </div>
    </div>
  </div>
  `;
}

function buildCharts(){
  const th=T(),ac=A();
  const chartOpts=(extra={})=>({
    responsive:true,
    plugins:{legend:{display:false},tooltip:{backgroundColor:th.p2,titleColor:th.t,bodyColor:th.t2,borderColor:th.l2,borderWidth:1,padding:10}},
    ...extra
  });

  // Hero canvas particles
  const hc=document.getElementById("hero-canvas");
  if(hc){
    hc.width=hc.offsetWidth;hc.height=hc.offsetHeight;
    const ctx=hc.getContext("2d");
    const particles=Array.from({length:28},()=>({
      x:Math.random()*hc.width,y:Math.random()*hc.height,
      r:Math.random()*1.5+0.5,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,
      a:Math.random()*0.4+0.05
    }));
    let animId;
    function drawParticles(){
      ctx.clearRect(0,0,hc.width,hc.height);
      particles.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0)p.x=hc.width;if(p.x>hc.width)p.x=0;
        if(p.y<0)p.y=hc.height;if(p.y>hc.height)p.y=0;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${parseInt(ac.p.slice(1,3),16)},${parseInt(ac.p.slice(3,5),16)},${parseInt(ac.p.slice(5,7),16)},${p.a})`;
        ctx.fill();
      });
      animId=requestAnimationFrame(drawParticles);
    }
    drawParticles();
    hc._animId=animId;
  }

  if(S.tab==="home"){
    const el=document.getElementById("weekChart");
    if(!el)return;
    const w7=last(7);
    charts.week=new Chart(el,{type:"bar",
      data:{labels:w7.map(d=>d.slice(5)),datasets:[{
        data:w7.map(d=>eff(d)),
        backgroundColor:w7.map((d,i)=>d===today()?ac.p:eff(d)===100?"#6dba8a":ac.p+"33"),
        borderRadius:6,borderSkipped:false
      }]},
      options:{...chartOpts(),scales:{x:{grid:{display:false},border:{display:false},ticks:{color:th.t3,font:{size:10}}},y:{grid:{color:th.l},border:{display:false},ticks:{color:th.t3,font:{size:9.5},callback:v=>v+'%'},max:100,min:0}}}
    });
  }

  if(S.tab==="food"){
    const fEl=document.getElementById("foodChart");
    if(fEl){
      const w7=last(7);
      charts.food=new Chart(fEl,{type:"bar",
        data:{labels:w7.map(d=>d.slice(8)),datasets:[
          {label:"Calories",data:w7.map(d=>getFoodTotals(S.food[d]||[]).cal),backgroundColor:ac.p+"55",borderColor:ac.p,borderWidth:1.5,borderRadius:5,yAxisID:'y'},
          {label:"Protein",data:w7.map(d=>getFoodTotals(S.food[d]||[]).p),type:"line",backgroundColor:"transparent",borderColor:"#e85c4a",borderWidth:2,tension:0.4,pointRadius:3,pointBackgroundColor:"#e85c4a",yAxisID:'y2'},
        ]},
        options:{...chartOpts({plugins:{legend:{display:true,labels:{color:th.t2,font:{size:10},usePointStyle:true,padding:10}}}}),scales:{x:{grid:{display:false},border:{display:false},ticks:{color:th.t3,font:{size:9.5}}},y:{grid:{color:th.l},border:{display:false},ticks:{color:th.t2,font:{size:9.5}},min:0},y2:{position:"right",grid:{display:false},border:{display:false},ticks:{color:"#e85c4a",font:{size:9.5}},min:0}}}
      });
    }
  }
  if(S.tab==="analytics"){
    const l30=last(30),l14=last(14);
    const tEl=document.getElementById("trendChart");
    if(tEl){
      charts.trend=new Chart(tEl,{type:"line",
        data:{labels:l30.map(d=>d.slice(8)),datasets:[{
          data:l30.map(d=>eff(d)),borderColor:ac.p,backgroundColor:ac.p+"14",
          fill:true,tension:0.45,pointRadius:0,pointHoverRadius:5,borderWidth:2
        }]},
        options:{...chartOpts(),scales:{x:{grid:{display:false},border:{display:false},ticks:{color:th.t3,font:{size:9},maxTicksLimit:8}},y:{grid:{color:th.l},border:{display:false},ticks:{color:th.t3,font:{size:9},callback:v=>v+'%'},max:100,min:0}}}
      });
    }
    const mEl=document.getElementById("moodChart");
    if(mEl){
      const ms={awful:1,bad:2,meh:3,good:4,great:5};
      charts.mood=new Chart(mEl,{type:"bar",
        data:{labels:l14.map(d=>d.slice(8)),datasets:[{
          data:l14.map(d=>S.m[d]?ms[S.m[d]]:null),
          backgroundColor:l14.map(d=>S.m[d]?MC(S.m[d]).c+'bb':ac.p+"22"),
          borderRadius:5,borderSkipped:false
        }]},
        options:{...chartOpts(),scales:{x:{grid:{display:false},border:{display:false},ticks:{color:th.t3,font:{size:9.5}}},y:{grid:{display:false},border:{display:false},min:0,max:5,ticks:{color:th.t3,font:{size:9.5},callback:v=>({1:'😩',3:'😐',5:'😄'}[v]||'')}}}}
      });
    }
    const hEl=document.getElementById("healthChart");
    if(hEl){
      charts.health=new Chart(hEl,{type:"bar",
        data:{labels:l14.map(d=>d.slice(8)),datasets:[
          {label:"Water",data:l14.map(d=>S.w[d]||0),backgroundColor:"#7ab3e844",borderColor:"#7ab3e8",borderWidth:1.5,borderRadius:4,yAxisID:'y'},
          {label:"Sleep",data:l14.map(d=>S.sl[d]?S.sl[d].h:null),type:"line",backgroundColor:"transparent",borderColor:"#b48ae8",borderWidth:2,tension:0.4,pointRadius:3,pointBackgroundColor:"#b48ae8",yAxisID:'y2'},
        ]},
        options:{...chartOpts({plugins:{legend:{display:true,labels:{color:th.t2,font:{size:10},usePointStyle:true,padding:10}}}}),scales:{x:{grid:{display:false},border:{display:false},ticks:{color:th.t3,font:{size:9.5}}},y:{grid:{color:th.l},border:{display:false},ticks:{color:"#7ab3e8",font:{size:9.5}},max:8,min:0},y2:{position:"right",grid:{display:false},border:{display:false},ticks:{color:"#b48ae8",font:{size:9.5}},max:12,min:0}}}
      });
    }
    const rEl=document.getElementById("radarChart");
    if(rEl){
      const td=today(),ch=S.c[td]||{};
      charts.radar=new Chart(rEl,{type:"radar",
        data:{labels:["Physical","Mental","Family"],datasets:[{
          data:[
            S.pt.length?Math.round(S.pt.filter(t=>ch[t.id]).length/S.pt.length*100):0,
            S.mt.length?Math.round(S.mt.filter(t=>ch[t.id]).length/S.mt.length*100):0,
            S.ft.length?Math.round(S.ft.filter(t=>ch[t.id]).length/S.ft.length*100):0,
          ],
          borderColor:ac.p,backgroundColor:ac.p+"1a",pointBackgroundColor:ac.p,pointRadius:5,borderWidth:2
        }]},
        options:{...chartOpts(),scales:{r:{grid:{color:th.l},angleLines:{color:th.l},pointLabels:{color:th.t2,font:{size:12,weight:"700"}},ticks:{display:false},min:0,max:100}}}
      });
    }
  }
}

let pinBuf='',pinMode='unlock',pinTmp='';
function renderPin(){
  applyTheme();
  document.getElementById("content").innerHTML='';
  const ex=document.getElementById("pin-screen");if(ex)ex.remove();
  const el=document.createElement("div");
  el.id="pin-screen";el.className="pin-screen";
  el.style.background="var(--paper)";
  el.innerHTML=`
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,${A().p}08,transparent 70%);pointer-events:none"></div>
    <div class="pin-logo">W·OS</div>
    <div class="pin-sub" id="pin-sub">Enter your PIN to continue</div>
    <div class="pin-dots" id="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd${i}"></div>`).join("")}</div>
    <div class="pin-pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinPress('${n}')">${n}</button>`).join("")}
      <button class="pin-key zero" onclick="pinPress('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
  `;
  document.body.appendChild(el);
}
function showSetPin(){
  pinBuf='';pinMode='set1';pinTmp='';
  const el=document.createElement("div");el.className="modal-scrim";el.id="set-pin-scrim";
  el.innerHTML=`<div class="modal-sheet" style="display:flex;flex-direction:column;align-items:center;padding:28px 24px">
    <div class="modal-handle"></div>
    <div class="pin-logo" style="font-size:36px;margin-bottom:4px">🔐</div>
    <div class="pin-sub" id="set-pin-sub" style="margin-bottom:24px">Choose a 4-digit PIN</div>
    <div class="pin-dots" id="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd${i}"></div>`).join("")}</div>
    <div class="pin-pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinSetPress('${n}')">${n}</button>`).join("")}
      <button class="pin-key zero" onclick="pinSetPress('0')">0</button>
      <button class="pin-key del" onclick="pinSetDel()">⌫</button>
    </div>
    <button class="btn btn-ghost btn-full" style="margin-top:14px" onclick="document.getElementById('set-pin-scrim').remove()">Cancel</button>
  </div>`;
  document.body.appendChild(el);
}
function updDots(n){document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('fill',i<n))}
function shakeDots(){document.querySelectorAll('.pin-dot').forEach(d=>{d.classList.add('err');setTimeout(()=>d.classList.remove('err'),500)})}
function pinPress(n){
  if(pinBuf.length>=4)return;
  pinBuf+=n;updDots(pinBuf.length);
  if(pinBuf.length===4)setTimeout(()=>{
    if(hp(pinBuf)===S.ph_){S.pu=true;document.getElementById("pin-screen")?.remove();render()}
    else{pinBuf='';shakeDots();document.getElementById("pin-sub").textContent='Incorrect PIN — try again'}
  },80);
}
function pinDel(){pinBuf=pinBuf.slice(0,-1);updDots(pinBuf.length)}
function pinSetPress(n){
  if(pinBuf.length>=4)return;
  pinBuf+=n;updDots(pinBuf.length);
  if(pinBuf.length===4)setTimeout(()=>{

const BREATH_MODES={
  '478':{phases:[{n:'Inhale',d:4},{n:'Hold',d:7},{n:'Exhale',d:8}],label:'4-7-8 Relaxation'},
  'box':{phases:[{n:'Inhale',d:4},{n:'Hold',d:4},{n:'Exhale',d:4},{n:'Hold',d:4}],label:'Box Breathing'},
  '24': {phases:[{n:'Inhale',d:2},{n:'Exhale',d:4}],label:'2-4 Quick Calm'},
};
let breathMode='478',breathRunning=false,breathTimer=null,breathPhaseIdx=0,breathSec=0,breathCycle=0;

function setBreathMode(id){
  if(breathRunning)stopBreath();
  breathMode=id;
  const title=document.getElementById('breath-mode-title');
  if(title)title.textContent=BREATH_MODES[id].label;
  Object.keys(BREATH_MODES).forEach(k=>{
    const btn=document.getElementById('bm-'+k);
    if(btn)btn.className='breath-mode-btn'+(k===id?' on':'');
  });
  resetBreathUI();
}
function resetBreathUI(){
  const p=document.getElementById('breath-phase');
  const c=document.getElementById('breath-count');
  const arc=document.getElementById('breath-arc');
  const info=document.getElementById('breath-info');
  if(p)p.textContent='Ready';
  if(c)c.textContent='—';
  if(arc)arc.setAttribute('stroke-dasharray','0 276');
  if(info)info.textContent='Tap Start to begin';
}
function toggleBreath(){breathRunning?stopBreath():startBreath();}
function startBreath(){
  breathRunning=true;breathPhaseIdx=0;breathSec=0;breathCycle=0;
  const btn=document.getElementById('breath-start-btn');
  if(btn){btn.textContent='Stop';btn.className='btn btn-danger';btn.style.cssText='font-size:11px;padding:7px 14px';}
  runBreathTick();
}
function stopBreath(){
  breathRunning=false;clearTimeout(breathTimer);
  const btn=document.getElementById('breath-start-btn');
  if(btn){btn.textContent='Start';btn.className='btn btn-accent';btn.style.cssText='font-size:11px;padding:7px 14px';}
  const info=document.getElementById('breath-info');
  if(info)info.textContent=breathCycle>0?`${breathCycle} cycle${breathCycle>1?'s':''} completed 🌿`:'Tap Start to begin';
  resetBreathUI();
}
function runBreathTick(){
  if(!breathRunning)return;
  const phases=BREATH_MODES[breathMode].phases;
  const phase=phases[breathPhaseIdx];
  const remaining=phase.d-breathSec;
  const p=document.getElementById('breath-phase');
  const c=document.getElementById('breath-count');
  const arc=document.getElementById('breath-arc');
  const info=document.getElementById('breath-info');
  if(!p||!c)return;
  if(p)p.textContent=phase.n.toUpperCase();
  if(c)c.textContent=remaining;
  if(arc){const pct=breathSec/phase.d;arc.setAttribute('stroke-dasharray',`${pct*276} 276`);}
  if(info)info.textContent=`Cycle ${breathCycle+1}`;
  breathSec++;
  if(breathSec>=phase.d){
    breathSec=0;breathPhaseIdx++;
    if(breathPhaseIdx>=phases.length){breathPhaseIdx=0;breathCycle++;}
  }
  breathTimer=setTimeout(runBreathTick,1000);
}

      if(!start)start=ts;
      const p=Math.min((ts-start)/700,1);
      const ease=1-Math.pow(1-p,3);
      sn.textContent=Math.round(target*ease);
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
});

// Service worker for PWA
const sw=`const V="wos-v5";self.addEventListener("install",e=>{self.skipWaiting()});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k)))));self.clients.claim()});self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response("Offline",{status:200}))))});`;
if("serviceWorker"in navigator){
  const swBlob=new Blob([sw],{type:"text/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
  // PWA install prompt
  let deferredPrompt;
  window.addEventListener("beforeinstallprompt",e=>{
    e.preventDefault();deferredPrompt=e;

      const fab=document.createElement("button");
      fab.id="install-fab";

      document.body.appendChild(fab);

  });
