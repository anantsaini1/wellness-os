<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="W·OS"/>
<title>Wellness OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--bg);color:var(--t);overscroll-behavior:none}
:root{
  --bg:#080706;--p2:#0e0d0b;--p3:#151310;
  --ln:#ffffff12;--l2:#ffffff22;
  --t:#f0ede8;--t2:#c8c0b4;--t3:#7a7268;
  --ac:#e8d5a3;--ac2:#c4a96d;
  --red:#e85c4a;--green:#6dba8a;--blue:#7ab3e8;--purple:#b48ae8;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--ln);background:var(--p2);flex-shrink:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-w{font-family:'Fraunces',serif;font-size:32px;font-style:italic;font-weight:300;color:var(--ac);letter-spacing:-2px;line-height:1}
.logo-meta{display:flex;flex-direction:column;gap:2px}
.logo-title{font-size:9px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--t2);line-height:1}
.logo-by{font-size:7px;font-weight:700;color:var(--t3);line-height:1}
#topbar-right{display:flex;align-items:center;gap:10px}
#date-chip{font-size:11px;font-weight:700;color:var(--t3)}
.ring-sm{position:relative;width:34px;height:34px}
.ring-sm svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-sm span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--ac)}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#scroll::-webkit-scrollbar{display:none}
.pad{padding-bottom:20px}
#nav{display:flex;background:var(--p2);border-top:1px solid var(--ln);padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;border:none;background:transparent;cursor:pointer;gap:3px}
.nb svg{width:20px;height:20px;stroke:var(--t3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.nb span{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);transition:color .2s}
.nb.on svg{stroke:var(--ac)}
.nb.on span{color:var(--ac)}
/* cards */
.card{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);margin:0 14px;overflow:hidden}
.card+.card{margin-top:8px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px 10px}
.card-prog{height:2px;background:var(--ln)}
.card-prog-fill{height:100%;border-radius:2px;transition:width .8s var(--ease)}
/* tasks */
.trow{display:flex;align-items:center;gap:11px;padding:10px 15px;border-top:1px solid var(--ln);cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .1s}
.trow:active{background:#ffffff05}
.tcb{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--l2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ac);transition:all .15s;flex-shrink:0}
.tcb.on{background:var(--ac);border-color:var(--ac);color:var(--bg)}
.tico{font-size:16px;flex-shrink:0}
.tlbl{font-size:13px;font-weight:700;color:var(--t);flex:1;transition:color .2s}
.tlbl.done{color:var(--t3);text-decoration:line-through}
/* label */
.lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
/* gaps */
.g8{height:8px}.g12{height:12px}.g16{height:16px}
/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:var(--r12);border:1.5px solid var(--l2);background:transparent;font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:800;color:var(--t);cursor:pointer;transition:all .15s;letter-spacing:.2px}
.btn-ac{background:var(--ac);border-color:var(--ac);color:var(--bg)}
.btn-ghost{background:#ffffff06}
.btn-red{background:var(--red)15;border-color:var(--red)40;color:var(--red)}
.btn-full{width:100%}
.btn:active{transform:scale(.97)}
/* mood */
.mrow{display:flex;gap:7px;padding:12px 14px}
.mbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border-radius:var(--r12);border:1.5px solid var(--l2);background:transparent;cursor:pointer;transition:all .15s}
.mbtn.on{border-color:var(--ac)55;background:var(--ac)0f}
.memi{font-size:22px}
.mlbl{font-size:8px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--t3)}
.mbtn.on .mlbl{color:var(--ac)}
/* water */
.wdrops{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:4px 0 8px}
.wdrop{cursor:pointer;transition:transform .12s;width:30px;height:38px}
.wdrop:active{transform:scale(.85)}
/* sleep */
.sqrow{display:flex;gap:5px;padding:6px 14px 14px}
.sqbtn{flex:1;padding:7px 2px;border-radius:var(--r8);border:1.5px solid var(--l2);background:transparent;font-size:10px;font-weight:700;text-align:center;cursor:pointer;color:var(--t3);font-family:'Cabinet Grotesk',sans-serif;transition:all .15s}
.sqbtn.on{border-color:var(--ac)55;background:var(--ac)12;color:var(--ac)}
/* calendar */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:10px 10px 8px}
.chd{text-align:center;font-size:9px;font-weight:800;color:var(--t3);padding:3px 0;letter-spacing:.4px}
.cday{aspect-ratio:1;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .12s;flex-direction:column;gap:1px}
.cday:active{transform:scale(.88)}
.cdn{font-size:12px;font-weight:700;color:var(--t)}
.cday.today .cdn{color:var(--ac);font-weight:900}
.cday.sel{background:var(--ac)}
.cday.sel .cdn{color:var(--bg);font-weight:900}
.cday.other .cdn{color:var(--t3)}
.cdot{width:4px;height:4px;border-radius:50%}
/* food */
.fsearch{width:100%;padding:10px 12px 10px 36px;background:#ffffff06;border:1.5px solid var(--l2);border-radius:var(--r12);color:var(--t);font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:700;outline:none;transition:border-color .2s}
.fsearch:focus{border-color:var(--ac)60}
.fsugg{background:var(--p3);border:1px solid var(--l2);border-radius:var(--r12);margin-top:6px;overflow:hidden;max-height:220px;overflow-y:auto}
.fsugg-item{padding:10px 13px;cursor:pointer;border-top:1px solid var(--ln);transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.fsugg-item:first-child{border-top:none}
.fsugg-item:active{background:#ffffff05}
.flog-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--ln)}
.flog-item:first-child{border-top:none}
/* modal */
.scrim{position:fixed;inset:0;background:#00000070;z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sheet{background:var(--p2);border-radius:22px 22px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:18px 17px 32px}
.shandle{width:36px;height:4px;border-radius:2px;background:var(--l2);margin:0 auto 16px}
/* analytics */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px}
.stile{background:var(--p3);border:1px solid var(--ln);border-radius:var(--r12);padding:13px}
.sval{font-family:'Fraunces',serif;font-size:34px;font-style:italic;font-weight:300;line-height:1;color:var(--ac)}
.slbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-top:4px}
/* settings */
.ss-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:13px 4px 7px;display:block}
.ss-card{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);overflow:hidden;margin:0 14px}
.ss-row{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-top:1px solid var(--ln)}
.ss-row:first-child{border-top:none}
/* body inputs */
.binp{width:100%;padding:9px 11px;background:#ffffff06;border:1.5px solid var(--l2);border-radius:var(--r8);color:var(--t);font-family:'Cabinet Grotesk',sans-serif;font-size:14px;font-weight:700;outline:none;transition:border-color .2s}
.binp:focus{border-color:var(--ac)60}
/* theme swatches */
.tsw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s;position:relative;overflow:hidden;flex-shrink:0}
.tsw.on{border-color:var(--ac);transform:scale(1.18)}
.tsw:active{transform:scale(.9)}
.asw{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .12s;flex-shrink:0}
.asw.on{outline:2.5px solid var(--t);outline-offset:2px}
.asw:active{transform:scale(.88)}
/* battery */
.bbbar{height:7px;border-radius:99px;background:var(--ln);overflow:hidden;margin:6px 0 10px}
.bbfill{height:100%;border-radius:99px;transition:width 1s var(--ease)}
.bbgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.bbtile{text-align:center;padding:8px 3px;background:#ffffff04;border-radius:var(--r8);border:1px solid var(--ln)}
/* breath */
.bmbtn{flex:1;padding:8px 3px;border-radius:var(--r8);border:1.5px solid var(--l2);background:transparent;cursor:pointer;font-size:11px;font-weight:700;text-align:center;font-family:'Cabinet Grotesk',sans-serif;transition:all .15s;color:var(--t3)}
.bmbtn.on{border-color:var(--ac)55;background:var(--ac)12;color:var(--ac)}
/* cal meter */
.cmeter{height:5px;border-radius:99px;background:var(--ln);overflow:hidden;margin:8px 0}
.cmfill{height:100%;border-radius:99px;transition:width .7s var(--ease)}
/* macro rings */
.mrings{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:12px 14px}
.mring-tile{display:flex;flex-direction:column;align-items:center;gap:2px}
/* wl row */
.wlrow{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid var(--ln)}
.wlrow:first-child{border-top:none}
/* chart card */
.chartcard{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);margin:0 14px;overflow:hidden}
.chartcard-head{padding:11px 15px 8px;border-bottom:1px solid var(--ln)}
.chartcard-body{padding:10px 8px 8px}
/* pin */
.pin-scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:15px}
.pin-logo{font-family:'Fraunces',serif;font-size:52px;font-weight:300;font-style:italic;color:var(--ac);letter-spacing:-2px}
.pin-sub{font-size:13px;font-weight:700;color:var(--t3)}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--l2);transition:all .15s}
.pin-dot.fill{background:var(--ac);border-color:var(--ac)}
.pin-dot.err{border-color:var(--red);background:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:12px}
.pin-key{width:68px;height:68px;border-radius:50%;border:1.5px solid var(--l2);background:#ffffff04;font-size:22px;font-weight:700;color:var(--t);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:all .12s}
.pin-key:active{background:var(--ac);color:var(--bg);transform:scale(.9)}
.pin-key.zero{grid-column:2}.pin-key.del{grid-column:3}
/* anim */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes slideL{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
@keyframes numPop{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.tab-r{animation:slideR .2s var(--ease)}
.tab-l{animation:slideL .2s var(--ease)}
.rev{opacity:0}
.rev.shown{opacity:1;animation:fadeUp .28s var(--ease) forwards}
.npop{animation:numPop .45s var(--spring)}
/* glass */
.glass-body{background:linear-gradient(135deg,#dce8ff 0%,#eddcff 38%,#ffdce8 65%,#dcffe8 100%)!important}
.glass-mode .card,.glass-mode .chartcard,.glass-mode .ss-card,
.glass-mode #topbar,.glass-mode #nav,.glass-mode .sheet,.glass-mode .stile,.glass-mode .bbtile{
  background:rgba(255,255,255,.62)!important;
  backdrop-filter:blur(28px) saturate(2);-webkit-backdrop-filter:blur(28px) saturate(2);
  border-color:rgba(255,255,255,.85)!important;
  box-shadow:0 2px 18px rgba(0,0,0,.07),inset 0 1px 0 rgba(255,255,255,.9)!important;
}
.glass-mode #scroll{background:transparent!important}
.glass-mode .trow{border-color:rgba(0,0,0,.06)!important}
.glass-mode .fsearch{background:rgba(255,255,255,.5)!important;border-color:rgba(0,0,0,.1)!important}
.glass-mode .card-prog{background:rgba(0,0,0,.06)!important}
.glass-mode .cmeter{background:rgba(0,0,0,.06)!important}
.glass-mode .pin-scr{background:rgba(235,240,255,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <span class="logo-w">W·OS</span>
      <div class="logo-meta">
        <span class="logo-title">Wellness OS</span>
        <span class="logo-by">by Anant Raj Saini · Claude AI</span>
      </div>
    </div>
    <div id="topbar-right">
      <span id="date-chip"></span>
      <div class="ring-sm">
        <svg viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="none" stroke="#ffffff0d" stroke-width="3"/><circle id="tr-ring" cx="17" cy="17" r="14" fill="none" stroke="#e8d5a3" stroke-width="3" stroke-dasharray="0 87.9" stroke-linecap="round" style="transition:stroke-dasharray .8s var(--ease)"/></svg>
        <span id="tr-pct">0%</span>
      </div>
    </div>
  </div>
  <div id="scroll"><div id="content" class="pad"></div></div>
  <nav id="nav">
    <button class="nb on" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg><span>Home</span></button>
    <button class="nb" data-tab="calendar" onclick="switchTab('calendar')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>Log</span></button>
    <button class="nb" data-tab="food" onclick="switchTab('food')">
      <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><path d="M6 1v3M10 1v3M14 1v3"/></svg><span>Food</span></button>
    <button class="nb" data-tab="analytics" onclick="switchTab('analytics')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Stats</span></button>
    <button class="nb" data-tab="settings" onclick="switchTab('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Settings</span></button>
  </nav>
</div>
<script>
// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const THEMES={
  void:  {n:'Void',  bg:'#080706',p2:'#0e0d0b',p3:'#151310',ln:'#ffffff12',l2:'#ffffff22',t:'#f0ede8',t2:'#c8c0b4',t3:'#7a7268',d:true},
  coal:  {n:'Coal',  bg:'#0a0a0a',p2:'#121212',p3:'#1a1a1a',ln:'#ffffff12',l2:'#ffffff22',t:'#f5f5f5',t2:'#c2c2c2',t3:'#727272',d:true},
  abyss: {n:'Abyss', bg:'#03060f',p2:'#060c1a',p3:'#0c1430',ln:'#1e2e54',l2:'#2e4272',t:'#dde8ff',t2:'#98aedd',t3:'#526298',d:true},
  forest:{n:'Forest',bg:'#040a05',p2:'#081008',p3:'#0e180e',ln:'#162e16',l2:'#1e401e',t:'#dff0e0',t2:'#98ca9a',t3:'#507854',d:true},
  ember: {n:'Ember', bg:'#0a0503',p2:'#130806',p3:'#1e0e08',ln:'#341608',l2:'#4c200c',t:'#faeae0',t2:'#d49272',t3:'#8e6040',d:true},
  ash:   {n:'Ash',   bg:'#f0eeea',p2:'#ffffff',p3:'#f8f6f2',ln:'#e0dbd0',l2:'#ccc4b8',t:'#1a1714',t2:'#524a42',t3:'#9a9088',d:false},
  paper: {n:'Paper', bg:'#fdf8f0',p2:'#ffffff',p3:'#f8f2e8',ln:'#e8d8b8',l2:'#d0b888',t:'#2a1e0a',t2:'#6a5030',t3:'#a88858',d:false},
  glass: {n:'Glass', bg:'#f0f4f8',p2:'rgba(255,255,255,.62)',p3:'rgba(255,255,255,.42)',ln:'rgba(0,0,0,.07)',l2:'rgba(0,0,0,.12)',t:'#1a1f2e',t2:'#4a5568',t3:'#8a9ab8',d:false,glass:true},
};
const ACCENTS={
  gold: {p:'#e8d5a3',g2:'#c4a96d',n:'Gold'},
  ember:{p:'#e85c4a',g2:'#c04030',n:'Ember'},
  sage: {p:'#6dba8a',g2:'#4a9060',n:'Sage'},
  sky:  {p:'#7ab3e8',g2:'#5080c0',n:'Sky'},
  iris: {p:'#b48ae8',g2:'#8060c0',n:'Iris'},
  blush:{p:'#e88ab0',g2:'#c06080',n:'Blush'},
  sand: {p:'#d4b896',g2:'#a88060',n:'Sand'},
};
const DEF_PHYS=[
  {id:'p1',l:'Morning Routine',i:'🌅'},{id:'p2',l:'Night Routine',i:'🌙'},
  {id:'p3',l:'Daily Stretching',i:'🤸'},{id:'p4',l:'Water Intake',i:'💧'},
  {id:'p5',l:'Healthy Food',i:'🥗'},{id:'p6',l:'No Cheat Meal',i:'🚫'},
  {id:'p7',l:'Daily Hygiene',i:'🧼'},{id:'p8',l:'Workout',i:'💪'},
  {id:'p9',l:'No Fapping',i:'🔒'},
];
const DEF_MENT=[
  {id:'m1',l:'Daily Lecture',i:'🎓'},{id:'m2',l:'Self-Study',i:'📖'},
  {id:'m3',l:'Book Reading',i:'📚'},{id:'m4',l:'No Doom Scrolling',i:'📵'},
  {id:'m5',l:'Mindfulness',i:'🧘'},
];
const DEF_FAM=[
  {id:'f1',l:'Called Family',i:'📞'},{id:'f2',l:'Quality Time',i:'❤️'},
  {id:'f3',l:'Helped Someone',i:'🤝'},
];

const today=()=>new Date().toISOString().slice(0,10);
const dkey=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const allT=()=>[...S.pt,...S.mt,...S.ft];
function eff(date,st=S){
  const ch=st.c[date]||{},all=allT();
  if(!all.length)return 0;
  return Math.round(all.filter(t=>ch[t.id]).length/all.length*100);
}
function streak(st=S){
  let s=0;const d=new Date();
  for(let i=0;i<366;i++){
    const k=d.toISOString().slice(0,10);
    if(eff(k,st)>0)s++;else if(k!==today())break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
const last=n=>Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return d.toISOString().slice(0,10)});
const T=()=>THEMES[S.tk]||THEMES.void;
const A=()=>ACCENTS[S.ak]||ACCENTS.gold;
const MC=id=>MOODS.find(m=>m.id===id);
const hp=p=>{let h=5381;for(let i=0;i<p.length;i++)h=((h<<5)+h)+p.charCodeAt(i);return h.toString(36)};
const wGoalL=()=>S.wgoal||2.0;
const wDrops=()=>Math.round(wGoalL()*4);
const wLabel=v=>{const ml=v*250;return ml>=1000?(ml/1000).toFixed(1)+'L':ml+'ml'};
const wPct=v=>Math.min(100,Math.round(v/wDrops()*100));
function hmColor(p){
  const dk=T().d;
  if(!p)return dk?'#ffffff05':'#00000008';
  if(p<25)return dk?'#1a2a1a':'#c8f0d0';
  if(p<75)return dk?'#1a4a20':'#6dba8a55';
  return dk?'#1e5a22':'#6dba8a';
}
function unlocked(){return ACH.filter(a=>{try{return a.f(S)}catch{return false}})}

// BODY CALC
// ═══════════════════════════════════════
function calcBMR(b){
  const base=10*(b.cw||70)+6.25*(b.h||170)-5*22;
  return Math.round(b.sex==='female'?base-161:base+5);
}
function calcTDEE(b){return Math.round(calcBMR(b)*(ACT_MUL[b.act]||1.55))}
function calcBodyGoals(b){
  const tdee=calcTDEE(b),bmr=calcBMR(b);
  const diff=(b.cw||70)-(b.gw||65);
  const dailyDef=diff!==0?Math.round(diff*7700/((b.wks||12)*7)):0;
  const targetCal=Math.max(1200,tdee-dailyDef);
  const weeklyChange=Math.abs(dailyDef*7/7700).toFixed(2);
  const bmi=+((b.cw||70)/(((b.h||170)/100)**2)).toFixed(1);
  const bmiCat=bmi<18.5?'Underweight':bmi<25?'Normal':bmi<30?'Overweight':'Obese';
  return{tdee,bmr,targetCal,dailyDef,weeklyChange,bmi,bmiCat,diff};
}
function getGoals(){
  const cal=S.calgoal||(S.body?.cw&&S.body?.h?Math.max(1200,calcBodyGoals(S.body).targetCal):2000);
  const cw=S.body?.cw||70;
  const p=Math.round(cw*1.8);
  return{cal,p,c:Math.round(cal*0.45/4),f:Math.round(cal*0.25/9)};
}

let charts={};

function render(){

  killCharts();applyTheme();updateNav();updateTopBar();

  requestAnimationFrame(()=>{initReveal();buildCharts();if(S.tab==='home')doScoreAnim()});
}
// SETTINGS-ONLY re-render that preserves scroll position
function reRenderSettings(){
  const sc=document.getElementById('scroll');
  const top=sc?sc.scrollTop:0;
  killCharts();applyTheme();updateTopBar();
  document.getElementById('content').innerHTML=`<div>${buildTab()}</div>`;
  requestAnimationFrame(()=>{initReveal();if(sc)sc.scrollTop=top});
}
function updateNav(){
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.tab===S.tab));
}
function updateTopBar(){
  const e=eff(today()),ac=A();
  document.getElementById('date-chip').textContent=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  const ring=document.getElementById('tr-ring');
  if(ring){ring.style.stroke=ac.p;ring.setAttribute('stroke-dasharray',`${e/100*87.9} 87.9`)}
  const pct=document.getElementById('tr-pct');if(pct)pct.textContent=e+'%';
}
function buildTab(){
  if(S.tab==='calendar')return S.dv?buildDay():buildCal();
  if(S.tab==='food')return buildFood();
  if(S.tab==='analytics')return buildAnalytics();
  if(S.tab==='settings')return buildSettings();
  return buildHome();
}
function doScoreAnim(){
  const el=document.getElementById('score-num');if(!el)return;
  const target=parseInt(el.dataset.t||0);let cur=0;
  el.classList.add('npop');
  const step=()=>{cur=Math.min(cur+Math.max(1,Math.ceil(target/24)),target);el.textContent=cur;if(cur<target)requestAnimationFrame(step)};
  requestAnimationFrame(step);
}
function initReveal(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('shown'),i*30);io.unobserve(e.target)}});
  },{threshold:.05});
  document.querySelectorAll('.rev').forEach(el=>io.observe(el));
}

let fSearch='',fSuggs=[],fPending=null;
function searchFood(q){
  if(!q||q.length<2)return[];
  const ql=q.toLowerCase();
  const all=[...FOOD_DB,...(S.cfoods||[]).map(f=>({...f,cat:'Custom'}))];
  return all.filter(f=>f.n.toLowerCase().includes(ql)||(f.cat||'').toLowerCase().includes(ql)).slice(0,14);
}
function getTodayFood(){return S.food[today()]||[]}
function getFoodTotals(entries){return entries.reduce((a,e)=>({cal:a.cal+e.cal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{cal:0,p:0,c:0,f:0})}
function calcEntry(food,qty){
  const m=(food.unit==='g'||food.unit==='ml')?qty/100:qty;
  return{cal:Math.round(food.cal*m),p:+(food.p*m).toFixed(1),c:+(food.c*m).toFixed(1),f:+(food.f*m).toFixed(1)};
}
function buildFood(){
  const td=today(),entries=getTodayFood(),tot=getFoodTotals(entries),G=getGoals();

      <circle cx="${r+4}" cy="${r+4}" r="${r}" fill="none" stroke="var(--ln)" stroke-width="3"/>
      <circle cx="${r+4}" cy="${r+4}" r="${r}" fill="none" stroke="${col}" stroke-width="3"
        stroke-dasharray="${d} ${c}" stroke-linecap="round" transform="rotate(-90 ${r+4} ${r+4})" style="transition:stroke-dasharray .8s var(--ease)"/>
    </svg>`;
  };
  return `
  <div style="padding:20px 18px 14px;border-bottom:1px solid var(--ln)">

        <div style="font-size:9px;color:var(--t3);font-weight:700">${G.cal-Math.round(tot.cal)>=0?'remaining':'over'}</div>

    <div class="mrings">
      ${[{l:'Protein',v:Math.round(tot.p),g:G.p,c:'var(--red)'},{l:'Carbs',v:Math.round(tot.c),g:G.c,c:'var(--blue)'},{l:'Fat',v:Math.round(tot.f),g:G.f,c:'var(--purple)'},{l:'Cal',v:Math.round(tot.cal),g:G.cal,c:calCol}].map(m=>`<div class="mring-tile">

    <div class="shandle"></div>
    <div style="font-size:16px;font-weight:800;margin-bottom:2px">${food.n}</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:15px">${food.cat} · ${food.cal} kcal per ${food.std}${food.unit}</div>
    <div class="lbl" style="margin-bottom:7px">Quantity</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      ${isGram?[50,100,150,200,250,300].map(v=>`<button onclick="pickPreset(${v})" class="btn btn-ghost" style="font-size:11px;padding:5px 10px;flex:1;min-width:42px">${v}${food.unit}</button>`).join('') : [.5,1,1.5,2,3,4].map(v=>`<button onclick="pickPreset(${v})" class="btn btn-ghost" style="font-size:11px;padding:5px 10px;flex:1;min-width:42px">${v}</button>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:16px">
      <input type="number" id="fq-qty" value="${defQty}" min=".1" step="${isGram?10:.5}" oninput="updateQtyPreview(this.value)"
        style="flex:1;padding:10px 11px;background:#ffffff06;border:1.5px solid var(--l2);border-radius:var(--r8);color:var(--t);font-family:'Cabinet Grotesk',sans-serif;font-size:16px;font-weight:800;outline:none"/>
      <span style="font-size:13px;color:var(--t3);font-weight:700">${food.unit}</span>
    </div>
    <div id="fq-prev" style="background:#ffffff06;border:1px solid var(--l2);border-radius:var(--r12);padding:12px;margin-bottom:16px;display:flex;justify-content:space-around">
      ${renderFoodPreview(food,defQty)}
    </div>
    <div style="display:flex;gap:7px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('fq-scrim').remove()">Cancel</button>
      <button class="btn btn-ac" style="flex:1" onclick="logFoodEntry()">Add to Log</button>
    </div>
  </div>`;
  document.body.appendChild(scrim);
}
function renderFoodPreview(food,qty){
  const e=calcEntry(food,qty);
  return [{l:'Cal',v:e.cal,c:'var(--ac)'},{l:'Protein',v:e.p+'g',c:'var(--red)'},{l:'Carbs',v:e.c+'g',c:'var(--blue)'},{l:'Fat',v:e.f+'g',c:'var(--purple)'}].map(m=>`<div style="text-align:center">
    <div style="font-family:'Fraunces',serif;font-size:19px;font-style:italic;color:${m.c}">${m.v}</div>
    <div style="font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--t3)">${m.l}</div>
  </div>`).join('');
}
function updateQtyPreview(val){
  const qty=parseFloat(val);if(!fPending||!qty)return;
  const el=document.getElementById('fq-prev');if(el)el.innerHTML=renderFoodPreview(fPending,qty);
}
function pickPreset(val){const inp=document.getElementById('fq-qty');if(inp){inp.value=val;updateQtyPreview(val)}}
function logFoodEntry(){
  const qty=parseFloat(document.getElementById('fq-qty')?.value);
  if(!fPending||!qty)return;
  const e=calcEntry(fPending,qty);
  const td=today();
  S.food[td]=S.food[td]||[];
  S.food[td].push({name:fPending.n,qtyLabel:qty+fPending.unit,...e});
  save();fPending=null;document.getElementById('fq-scrim')?.remove();render();
}
function delFoodEntry(date,i){S.food[date].splice(i,1);save();render()}

// ═══════════════════════════════════════
// BREATHING
// ═══════════════════════════════════════
const BMODES={
  '478':{phases:[{n:'Inhale',d:4},{n:'Hold',d:7},{n:'Exhale',d:8}],label:'4-7-8 Relaxation'},
  'box':{phases:[{n:'Inhale',d:4},{n:'Hold',d:4},{n:'Exhale',d:4},{n:'Hold',d:4}],label:'Box Breathing'},
  '24': {phases:[{n:'Inhale',d:2},{n:'Exhale',d:4}],label:'2-4 Quick Calm'},
};
let bMode='478',breathRunning=false,bTimer=null,bPhase=0,bSec=0,bCycles=0;
function setBreathMode(id){
  if(breathRunning)stopBreath();bMode=id;
  const t=document.getElementById('bm-title');if(t)t.textContent=BMODES[id].label;
  Object.keys(BMODES).forEach(k=>{const b=document.getElementById('bm-'+k);if(b)b.className='bmbtn'+(k===id?' on':'')});
  resetBreathUI();
}
function resetBreathUI(){
  const p=document.getElementById('br-phase'),c=document.getElementById('br-count'),a=document.getElementById('br-arc'),i=document.getElementById('br-info');
  if(p)p.textContent='Ready';if(c)c.textContent='—';if(a)a.setAttribute('stroke-dasharray','0 276');if(i)i.textContent='Tap Start to begin';
}
function toggleBreath(){breathRunning?stopBreath():startBreath()}
function startBreath(){
  breathRunning=true;bPhase=0;bSec=0;bCycles=0;
  const btn=document.getElementById('br-btn');if(btn){btn.textContent='Stop';btn.className='btn btn-red';btn.style.cssText='font-size:11px;padding:6px 14px'}
  runBreathTick();
}
function stopBreath(){
  breathRunning=false;clearTimeout(bTimer);
  const btn=document.getElementById('br-btn');if(btn){btn.textContent='Start';btn.className='btn btn-ac';btn.style.cssText='font-size:11px;padding:6px 14px'}
  const i=document.getElementById('br-info');if(i)i.textContent=bCycles>0?`${bCycles} cycle${bCycles>1?'s':''} completed 🌿`:'Tap Start to begin';
  resetBreathUI();
}
function runBreathTick(){
  if(!breathRunning)return;
  const phases=BMODES[bMode].phases,phase=phases[bPhase];
  const rem=phase.d-bSec;
  const p=document.getElementById('br-phase'),c=document.getElementById('br-count'),a=document.getElementById('br-arc');
  if(p)p.textContent=phase.n.toUpperCase();if(c)c.textContent=rem;
  if(a)a.setAttribute('stroke-dasharray',`${(bSec/phase.d)*276} 276`);
  bSec++;
  if(bSec>=phase.d){bSec=0;bPhase++;if(bPhase>=phases.length){bPhase=0;bCycles++}}
  bTimer=setTimeout(runBreathTick,1000);
}

// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`wos-backup-${today()}.json`;a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);['c','n','ph','wo','rw','ex','xt','d','m','w','sl','food','body','cfoods','wlog','pt','mt','ft','wgoal','slgoal','calgoal'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k]});save();render();alert('Import successful!')}catch{alert('Invalid backup file')}};
  r.readAsText(f);
}
function showReport(){
  const l30=last(30),str=streak(),avg=Math.round(l30.reduce((a,d)=>a+eff(d),0)/30);
  const scrim=document.createElement('div');scrim.className='scrim';scrim.id='rep-scrim';
  scrim.innerHTML=`<div class="sheet">
    <div class="shandle"></div>
    <div style="font-family:'Fraunces',serif;font-size:24px;font-style:italic;color:var(--ac);margin-bottom:4px">Monthly Report</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:16px">${new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</div>
    ${[['🔥 Streak',str+' days'],['📊 30d Avg',avg+'%'],['⭐ Perfect Days',l30.filter(d=>eff(d)===100).length+' days'],['✅ Tasks',allT().length+' tracked'],['💧 Water Goal',wGoalL()+'L / day'],['🌙 Sleep Goal',S.slgoal+'h / night'],['🍱 Food Days',Object.keys(S.food||{}).length+' logged'],['⚖️ Weight Logs',(S.wlog||[]).length+' entries']].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--ln)"><span style="font-size:12px;color:var(--t2)">${k}</span><span style="font-size:12px;font-weight:700">${v}</span></div>`).join('')}
    <button class="btn btn-ghost btn-full" style="margin-top:15px" onclick="document.getElementById('rep-scrim').remove()">Close</button>
  </div>`;
  document.body.appendChild(scrim);
}
