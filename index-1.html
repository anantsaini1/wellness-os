<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="W·OS"/>
<title>Wellness OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--bg);color:var(--t);overscroll-behavior:none;transition:background .4s var(--ease)}
:root{
  --bg:#0c0a08;--p2:#141210;--p3:#1c1916;
  --ln:#ffffff0e;--l2:#ffffff1c;
  --t:#f2ede6;--t2:#c4b89a;--t3:#7a6e5a;
  --ac:#e8c87a;--ac2:#c4a050;
  --red:#e05a48;--green:#5db87a;--blue:#6aaad8;--purple:#a878e0;
  --r8:10px;--r12:14px;--r16:20px;--r20:24px;
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --blur:blur(24px) saturate(1.8);
}

/* ── APP SHELL ── */
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* ── TOPBAR ── */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--ln);background:var(--bg);flex-shrink:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-w{font-family:'Fraunces',serif;font-size:34px;font-style:italic;font-weight:300;color:var(--ac);letter-spacing:-2px;line-height:1}
.logo-meta{display:flex;flex-direction:column;gap:2px}
.logo-title{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--t2);line-height:1}
.logo-by{font-size:7px;font-weight:700;color:var(--t3);line-height:1}
#topbar-right{display:flex;align-items:center;gap:10px}
#date-chip{font-size:11px;font-weight:700;color:var(--t3)}
.ring-sm{position:relative;width:36px;height:36px}
.ring-sm svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-sm span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--ac)}

/* ── SCROLL ── */
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#scroll::-webkit-scrollbar{display:none}
.pad{padding-bottom:28px}

/* ── NAV ── */
#nav{display:flex;background:var(--bg);border-top:1px solid var(--ln);padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 2px 7px;border:none;background:transparent;cursor:pointer;gap:4px;transition:opacity .15s}
.nb svg{width:19px;height:19px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke .25s}
.nb span{font-size:8px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--t3);transition:color .25s}
.nb.on svg{stroke:var(--ac)}
.nb.on span{color:var(--ac)}
.nb:active{opacity:.5}

/* ── CARDS ── */
.card{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);margin:0 16px;overflow:hidden}
.card+.card{margin-top:10px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:15px 16px 12px}
.card-prog{height:1.5px;background:var(--ln)}
.card-prog-fill{height:100%;border-radius:2px;transition:width 1s var(--ease)}

/* ── TASKS ── */
.trow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--ln);cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .12s}
.trow:active{background:#ffffff04}
.tcb{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--l2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--ac);transition:all .2s var(--spring);flex-shrink:0}
.tcb.on{background:var(--ac);border-color:var(--ac);color:var(--bg);transform:scale(1.08)}
.tico{font-size:17px;flex-shrink:0}
.tlbl{font-size:13px;font-weight:700;color:var(--t);flex:1;transition:color .2s}
.tlbl.done{color:var(--t3);text-decoration:line-through;text-decoration-color:var(--t3)50}

/* ── LABELS / GAPS / BTNS ── */
.lbl{font-size:8px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3)}
.g8{height:8px}.g12{height:12px}.g16{height:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 18px;border-radius:var(--r12);border:1px solid var(--l2);background:transparent;font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:800;color:var(--t);cursor:pointer;transition:all .15s;letter-spacing:.2px}
.btn-ac{background:var(--ac);border-color:var(--ac);color:#0c0a08}
.btn-ghost{background:#ffffff05;border-color:var(--ln)}
.btn-red{background:var(--red)12;border-color:var(--red)35;color:var(--red)}
.btn-full{width:100%}
.btn:active{transform:scale(.96)}

/* ── MOOD ── */
.mrow{display:flex;gap:6px;padding:10px 14px 14px}
.mbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:var(--r12);border:1px solid var(--ln);background:transparent;cursor:pointer;transition:all .2s var(--spring)}
.mbtn.on{border-color:var(--ac)55;background:var(--ac)0c;transform:scale(1.04)}
.memi{font-size:24px}
.mlbl{font-size:8px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--t3)}
.mbtn.on .mlbl{color:var(--ac)}

/* ── WATER ── */
.wdrops{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;padding:6px 0 10px}
.wdrop{cursor:pointer;transition:transform .15s var(--spring);width:28px;height:36px}
.wdrop:active{transform:scale(.78)}

/* ── SLEEP ── */
.sqrow{display:flex;gap:5px;padding:6px 14px 14px}
.sqbtn{flex:1;padding:8px 2px;border-radius:var(--r8);border:1px solid var(--ln);background:transparent;font-size:10px;font-weight:700;text-align:center;cursor:pointer;color:var(--t3);font-family:'Cabinet Grotesk',sans-serif;transition:all .15s}
.sqbtn.on{border-color:var(--ac)55;background:var(--ac)10;color:var(--ac)}

/* ── CALENDAR ── */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:10px 10px 8px}
.chd{text-align:center;font-size:9px;font-weight:800;color:var(--t3);padding:3px 0;letter-spacing:.4px}
.cday{aspect-ratio:1;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .15s var(--spring);flex-direction:column;gap:1px}
.cday:active{transform:scale(.84)}
.cdn{font-size:12px;font-weight:700;color:var(--t)}
.cday.today .cdn{color:var(--ac);font-weight:900}
.cday.sel{background:var(--ac)}
.cday.sel .cdn{color:#0c0a08;font-weight:900}
.cday.other .cdn{color:var(--t3)}
.cdot{width:4px;height:4px;border-radius:50%}

/* ── FOOD ── */
.fsearch{width:100%;padding:11px 12px 11px 38px;background:#ffffff05;border:1px solid var(--ln);border-radius:var(--r12);color:var(--t);font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:700;outline:none;transition:border-color .2s}
.fsearch:focus{border-color:var(--ac)55}
.fsugg{background:var(--p3);border:1px solid var(--ln);border-radius:var(--r12);margin-top:6px;overflow:hidden;max-height:240px;overflow-y:auto}
.fsugg-item{padding:11px 14px;cursor:pointer;border-top:1px solid var(--ln);transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.fsugg-item:first-child{border-top:none}
.fsugg-item:active{background:#ffffff04}
.flog-item{display:flex;align-items:center;gap:10px;padding:11px 15px;border-top:1px solid var(--ln)}
.flog-item:first-child{border-top:none}
.fcat-tab{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;border:1px solid var(--ln);background:transparent;color:var(--t3);font-family:'Cabinet Grotesk',sans-serif;transition:all .15s;white-space:nowrap}
.fcat-tab.on{background:var(--ac);border-color:var(--ac);color:#0c0a08}

/* ── MODALS ── */
.scrim{position:fixed;inset:0;background:#00000088;z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.sheet{background:var(--p2);border-radius:26px 26px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 18px 36px;border-top:1px solid var(--ln)}
.shandle{width:40px;height:4px;border-radius:2px;background:var(--l2);margin:0 auto 18px}

/* ── ANALYTICS ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px}
.stile{background:var(--p3);border:1px solid var(--ln);border-radius:var(--r12);padding:14px}
.sval{font-family:'Fraunces',serif;font-size:36px;font-style:italic;font-weight:300;line-height:1;color:var(--ac)}
.slbl{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:5px}

/* ── SETTINGS ── */
.ss-lbl{font-size:8px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);padding:14px 4px 8px;display:block}
.ss-card{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);overflow:hidden;margin:0 16px}
.ss-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-top:1px solid var(--ln)}
.ss-row:first-child{border-top:none}
.binp{width:100%;padding:10px 12px;background:#ffffff05;border:1px solid var(--l2);border-radius:var(--r8);color:var(--t);font-family:'Cabinet Grotesk',sans-serif;font-size:14px;font-weight:700;outline:none;transition:border-color .2s}
.binp:focus{border-color:var(--ac)60}
.tsw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s var(--spring);position:relative;overflow:hidden;flex-shrink:0}
.tsw.on{border-color:var(--ac);transform:scale(1.2)}
.tsw:active{transform:scale(.85)}
.asw{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s var(--spring);flex-shrink:0}
.asw.on{outline:2.5px solid var(--t);outline-offset:2.5px;transform:scale(1.1)}
.asw:active{transform:scale(.85)}

/* ── BATTERY ── */
.bbbar{height:6px;border-radius:99px;background:var(--ln);overflow:hidden;margin:8px 0 12px}
.bbfill{height:100%;border-radius:99px;transition:width 1.2s var(--ease)}
.bbgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.bbtile{text-align:center;padding:10px 3px;background:#ffffff03;border-radius:var(--r8);border:1px solid var(--ln)}

/* ── BREATH ── */
.bmbtn{flex:1;padding:9px 3px;border-radius:var(--r8);border:1px solid var(--ln);background:transparent;cursor:pointer;font-size:11px;font-weight:700;text-align:center;font-family:'Cabinet Grotesk',sans-serif;transition:all .15s;color:var(--t3)}
.bmbtn.on{border-color:var(--ac)50;background:var(--ac)10;color:var(--ac)}

/* ── MISC ── */
.cmeter{height:4px;border-radius:99px;background:var(--ln);overflow:hidden;margin:8px 0}
.cmfill{height:100%;border-radius:99px;transition:width .8s var(--ease)}
.mrings{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:12px 14px}
.mring-tile{display:flex;flex-direction:column;align-items:center;gap:2px}
.wlrow{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-top:1px solid var(--ln)}
.wlrow:first-child{border-top:none}
.chartcard{background:var(--p2);border:1px solid var(--ln);border-radius:var(--r16);margin:0 16px;overflow:hidden}
.chartcard-head{padding:13px 16px 9px;border-bottom:1px solid var(--ln)}
.chartcard-body{padding:10px 8px 8px}

/* ── PIN ── */
.pin-scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:18px;background:var(--bg)}
.pin-logo{font-family:'Fraunces',serif;font-size:56px;font-weight:300;font-style:italic;color:var(--ac);letter-spacing:-2px}
.pin-sub{font-size:13px;font-weight:700;color:var(--t3)}
.pin-dots{display:flex;gap:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--l2);transition:all .2s var(--spring)}
.pin-dot.fill{background:var(--ac);border-color:var(--ac);transform:scale(1.15)}
.pin-dot.err{border-color:var(--red);background:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px}
.pin-key{width:72px;height:72px;border-radius:50%;border:1px solid var(--l2);background:#ffffff03;font-size:22px;font-weight:700;color:var(--t);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:all .15s var(--spring)}
.pin-key:active{background:var(--ac);color:#0c0a08;transform:scale(.9)}
.pin-key.zero{grid-column:2}.pin-key.del{grid-column:3}

/* ── FITNESS ── */
.fit-set{display:inline-flex;align-items:center;background:var(--p3);border:1px solid var(--ln);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--t2)}

/* ── AI CHAT ── */
@keyframes aiDot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ══════════════════════════════════════
   PREMIUM ANIMATIONS
══════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
@keyframes slideL{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}
@keyframes numPop{from{opacity:0;transform:translateY(22px) scale(.85)}to{opacity:1;transform:none}}
@keyframes glowBreath{0%,100%{opacity:.4}50%{opacity:.9}}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.tab-r{animation:slideR .22s var(--ease)}
.tab-l{animation:slideL .22s var(--ease)}
.rev{opacity:0}
.rev.shown{opacity:1;animation:fadeUp .35s var(--ease) forwards}
.npop{animation:numPop .5s var(--spring)}

/* ══════════════════════════════════════
   THEME — VOID (default warm dark)
══════════════════════════════════════ */
/* Variables set in :root above */

/* ══════════════════════════════════════
   THEME — EMBER (Oura-like warm brown)
══════════════════════════════════════ */
.theme-ember body,.theme-ember{--bg:#0e0805;--p2:#181008;--p3:#22170c;--ln:#ffffff0d;--l2:#ffffff1a;--t:#f5e8d8;--t2:#c8906a;--t3:#7a5040;--ac:#e8a060;--ac2:#c07838}
.ember-bg{background:linear-gradient(160deg,#0e0805 0%,#1a1008 40%,#120a06 100%)!important}

/* ══════════════════════════════════════
   THEME — ABYSS (deep ocean blue)
══════════════════════════════════════ */
.theme-abyss body,.theme-abyss{--bg:#020510;--p2:#050a1c;--p3:#081028;--ln:#1a2e58;--l2:#243c78;--t:#d8e8ff;--t2:#7898d8;--t3:#405878;--ac:#60a0e8;--ac2:#3878c8}
.abyss-bg{background:linear-gradient(160deg,#020510 0%,#040a18 50%,#020810 100%)!important}

/* ══════════════════════════════════════
   THEME — AURORA (purple galaxy)
══════════════════════════════════════ */
.theme-aurora body,.theme-aurora{--bg:#050210;--p2:#0c0620;--p3:#120a30;--ln:#28086a;--l2:#380c90;--t:#e8d8ff;--t2:#a870f0;--t3:#6830b0;--ac:#c080ff;--ac2:#9050e0}
.aurora-bg{background:radial-gradient(ellipse at 30% 20%,#1a0840 0%,#050210 60%)!important}

/* ══════════════════════════════════════
   THEME — PEARL (luxury cream light)
══════════════════════════════════════ */
.theme-pearl body,.theme-pearl{--bg:#faf6f0;--p2:#ffffff;--p3:#f5f0e8;--ln:#e8e0d0;--l2:#d8cbb8;--t:#1a1510;--t2:#5a4a38;--t3:#a89878;--ac:#8a6840;--ac2:#6a5030}
.pearl-bg{background:linear-gradient(160deg,#faf6f0 0%,#f5efe5 100%)!important}
.theme-pearl .card,.theme-pearl .chartcard,.theme-pearl .ss-card{box-shadow:0 2px 16px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04)!important}
.theme-pearl .trow:active{background:#00000006!important}
.theme-pearl .btn-ghost{background:#00000006!important}

/* ══════════════════════════════════════
   THEME — SAKURA (rose blossom light)
══════════════════════════════════════ */
.theme-sakura body,.theme-sakura{--bg:#fff5f8;--p2:#ffffff;--p3:#fef0f4;--ln:#f0d8e0;--l2:#e0b8c8;--t:#2a1018;--t2:#8a4060;--t3:#c08898;--ac:#d06080;--ac2:#b04060}
.sakura-bg{background:linear-gradient(160deg,#fff5f8 0%,#feeaf0 100%)!important}
.theme-sakura .card,.theme-sakura .chartcard,.theme-sakura .ss-card{box-shadow:0 2px 16px rgba(200,60,100,.06)!important}

/* ══════════════════════════════════════
   THEME — LIQUID GLASS (iOS 26 style)
══════════════════════════════════════ */
.theme-glass body,.theme-glass{--bg:#e8eef8;--p2:rgba(255,255,255,.55);--p3:rgba(255,255,255,.38);--ln:rgba(255,255,255,.8);--l2:rgba(0,0,0,.12);--t:#101828;--t2:#384860;--t3:#708098;--ac:#3870d8;--ac2:#2858b8}
.glass-bg{background:linear-gradient(145deg,#dce8ff 0%,#e8dcff 35%,#ffdcec 65%,#dcfff0 100%)!important}
.theme-glass .card,.theme-glass .chartcard,.theme-glass .ss-card,
.theme-glass #topbar,.theme-glass #nav,.theme-glass .sheet,
.theme-glass .stile,.theme-glass .bbtile,.theme-glass .pin-scr{
  background:rgba(255,255,255,.55)!important;
  backdrop-filter:blur(32px) saturate(2.2) brightness(1.05);
  -webkit-backdrop-filter:blur(32px) saturate(2.2) brightness(1.05);
  border-color:rgba(255,255,255,.88)!important;
  box-shadow:0 2px 24px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.95)!important;
}
.theme-glass #scroll{background:transparent!important}
.theme-glass .trow{border-color:rgba(0,0,0,.05)!important}
.theme-glass .trow:active{background:rgba(0,0,0,.04)!important}
.theme-glass .fsearch{background:rgba(255,255,255,.5)!important;border-color:rgba(0,0,0,.08)!important}
.theme-glass .card-prog,.theme-glass .cmeter{background:rgba(0,0,0,.06)!important}
.theme-glass .btn-ghost{background:rgba(255,255,255,.5)!important;border-color:rgba(0,0,0,.1)!important}
.theme-glass .pin-scr{background:rgba(230,240,255,.92)!important}

/* Light theme text fixes */
.theme-pearl .pin-scr,.theme-sakura .pin-scr{background:var(--bg)!important}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <span class="logo-w">W·OS</span>
      <div class="logo-meta">
        <span class="logo-title">Wellness OS</span>
        <span class="logo-by">by Anant Raj Saini · Claude AI</span>
      </div>
    </div>
    <div id="topbar-right">
      <span id="date-chip"></span>
      <div class="ring-sm">
        <svg viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="none" stroke="#ffffff0d" stroke-width="3"/><circle id="tr-ring" cx="17" cy="17" r="14" fill="none" stroke="#e8d5a3" stroke-width="3" stroke-dasharray="0 87.9" stroke-linecap="round" style="transition:stroke-dasharray .8s var(--ease)"/></svg>
        <span id="tr-pct">0%</span>
      </div>
    </div>
  </div>
  <div id="scroll"><div id="content" class="pad"></div></div>
  <nav id="nav">
    <button class="nb on" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg><span>Home</span></button>
    <button class="nb" data-tab="calendar" onclick="switchTab('calendar')">

const today=()=>new Date().toISOString().slice(0,10);
const dkey=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const allT=()=>[...S.pt,...S.mt,...S.ft];
function eff(date,st=S){
  const ch=st.c[date]||{},all=allT();
  if(!all.length)return 0;
  return Math.round(all.filter(t=>ch[t.id]).length/all.length*100);
}
function streak(st=S){
  let s=0;const d=new Date();
  for(let i=0;i<366;i++){
    const k=d.toISOString().slice(0,10);
    if(eff(k,st)>0)s++;else if(k!==today())break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
const last=n=>Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return d.toISOString().slice(0,10)});
const T=()=>THEMES[S.tk]||THEMES.void;
const A=()=>ACCENTS[S.ak]||ACCENTS.gold;
const MC=id=>MOODS.find(m=>m.id===id);
const hp=p=>{let h=5381;for(let i=0;i<p.length;i++)h=((h<<5)+h)+p.charCodeAt(i);return h.toString(36)};
const wGoalL=()=>S.wgoal||2.0;
const wDrops=()=>Math.round(wGoalL()*4);
const wLabel=v=>{const ml=v*250;return ml>=1000?(ml/1000).toFixed(1)+'L':ml+'ml'};
const wPct=v=>Math.min(100,Math.round(v/wDrops()*100));
function hmColor(p){
  const dk=T().d;
  if(!p)return dk?'#ffffff05':'#00000008';
  if(p<25)return dk?'#1a2a1a':'#c8f0d0';
  if(p<75)return dk?'#1a4a20':'#6dba8a55';
  return dk?'#1e5a22':'#6dba8a';
}
function unlocked(){return ACH.filter(a=>{try{return a.f(S)}catch{return false}})}

// ═══════════════════════════════════════
// BODY CALC
// ═══════════════════════════════════════
function calcBMR(b){
  const base=10*(b.cw||70)+6.25*(b.h||170)-5*22;
  return Math.round(b.sex==='female'?base-161:base+5);
}
function calcTDEE(b){return Math.round(calcBMR(b)*(ACT_MUL[b.act]||1.55))}
function calcBodyGoals(b){
  const tdee=calcTDEE(b),bmr=calcBMR(b);
  const diff=(b.cw||70)-(b.gw||65);
  const dailyDef=diff!==0?Math.round(diff*7700/((b.wks||12)*7)):0;
  const targetCal=Math.max(1200,tdee-dailyDef);
  const weeklyChange=Math.abs(dailyDef*7/7700).toFixed(2);
  const bmi=+((b.cw||70)/(((b.h||170)/100)**2)).toFixed(1);
  const bmiCat=bmi<18.5?'Underweight':bmi<25?'Normal':bmi<30?'Overweight':'Obese';
  return{tdee,bmr,targetCal,dailyDef,weeklyChange,bmi,bmiCat,diff};
}
function getGoals(){
  const cal=S.calgoal||(S.body?.cw&&S.body?.h?Math.max(1200,calcBodyGoals(S.body).targetCal):2000);
  const cw=S.body?.cw||70;
  const p=Math.round(cw*1.8);
  return{cal,p,c:Math.round(cal*0.45/4),f:Math.round(cal*0.25/9)};
}

function applyTheme(){
  const th=T(),ac=A(),r=document.documentElement.style;
  r.setProperty('--bg',th.bg);r.setProperty('--p2',th.p2);r.setProperty('--p3',th.p3);
  r.setProperty('--ln',th.ln);r.setProperty('--l2',th.l2);
  r.setProperty('--t',th.t);r.setProperty('--t2',th.t2);r.setProperty('--t3',th.t3);
  r.setProperty('--ac',ac.p);r.setProperty('--ac2',ac.g2);
  // Remove all theme classes
  const allCls=['ember-bg','abyss-bg','aurora-bg','pearl-bg','sakura-bg','glass-bg','theme-ember','theme-abyss','theme-aurora','theme-pearl','theme-sakura','theme-glass'];
  document.body.classList.remove(...allCls);
  document.documentElement.classList.remove(...allCls);
  // Apply new theme class
  if(th.cls){document.body.classList.add(th.cls)}
  if(th.glass){document.body.style.background=''}
  else{document.body.style.background=th.bg}
  // Light theme — fix nav/topbar bg
  const nav=document.getElementById('nav');
  const topbar=document.getElementById('topbar');
  if(!th.d){
    if(nav)nav.style.background=th.bg;
    if(topbar)topbar.style.background=th.bg;
  } else {
    if(nav)nav.style.background='';
    if(topbar)topbar.style.background='';
  }
  Chart.defaults.color=th.t2;Chart.defaults.borderColor=th.ln;
}

function buildTab(){
  if(S.tab==='calendar')return S.dv?buildDay():buildCal();
  if(S.tab==='food')return buildFood();
  if(S.tab==='analytics')return buildAnalytics();
  if(S.tab==='settings')return buildSettings();

function doScoreAnim(){
  const el=document.getElementById('score-num');if(!el)return;
  const target=parseInt(el.dataset.t||0);let cur=0;
  el.classList.add('npop');
  const step=()=>{cur=Math.min(cur+Math.max(1,Math.ceil(target/24)),target);el.textContent=cur;if(cur<target)requestAnimationFrame(step)};
  requestAnimationFrame(step);
}
function initReveal(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('shown'),i*30);io.unobserve(e.target)}});
  },{threshold:.05});
  document.querySelectorAll('.rev').forEach(el=>io.observe(el));
}

}

let fSearch='',fSuggs=[],fPending=null;
function searchFood(q){
  if(!q||q.length<2)return[];
  const ql=q.toLowerCase();
  const all=[...FOOD_DB,...(S.cfoods||[]).map(f=>({...f,cat:'Custom'}))];
  return all.filter(f=>f.n.toLowerCase().includes(ql)||(f.cat||'').toLowerCase().includes(ql)).slice(0,14);
}
function getTodayFood(){return S.food[today()]||[]}
function getFoodTotals(entries){return entries.reduce((a,e)=>({cal:a.cal+e.cal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{cal:0,p:0,c:0,f:0})}
function calcEntry(food,qty){
  const m=(food.unit==='g'||food.unit==='ml')?qty/100:qty;
  return{cal:Math.round(food.cal*m),p:+(food.p*m).toFixed(1),c:+(food.c*m).toFixed(1),f:+(food.f*m).toFixed(1)};
}
function buildFood(){
  const td=today(),entries=getTodayFood(),tot=getFoodTotals(entries),G=getGoals();
  const calPct=Math.min(100,Math.round(tot.cal/G.cal*100));
  const calCol=tot.cal>G.cal*1.1?'var(--red)':tot.cal>G.cal*.85?'var(--green)':'var(--ac)';
  const remaining=G.cal-Math.round(tot.cal);

  const ring=(v,mx,col,r=20)=>{
    const c=2*Math.PI*r,d=Math.min(v/mx,1)*c;
    return `<svg width="${r*2+8}" height="${r*2+8}" viewBox="0 0 ${r*2+8} ${r*2+8}">
      <circle cx="${r+4}" cy="${r+4}" r="${r}" fill="none" stroke="var(--ln)" stroke-width="3.5"/>
      <circle cx="${r+4}" cy="${r+4}" r="${r}" fill="none" stroke="${col}" stroke-width="3.5"
        stroke-dasharray="${d} ${c}" stroke-linecap="round" transform="rotate(-90 ${r+4} ${r+4})" style="transition:stroke-dasharray .8s var(--ease)"/>
    </svg>`;
  };

  // Meal suggestions based on time
  const hr=new Date().getHours();
  const mealTime=hr<11?'Breakfast':hr<15?'Lunch':hr<19?'Dinner':'Snack';
  const mealSuggestions={

  return `

          <div>
            <div style="font-family:'Fraunces',serif;font-size:58px;font-weight:300;font-style:italic;letter-spacing:-2px;line-height:1;color:${calCol}" id="score-num" data-t="${Math.round(tot.cal)}">${Math.round(tot.cal)}</div>

              <button onclick="showCalModal()" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:10px;font-weight:700;margin-left:6px;font-family:'Cabinet Grotesk',sans-serif">${S.calgoal?'✕ reset':'⚙'}</button>

      <div style="font-family:'Fraunces',serif;font-size:18px;font-style:italic;color:var(--ac)">${e.cal}</div>

          <span style="font-size:20px">${l.split(' ')[0]}</span>
          <div><div style="font-size:13px;font-weight:700">${l.slice(l.indexOf(' ')+1)}</div><div style="font-size:11px;color:var(--t3)">${s}</div></div>
          ${S.body?.act===k?'<span style="margin-left:auto;color:var(--ac);font-size:16px">✓</span>':''}
        </div>`).join('')}
        <button class="btn btn-ac btn-full" style="margin-top:8px" onclick="nextOnb()">Continue →</button>
      </div>`
    },
    {
      icon:'✅',
      title:"You're all set!",
      sub:'Your wellness journey starts now',
      content:`<div style="text-align:center">
        <div style="font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:20px">Goals calculated based on your profile.<br/>Log your first task to start your streak!</div>
        <div style="background:var(--p3);border:1px solid var(--ln);border-radius:var(--r12);padding:14px;margin-bottom:20px;text-align:left">
          ${S.body?.cw&&S.body?.h?`<div style="font-size:12px;color:var(--t2);margin-bottom:4px">📊 Your calorie goal: <span style="color:var(--ac);font-weight:800">${Math.max(1200,calcBodyGoals(S.body).targetCal)} kcal</span></div>`:''}
          <div style="font-size:12px;color:var(--t2);margin-bottom:4px">💧 Water goal: <span style="color:var(--blue);font-weight:800">${S.wgoal||2}L / day</span></div>
          <div style="font-size:12px;color:var(--t2)">🌙 Sleep goal: <span style="color:var(--purple);font-weight:800">${S.slgoal||8}h / night</span></div>
        </div>
        <button class="btn btn-ac btn-full" onclick="finishOnb()">Start W·OS 🌿</button>
      </div>`
    }
  ];

  const step=steps[Math.min(onbStep,steps.length-1)];
  const app=document.getElementById('app');
  let el=document.getElementById('onb-screen');
  if(!el){
    el=document.createElement('div');el.id='onb-screen';
    el.style.cssText='position:fixed;inset:0;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)';
    app.appendChild(el);
  }
  el.innerHTML=`
    <div style="width:100%;max-width:360px">
      <!-- Progress dots -->
      <div style="display:flex;justify-content:center;gap:6px;margin-bottom:32px">
        ${steps.map((_,i)=>`<div style="width:${i===onbStep?24:8}px;height:8px;border-radius:4px;background:${i===onbStep?'var(--ac)':i<onbStep?'var(--ac)50':'var(--ln)'};transition:all .3s var(--ease)"></div>`).join('')}
      </div>
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:52px;margin-bottom:12px">${step.icon}</div>
        <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--t);margin-bottom:6px">${step.title}</div>
        <div style="font-size:12px;color:var(--t3)">${step.sub}</div>
      </div>
      ${step.content}
    </div>`;
  applyTheme();
}

function nextOnb(){onbStep++;renderOnboarding()}
function onbSex(sex){S.body=S.body||{};S.body.sex=sex;renderOnboarding()}
function onbAct(act){S.body=S.body||{};S.body.act=act;save();renderOnboarding()}
function saveOnbBody(){
  const h=parseInt(document.getElementById('onb-h')?.value)||170;
  const cw=parseFloat(document.getElementById('onb-w')?.value)||70;
  const gw=parseFloat(document.getElementById('onb-g')?.value)||65;
  S.body={...S.body,h,cw,gw,wks:12,sex:S.body?.sex||'male',act:S.body?.act||'moderate'};
  const goals=calcBodyGoals(S.body);
  S.calgoal=Math.max(1200,goals.targetCal);
  save();nextOnb();
}
function finishOnb(){
  S.onboarded=true;save();
  document.getElementById('onb-screen')?.remove();
  render();
}

function showStreakCelebration(str){
  if(str<1)return;
  const el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;pointer-events:none';
  el.innerHTML=`
    <div style="text-align:center;animation:streakPop .6s var(--spring) forwards">
      <div style="font-size:64px;margin-bottom:8px">${str>=30?'🏆':str>=7?'🔥':'✨'}</div>
      <div style="font-family:'Fraunces',serif;font-size:42px;font-weight:300;font-style:italic;color:var(--ac);line-height:1">${str}</div>

    </div>`;

  const style=document.createElement('style');
  style.textContent='@keyframes streakPop{from{opacity:0;transform:scale(.5) translateY(20px)}60%{transform:scale(1.15) translateY(-5px)}to{opacity:1;transform:scale(1) translateY(0)}}';
  document.head.appendChild(style);
  setTimeout(()=>el.remove(),2500);
}

function showTaskComplete(){
  const confetti=document.createElement('div');
  confetti.style.cssText='position:fixed;inset:0;z-index:490;pointer-events:none;overflow:hidden';
  const colors=['var(--ac)','var(--green)','var(--blue)','var(--purple)'];
  confetti.innerHTML=Array.from({length:20},(_,i)=>{
    const c=colors[i%colors.length];
    const x=Math.random()*100,d=Math.random()*2+.5,del=Math.random()*.5;
    return`<div style="position:absolute;top:-10px;left:${x}%;width:6px;height:6px;border-radius:50%;background:${c};animation:fall ${d}s ${del}s linear forwards"></div>`;
  }).join('');
  const style=document.createElement('style');
  style.textContent='@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}';
  document.head.appendChild(style);
  document.body.appendChild(confetti);
  setTimeout(()=>confetti.remove(),3000);
}

const EXLIB={
  Chest:['Bench Press','Incline Press','Push Ups','Cable Fly','Dips'],
  Back:['Pull Ups','Barbell Row','Lat Pulldown','Deadlift','Face Pulls'],
  Legs:['Squats','Leg Press','Romanian DL','Lunges','Calf Raises'],
  Shoulders:['OHP','Lateral Raises','Front Raises','Rear Delt Fly','Shrugs'],
  Arms:['Bicep Curls','Tricep Dips','Hammer Curls','Skull Crushers','Preacher Curls'],
  Core:['Plank','Crunches','Russian Twist','Leg Raises','Mountain Climbers'],
  Cardio:['Running','Cycling','Jump Rope','HIIT','Swimming'],
};
let restInterval=null;

function getExerciseHistory(name){
  // Returns last 5 sessions with this exercise
  const history=[];
  const allDates=Object.keys(S.fitLog||{}).sort().reverse();
  for(const date of allDates){
    const ex=(S.fitLog[date]||[]).find(e=>e.name===name);
    if(ex)history.push({date,sets:ex.sets,unit:ex.unit});
    if(history.length>=5)break;
  }
  return history;
}

function getPersonalRecord(name){
  let maxVol=0,maxWeight=0;
  Object.values(S.fitLog||{}).forEach(day=>{
    day.forEach(ex=>{
      if(ex.name===name){
        ex.sets.forEach(s=>{
          if(s.weight>maxWeight)maxWeight=s.weight;
          const vol=s.reps*s.weight;
          if(vol>maxVol)maxVol=vol;
        });
      }
    });
  });
  return{maxWeight,maxVol};
}

function buildFitness(){
  const td=today();
  const body=S.body||{};
  const todayFit=(S.fitLog||{})[td]||[];
  const totalSets=todayFit.reduce((a,e)=>a+e.sets.length,0);
  const totalVol=todayFit.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+(s.reps||0)*(s.weight||0),0),0);

  // Weekly volume by muscle group
  const weekDates=last(7);
  const weekSets=weekDates.reduce((a,d)=>a+((S.fitLog||{})[d]||[]).reduce((b,e)=>b+e.sets.length,0),0);

  return `
  <div style="padding:20px 16px 0">
    <div class="lbl" style="margin-bottom:16px;color:var(--green)">Fitness</div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
      ${[
        ['Weight',body.cw?body.cw+'kg':'—'],
        ['Today',totalSets+' sets'],
        ['Volume',totalVol>0?Math.round(totalVol/1000)+'k':'0'],
        ['Week',weekSets+' sets'],
      ].map(([l,v])=>`<div style="background:var(--p2);border:1px solid var(--ln);border-radius:var(--r12);padding:11px 4px;text-align:center">
        <div style="font-family:'Fraunces',serif;font-size:18px;font-style:italic;color:var(--green)">${v}</div>
        <div style="font-size:7px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-top:2px">${l}</div>
      </div>`).join('')}
    </div>

    <!-- Today's workout -->
    <div class="card rev" style="margin:0 0 10px">
      <div class="card-head">
        <div>
          <div class="lbl" style="color:var(--green)">Today's Workout</div>
          <div style="font-size:11px;font-weight:700;color:var(--t3);margin-top:2px">${todayFit.length} exercises · ${totalSets} sets</div>
        </div>
        <button onclick="showAddExercise()" class="btn btn-ac" style="font-size:11px;padding:7px 14px">+ Add</button>
      </div>
      ${todayFit.length===0
        ?`<div style="padding:28px;text-align:center"><div style="font-size:32px;margin-bottom:8px">💪</div><div style="font-size:12px;color:var(--t3)">No exercises yet — tap + Add!</div></div>`
        :todayFit.map((ex,i)=>{
          const pr=getPersonalRecord(ex.name);
          const hist=getExerciseHistory(ex.name);
          const prevSession=hist.find(h=>h.date!==td);
          const prevMax=prevSession?Math.max(...prevSession.sets.map(s=>s.weight)):0;
          const todayMax=Math.max(...ex.sets.map(s=>s.weight));
          const isPR=todayMax>pr.maxWeight&&pr.maxWeight>0;
          const isImproved=prevMax>0&&todayMax>prevMax;
          return`<div style="padding:12px 16px;border-top:1px solid var(--ln)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
              <span style="font-size:14px;font-weight:800">${ex.name}</span>
              ${isPR?`<span style="font-size:9px;font-weight:800;color:var(--ac);background:var(--ac)18;border-radius:20px;padding:2px 8px;margin-left:6px">🏆 PR!</span>`:''}
              ${isImproved&&!isPR?`<span style="font-size:9px;font-weight:800;color:var(--green);background:var(--green)18;border-radius:20px;padding:2px 8px;margin-left:6px">↑ improved</span>`:''}
            </div>
            <button onclick="delExercise('${td}',${i})" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;line-height:1">×</button>
          </div>
          ${prevSession?`<div style="font-size:10px;color:var(--t3);margin-bottom:6px">Last time: ${prevSession.sets.map(s=>`${s.reps}×${s.weight}`).join(', ')} ${ex.unit}</div>`:''}
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${ex.sets.map((s,si)=>`<div style="background:var(--p3);border:1px solid var(--ln);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--t2)">S${si+1} · ${s.reps}×${s.weight}${ex.unit}</div>`).join('')}
            <div onclick="addSet('${td}',${i})" style="background:var(--ac)12;border:1px dashed var(--ac)40;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--ac);cursor:pointer">+ Set</div>
          </div>
        </div>`;}).join('')}
    </div>

    <!-- Rest Timer -->
    <div class="card rev" style="margin:0 0 10px">
      <div class="card-head">
        <div class="lbl" style="color:var(--blue)">Rest Timer</div>
        <div id="rest-display" style="font-family:'Fraunces',serif;font-size:36px;font-style:italic;color:var(--blue)">1:30</div>
      </div>
      <div style="padding:0 16px 14px;display:flex;gap:7px;flex-wrap:wrap">
        ${[30,45,60,90,120,180].map(s=>`<button onclick="startRest(${s})" class="btn btn-ghost" style="font-size:12px;padding:7px 12px">${s>=60?Math.floor(s/60)+'m'+(s%60?s%60+'s':''):s+'s'}</button>`).join('')}
        <button onclick="stopRest()" class="btn btn-red" style="font-size:12px;padding:7px 14px">Stop</button>
      </div>
    </div>

    <!-- Exercise Library -->
    <div class="lbl" style="margin-bottom:8px">Exercise Library</div>
    <div class="card rev" style="margin:0 0 20px">
      ${Object.entries(EXLIB).map(([cat,exs],i)=>`
      <div style="${i>0?'border-top:1px solid var(--ln)':''}padding:12px 16px">
        <div style="font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:8px">${cat}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${exs.map(e=>{
            const pr=getPersonalRecord(e);
            return`<div onclick="quickAddExercise('${e}')" style="background:var(--p3);border:1px solid var(--ln);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--t2);cursor:pointer">
              ${e}${pr.maxWeight>0?`<span style="font-size:9px;color:var(--t3);margin-left:4px">${pr.maxWeight}kg</span>`:''}
            </div>`;}).join('')}
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function startRest(sec){
  if(restInterval)clearInterval(restInterval);
  let rem=sec;
  const tick=()=>{
    const el=document.getElementById('rest-display');
    if(el)el.textContent=Math.floor(rem/60)+':'+String(rem%60).padStart(2,'0');
    if(rem<=0){clearInterval(restInterval);if(el)el.textContent='Done! 💪';return}
    rem--;
  };
  tick();restInterval=setInterval(tick,1000);
}
function stopRest(){if(restInterval)clearInterval(restInterval);const el=document.getElementById('rest-display');if(el)el.textContent='1:30';}

function showAddExercise(){
  const s=document.createElement('div');s.className='scrim';s.id='ex-scrim';
  s.innerHTML=`<div class="sheet"><div class="shandle"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">

      <div><div class="lbl" style="margin-bottom:5px">Unit</div><select id="ex-unit" class="binp"><option>kg</option><option>lbs</option><option>bw</option></select></div>

  </div>`;

function quickAddExercise(name){

function saveExercise(){
  const name=document.getElementById('ex-name')?.value?.trim();
  const reps=parseInt(document.getElementById('ex-reps')?.value)||0;
  const weight=parseFloat(document.getElementById('ex-weight')?.value)||0;
  const unit=document.getElementById('ex-unit')?.value||'kg';
  if(!name||!reps)return;
  const td=today();
  S.fitLog=S.fitLog||{};S.fitLog[td]=S.fitLog[td]||[];
  S.fitLog[td].push({name,unit,sets:[{reps,weight}]});
  save();document.getElementById('ex-scrim')?.remove();render();
}

function addSet(date,idx){
  const ex=(S.fitLog||{})[date]?.[idx];if(!ex)return;
  const last=ex.sets[ex.sets.length-1];
  const s=document.createElement('div');s.className='scrim';s.id='set-scrim';
  s.innerHTML=`<div class="sheet"><div class="shandle"></div>
    <div style="font-family:'Fraunces',serif;font-size:22px;font-style:italic;color:var(--ac);margin-bottom:4px">${ex.name}</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:18px">Set ${ex.sets.length+1}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div><div class="lbl" style="margin-bottom:5px">Reps</div><input id="set-reps" type="number" class="binp" value="${last.reps}"/></div>
      <div><div class="lbl" style="margin-bottom:5px">Weight (${ex.unit})</div><input id="set-weight" type="number" class="binp" value="${last.weight}"/></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('set-scrim').remove()">Cancel</button>
      <button class="btn btn-ac" style="flex:1" onclick="saveSet('${date}',${idx})">Add Set</button>
    </div>
  </div>`;
  document.body.appendChild(s);
}

function saveSet(date,idx){
  const reps=parseInt(document.getElementById('set-reps')?.value)||0;
  const weight=parseFloat(document.getElementById('set-weight')?.value)||0;
  if(!reps)return;
  S.fitLog[date][idx].sets.push({reps,weight});
  save();document.getElementById('set-scrim')?.remove();render();
}

function delExercise(date,idx){S.fitLog[date].splice(idx,1);save();render();}

Today: battery ${bb}/100, tasks ${taskSc}%, mood ${mood||'—'} (${moodSc}/100), sleep ${sl?.h||'—'}h of ${S.slgoal}h (${sl?.q||'—'}), water ${wLabel(water)} of ${wGoalL()}L, calories ${todayCal} of ${getGoals().cal} kcal, food: ${todayFood.map(f=>f.name).join(', ')||'nothing'}, workouts: ${todayFit.map(e=>e.name).join(', ')||'none'}, streak ${streak()} days, weight ${S.body?.cw||'?'}kg → goal ${S.body?.gw||'?'}kg, 7-day: ${l7}.

// BREATHING
// ═══════════════════════════════════════
const BMODES={
  '478':{phases:[{n:'Inhale',d:4},{n:'Hold',d:7},{n:'Exhale',d:8}],label:'4-7-8 Relaxation'},
  'box':{phases:[{n:'Inhale',d:4},{n:'Hold',d:4},{n:'Exhale',d:4},{n:'Hold',d:4}],label:'Box Breathing'},
  '24': {phases:[{n:'Inhale',d:2},{n:'Exhale',d:4}],label:'2-4 Quick Calm'},
};
let bMode='478',breathRunning=false,bTimer=null,bPhase=0,bSec=0,bCycles=0;
function setBreathMode(id){
  if(breathRunning)stopBreath();bMode=id;
  const t=document.getElementById('bm-title');if(t)t.textContent=BMODES[id].label;
  Object.keys(BMODES).forEach(k=>{const b=document.getElementById('bm-'+k);if(b)b.className='bmbtn'+(k===id?' on':'')});
  resetBreathUI();
}
function resetBreathUI(){
  const p=document.getElementById('br-phase'),c=document.getElementById('br-count'),a=document.getElementById('br-arc'),i=document.getElementById('br-info');
  if(p)p.textContent='Ready';if(c)c.textContent='—';if(a)a.setAttribute('stroke-dasharray','0 276');if(i)i.textContent='Tap Start to begin';
}
function toggleBreath(){breathRunning?stopBreath():startBreath()}
function startBreath(){
  breathRunning=true;bPhase=0;bSec=0;bCycles=0;
  const btn=document.getElementById('br-btn');if(btn){btn.textContent='Stop';btn.className='btn btn-red';btn.style.cssText='font-size:11px;padding:6px 14px'}
  runBreathTick();
}
function stopBreath(){
  breathRunning=false;clearTimeout(bTimer);
  const btn=document.getElementById('br-btn');if(btn){btn.textContent='Start';btn.className='btn btn-ac';btn.style.cssText='font-size:11px;padding:6px 14px'}
  const i=document.getElementById('br-info');if(i)i.textContent=bCycles>0?`${bCycles} cycle${bCycles>1?'s':''} completed 🌿`:'Tap Start to begin';
  resetBreathUI();
}
function runBreathTick(){
  if(!breathRunning)return;
  const phases=BMODES[bMode].phases,phase=phases[bPhase];
  const rem=phase.d-bSec;
  const p=document.getElementById('br-phase'),c=document.getElementById('br-count'),a=document.getElementById('br-arc');
  if(p)p.textContent=phase.n.toUpperCase();if(c)c.textContent=rem;
  if(a)a.setAttribute('stroke-dasharray',`${(bSec/phase.d)*276} 276`);
  bSec++;
  if(bSec>=phase.d){bSec=0;bPhase++;if(bPhase>=phases.length){bPhase=0;bCycles++}}
  bTimer=setTimeout(runBreathTick,1000);
}
